<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeriSim AI — ระบบอาจารย์</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; font-family:'Prompt',sans-serif; background:#F1F5F9; }
    #root { width:100%; height:100%; }
    .no-scrollbar::-webkit-scrollbar { display:none; }
    .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation:fadeIn 0.25s ease-out forwards; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spinner { animation:spin 0.9s linear infinite; }
    tr.expandable:hover { background:#F8FAFF !important; cursor:pointer; }
    .score-bar { transition: width 0.6s ease; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const GAS_URL = 'https://script.google.com/macros/s/AKfycbzvubNbpyZonn6qK3OIZZiKcvOy6dM124pyfa275SvTX8t0PesB2r-oRmAxwR7EX9EUXg/exec';
const AUTH_KEY = 'gerisim_teacher_auth';

const NURSING_UNIVERSITIES = [
  'จุฬาลงกรณ์มหาวิทยาลัย','มหาวิทยาลัยเกษตรศาสตร์','มหาวิทยาลัยขอนแก่น',
  'มหาวิทยาลัยเชียงใหม่','มหาวิทยาลัยทักษิณ','มหาวิทยาลัยเทคโนโลยีราชมงคลธัญบุรี',
  'มหาวิทยาลัยเทคโนโลยีสุรนารี','มหาวิทยาลัยธรรมศาสตร์','มหาวิทยาลัยนครพนม',
  'มหาวิทยาลัยนราธิวาสราชนครินทร์','มหาวิทยาลัยนเรศวร','มหาวิทยาลัยนวมินทราธิราช',
  'มหาวิทยาลัยบูรพา','มหาวิทยาลัยพะเยา','มหาวิทยาลัยมหาสารคาม',
  'มหาวิทยาลัยมหิดล (คณะพยาบาลศาสตร์ ศิริราช)','มหาวิทยาลัยมหิดล (โรงเรียนพยาบาลรามาธิบดี)',
  'มหาวิทยาลัยแม่ฟ้าหลวง','มหาวิทยาลัยราชภัฏกำแพงเพชร','มหาวิทยาลัยราชภัฏชัยภูมิ',
  'มหาวิทยาลัยราชภัฏเชียงราย','มหาวิทยาลัยราชภัฏธนบุรี','มหาวิทยาลัยราชภัฏนครปฐม',
  'มหาวิทยาลัยราชภัฏนครราชสีมา','มหาวิทยาลัยราชภัฏบุรีรัมย์','มหาวิทยาลัยราชภัฏพิบูลสงคราม',
  'มหาวิทยาลัยราชภัฏเพชรบุรี','มหาวิทยาลัยราชภัฏเพชรบูรณ์','มหาวิทยาลัยราชภัฏร้อยเอ็ด',
  'มหาวิทยาลัยราชภัฏรำไพพรรณี','มหาวิทยาลัยราชภัฏสวนสุนันทา','มหาวิทยาลัยราชภัฏสุราษฎร์ธานี',
  'มหาวิทยาลัยราชภัฏอุดรธานี','มหาวิทยาลัยราชภัฏอุบลราชธานี','มหาวิทยาลัยวลัยลักษณ์',
  'มหาวิทยาลัยศรีนครินทรวิโรฒ','มหาวิทยาลัยสงขลานครินทร์ (วิทยาเขตหาดใหญ่)',
  'มหาวิทยาลัยสงขลานครินทร์ (วิทยาเขตปัตตานี)','มหาวิทยาลัยสวนดุสิต',
  'มหาวิทยาลัยสุโขทัยธรรมาธิราช','มหาวิทยาลัยอุบลราชธานี',
  'ราชวิทยาลัยจุฬาภรณ์','วิทยาลัยพยาบาลกองทัพบก','วิทยาลัยพยาบาลกองทัพเรือ',
  'วิทยาลัยพยาบาลตำรวจ','วิทยาลัยพยาบาลทหารอากาศ',
  'สถาบันการพยาบาลศรีสวรินทิรา สภากาชาดไทย',
];

// ── Helpers ──────────────────────────────────────────────────────────────────
const post = (body) =>
  fetch(GAS_URL, { method:'POST', body: JSON.stringify(body) }).then(r => r.json());

const scoreColor = (s) =>
  s >= 80 ? '#16A34A' : s >= 60 ? '#2563EB' : s >= 40 ? '#D97706' : '#DC2626';

const ScorePill = ({ score }) => (
  <span className="inline-block px-2 py-0.5 rounded-lg text-xs font-black text-white"
    style={{ background: scoreColor(score) }}>
    {score}%
  </span>
);

const ScoreBar = ({ score, color }) => (
  <div className="w-full bg-gray-100 rounded-full h-1.5 mt-1">
    <div className="score-bar h-full rounded-full" style={{ width:`${score}%`, background: color || scoreColor(score) }} />
  </div>
);

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [page,      setPage]      = useState('login');  // login | register | dashboard
  const [auth,      setAuth]      = useState(null);
  const [loading,   setLoading]   = useState(false);
  const [error,     setError]     = useState('');
  const [students,  setStudents]  = useState([]);
  const [dataLoading, setDataLoading] = useState(false);
  const [search,    setSearch]    = useState('');
  const [expanded,  setExpanded]  = useState(null);  // email of expanded row
  const [sortKey,   setSortKey]   = useState('best_score');
  const [sortDir,   setSortDir]   = useState('desc');
  const [tab,       setTab]       = useState('login');  // login | register | reset (on auth page)
  const [regPassword, setRegPassword] = useState('');

  // Restore session
  useEffect(() => {
    try {
      const saved = sessionStorage.getItem(AUTH_KEY);
      if (saved) {
        const a = JSON.parse(saved);
        setAuth(a);
        setPage('dashboard');
      }
    } catch {}
  }, []);

  // Load data when entering dashboard
  useEffect(() => {
    if (page === 'dashboard' && auth) loadData();
  }, [page, auth]);

  const loadData = async () => {
    setDataLoading(true);
    try {
      const res = await post({ action:'teacher_data', university: auth.university });
      if (res.status === 'success') setStudents(res.students || []);
    } catch (e) {
      console.error(e);
    } finally {
      setDataLoading(false);
    }
  };

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    const fd = new FormData(e.target);
    try {
      const res = await post({ action:'teacher_login', email: fd.get('email'), password: fd.get('password') });
      if (res.status === 'success') {
        const a = { teacher_name: res.teacher_name, email: res.email, university: res.university };
        sessionStorage.setItem(AUTH_KEY, JSON.stringify(a));
        setAuth(a); setPage('dashboard');
      } else {
        setError(res.message || 'เข้าสู่ระบบไม่สำเร็จ');
      }
    } catch { setError('ไม่สามารถติดต่อเซิร์ฟเวอร์ได้'); }
    setLoading(false);
  };

  const handleRegister = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    const fd = new FormData(e.target);
    if (fd.get('password') !== fd.get('confirm')) {
      setError('รหัสผ่านไม่ตรงกัน'); setLoading(false); return;
    }
    try {
      const res = await post({
        action:'teacher_register',
        email: fd.get('email'),
        password: fd.get('password'),
        teacher_name: fd.get('name'),
        university: fd.get('university')
      });
      if (res.status === 'success') {
        setError(''); setRegPassword(''); setTab('login');
        alert('ลงทะเบียนสำเร็จ กรุณาเข้าสู่ระบบ');
      } else {
        setError(res.message || 'ลงทะเบียนไม่สำเร็จ');
      }
    } catch { setError('ไม่สามารถติดต่อเซิร์ฟเวอร์ได้'); }
    setLoading(false);
  };

  const handleReset = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    const fd = new FormData(e.target);
    if (fd.get('new_password') !== fd.get('confirm')) {
      setError('รหัสผ่านไม่ตรงกัน'); setLoading(false); return;
    }
    try {
      const res = await post({
        action: 'teacher_resetPassword',
        email: fd.get('email'),
        teacher_name: fd.get('teacher_name'),
        new_password: fd.get('new_password'),
      });
      if (res.status === 'success') {
        setError(''); setRegPassword(''); setTab('login');
        alert('รีเซ็ตรหัสผ่านสำเร็จ กรุณาเข้าสู่ระบบด้วยรหัสผ่านใหม่');
      } else {
        setError(res.message || 'ไม่สามารถรีเซ็ตรหัสผ่านได้');
      }
    } catch { setError('ไม่สามารถติดต่อเซิร์ฟเวอร์ได้'); }
    setLoading(false);
  };

  const logout = () => {
    sessionStorage.removeItem(AUTH_KEY);
    setAuth(null); setStudents([]); setPage('login');
  };

  const toggleSort = (key) => {
    if (sortKey === key) setSortDir(d => d === 'desc' ? 'asc' : 'desc');
    else { setSortKey(key); setSortDir('desc'); }
  };

  const exportExcel = () => {
    const XLSX = window.XLSX;
    if (!XLSX) { alert('กำลังโหลด SheetJS กรุณารอสักครู่แล้วลองใหม่'); return; }

    // ── Sheet 1: Student summary ──────────────────────────────────────────
    const summaryHeader = ['ชื่อ Username','อีเมล','รหัสนักศึกษา','ครั้งที่ฝึก','Best Score (%)','Avg Score (%)','ล่าสุด'];
    const summaryRows = filtered.map(s => [
      s.student_name, s.email, s.student_id,
      s.session_count, s.best_score, s.avg_score, s.last_active
    ]);
    const ws1 = XLSX.utils.aoa_to_sheet([summaryHeader, ...summaryRows]);
    ws1['!cols'] = [28,32,16,12,14,14,16].map(w => ({ wch: w }));

    // ── Sheet 2: All sessions detail ──────────────────────────────────────
    const detailHeader = [
      'ชื่อ Username','อีเมล','รหัสนักศึกษา',
      'วันที่-เวลา','กรณีศึกษา',
      'เครื่องมือที่เลือก','เครื่องมือที่ถูก','ผลเครื่องมือ',
      'คะแนนประเมิน (%)','คะแนนคำแนะนำ (%)','คะแนนรวม (%)','ระยะเวลา'
    ];
    const detailRows = [];
    filtered.forEach(s => {
      s.sessions.forEach(ses => {
        detailRows.push([
          s.student_name, s.email, s.student_id,
          ses.submitted_at, ses.case_name,
          ses.chosen_tool, ses.correct_tool, ses.tool_match,
          ses.assessment_score, ses.intervention_score, ses.total_score, ses.duration
        ]);
      });
    });
    const ws2 = XLSX.utils.aoa_to_sheet([detailHeader, ...detailRows]);
    ws2['!cols'] = [24,28,14,20,28,20,20,12,14,14,12,12].map(w => ({ wch: w }));

    // ── Workbook ──────────────────────────────────────────────────────────
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws1, 'สรุปนักศึกษา');
    XLSX.utils.book_append_sheet(wb, ws2, 'ประวัติการฝึกทั้งหมด');

    const date = new Date().toLocaleDateString('th-TH').replace(/\//g, '-');
    XLSX.writeFile(wb, `GeriSim_${auth.university}_${date}.xlsx`);
  };

  // ── Derived data ─────────────────────────────────────────────────────────
  const filtered = students
    .filter(s => !search || s.student_name.includes(search) || s.student_id.includes(search) || s.email.includes(search))
    .sort((a, b) => {
      const av = a[sortKey] ?? 0, bv = b[sortKey] ?? 0;
      return sortDir === 'desc' ? (bv > av ? 1 : -1) : (av > bv ? 1 : -1);
    });

  const totalSessions = students.reduce((s,st) => s + st.session_count, 0);
  const avgScore      = students.length ? Math.round(students.reduce((s,st) => s + st.avg_score, 0) / students.length) : 0;
  const topStudent    = students.reduce((best,s) => (!best || s.best_score > best.best_score) ? s : best, null);

  // ── Auth page ─────────────────────────────────────────────────────────────
  if (page !== 'dashboard') {
    return (
      <div className="min-h-screen flex items-center justify-center p-4"
        style={{ background:'linear-gradient(135deg,#1E3A5F 0%,#2D1B69 100%)' }}>
        <div className="w-full max-w-md">
          {/* Logo */}
          <div className="text-center mb-8">
            <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-3"
              style={{ background:'rgba(255,255,255,0.15)', border:'2px solid rgba(255,255,255,0.25)' }}>
              <i className="fas fa-chalkboard-teacher text-white text-2xl"></i>
            </div>
            <h1 className="text-2xl font-black text-white">GeriSim AI</h1>
            <p className="text-sm font-medium mt-1" style={{ color:'rgba(255,255,255,0.6)' }}>ระบบดูแลผลการเรียนรู้ — สำหรับอาจารย์</p>
          </div>

          {/* ── Main card ── */}
          <div className="bg-white rounded-3xl shadow-2xl p-6 mb-3">
            {error && (
              <div className="mb-4 px-4 py-3 rounded-xl text-sm font-medium text-red-700 fade-in"
                style={{ background:'#FEF2F2', border:'1.5px solid #FECACA' }}>
                <i className="fas fa-exclamation-circle mr-2"></i>{error}
              </div>
            )}

            {tab === 'login' && (
              <form onSubmit={handleLogin} className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">อีเมล์ส่วนตัว หรือ อีเมล์มหาวิทยาลัย</label>
                  <input name="email" type="email" required placeholder="teacher@university.ac.th"
                    className="w-full px-4 py-3 rounded-2xl border-2 text-sm font-medium outline-none transition"
                    style={{ fontFamily:'Prompt,sans-serif', borderColor:'#E5E7EB' }}
                    onFocus={e => e.target.style.borderColor='#1E3A5F'}
                    onBlur={e => e.target.style.borderColor='#E5E7EB'} />
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">รหัสผ่าน</label>
                  <input name="password" type="password" required placeholder="รหัสผ่าน"
                    className="w-full px-4 py-3 rounded-2xl border-2 text-sm font-medium outline-none transition"
                    style={{ fontFamily:'Prompt,sans-serif', borderColor:'#E5E7EB' }}
                    onFocus={e => e.target.style.borderColor='#1E3A5F'}
                    onBlur={e => e.target.style.borderColor='#E5E7EB'} />
                </div>
                {/* Forgot password — same style as student login */}
                <div className="flex justify-end">
                  <button type="button" onClick={() => { setTab('reset'); setError(''); }}
                    className="text-xs font-bold flex items-center gap-1"
                    style={{ color:'#1E3A5F' }}>
                    <i className="fas fa-key text-[10px]"></i> ลืมรหัสผ่าน?
                  </button>
                </div>
                <button type="submit" disabled={loading}
                  className="w-full py-4 rounded-2xl font-black text-white text-base flex items-center justify-center gap-2 disabled:opacity-50 transition"
                  style={{ background:'#1E3A5F', boxShadow:'6px 6px 14px rgba(30,58,95,0.45),-4px -4px 10px rgba(255,255,255,0.12)' }}>
                  {loading
                    ? <><i className="fas fa-spinner fa-spin"></i> กำลังเข้าสู่ระบบ...</>
                    : <><i className="fas fa-arrow-right"></i> เข้าสู่ระบบ</>}
                </button>
              </form>
            )}

            {tab === 'register' && (
              <form onSubmit={handleRegister} className="space-y-3">
                <button type="button" onClick={() => { setTab('login'); setError(''); setRegPassword(''); }}
                  className="flex items-center gap-1.5 text-xs font-bold mb-2"
                  style={{ color:'#1E3A5F' }}>
                  <i className="fas fa-arrow-left text-[10px]"></i> กลับ
                </button>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">Username (English)</label>
                  <input name="name" type="text" required placeholder="e.g. Meenakan"
                    className="w-full px-4 py-3 rounded-2xl border-2 text-sm font-medium outline-none transition"
                    style={{ fontFamily:'Prompt,sans-serif', borderColor:'#E5E7EB' }}
                    onInput={e => { e.target.value = e.target.value.replace(/[^A-Za-z\s.\-']/g, ''); }}
                    onFocus={e => e.target.style.borderColor='#1E3A5F'}
                    onBlur={e => e.target.style.borderColor='#E5E7EB'} />
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">อีเมล์ส่วนตัว หรือ อีเมล์มหาวิทยาลัย</label>
                  <input name="email" type="email" required placeholder="teacher@university.ac.th"
                    className="w-full px-4 py-3 rounded-2xl border-2 text-sm font-medium outline-none transition"
                    style={{ fontFamily:'Prompt,sans-serif', borderColor:'#E5E7EB' }}
                    onFocus={e => e.target.style.borderColor='#1E3A5F'}
                    onBlur={e => e.target.style.borderColor='#E5E7EB'} />
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">รหัสผ่าน</label>
                  <input name="password" type="password" required placeholder="อย่างน้อย 8 ตัวอักษร"
                    className="w-full px-4 py-3 rounded-2xl border-2 text-sm font-medium outline-none transition"
                    style={{ fontFamily:'Prompt,sans-serif', borderColor:'#E5E7EB' }}
                    value={regPassword}
                    onChange={e => setRegPassword(e.target.value)}
                    onFocus={e => e.target.style.borderColor='#1E3A5F'}
                    onBlur={e => e.target.style.borderColor='#E5E7EB'} />
                  {regPassword.length > 0 && (() => {
                    const lenOk = regPassword.length >= 8;
                    const hasNum = /[0-9]/.test(regPassword);
                    const hasLet = /[a-zA-Z]/.test(regPassword);
                    const row = (ok, label) => (
                      <div key={label} className="flex items-center gap-1.5">
                        <i className={`fas ${ok ? 'fa-check-circle' : 'fa-times-circle'} text-xs`}
                          style={{ color: ok ? '#16a34a' : '#dc2626' }}></i>
                        <span className="text-xs" style={{ color: ok ? '#16a34a' : '#6b7280' }}>{label}</span>
                      </div>
                    );
                    return (
                      <div className="mt-2 space-y-1 px-1">
                        {row(lenOk,  'อย่างน้อย 8 ตัวอักษร')}
                        {row(hasLet, 'มีตัวอักษร a–z / A–Z')}
                        {row(hasNum, 'มีตัวเลข 0–9')}
                      </div>
                    );
                  })()}
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">ยืนยันรหัสผ่าน</label>
                  <input name="confirm" type="password" required placeholder="พิมพ์รหัสผ่านอีกครั้ง"
                    className="w-full px-4 py-3 rounded-2xl border-2 text-sm font-medium outline-none transition"
                    style={{ fontFamily:'Prompt,sans-serif', borderColor:'#E5E7EB' }}
                    onFocus={e => e.target.style.borderColor='#1E3A5F'}
                    onBlur={e => e.target.style.borderColor='#E5E7EB'} />
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">สังกัดมหาวิทยาลัย</label>
                  <select name="university" required defaultValue=""
                    className="w-full px-4 py-3 rounded-2xl border-2 text-sm font-medium outline-none transition bg-white appearance-none"
                    style={{ fontFamily:'Prompt,sans-serif', borderColor:'#E5E7EB' }}
                    onFocus={e => e.target.style.borderColor='#1E3A5F'}
                    onBlur={e => e.target.style.borderColor='#E5E7EB'}>
                    <option value="" disabled>เลือกมหาวิทยาลัย *</option>
                    {NURSING_UNIVERSITIES.map(u => (
                      <option key={u} value={u}>{u}</option>
                    ))}
                  </select>
                </div>
                <button type="submit" disabled={loading}

                                const toolOK    = s.sessions.filter(x => x.tool_match === 'ถูกต้อง').length;
                                const toolPct   = Math.round((toolOK / n) * 100);
                                const avgAssess = Math.round(s.sessions.reduce((a,x) => a + (x.assessment_score||0), 0) / n);
                                const avgInter  = Math.round(s.sessions.reduce((a,x) => a + (x.intervention_score||0), 0) / n);
                                const avgTot    = Math.round(s.sessions.reduce((a,x) => a + (x.total_score||0), 0) / n);
                                const areas = [
                                  { label:'การเลือกเครื่องมือ',  icon:'fa-tools',               score: toolPct,   weight:'30 คะแนน' },
                                  { label:'การประเมิน',           icon:'fa-clipboard-check',     score: avgAssess, weight:'50 คะแนน' },
                                  { label:'การวางแผนทางการพยาบาล', icon:'fa-hand-holding-medical', score: avgInter,  weight:'20 คะแนน' },
                                ];

                                          <th key={h} className="px-4 py-2 text-[9px] font-black text-indigo-500 uppercase tracking-wider whitespace-nowrap">{h}</th>

                                        <td className="px-4 py-2 text-[10px] text-gray-500 whitespace-nowrap">{ses.submitted_at}</td>
                                        <td className="px-4 py-2 text-[10px] font-medium text-gray-700 max-w-[160px] truncate">{ses.case_name}</td>

                                    label:'เครื่องมือไม่ถูกต้อง',
                                    detail:`เลือก: "${latest.chosen_tool}" → ที่ถูกต้อง: "${latest.correct_tool}"`

                                    icon:'fa-hand-holding-medical', color:'#7C3AED', bg:'#F5F3FF', border:'#DDD6FE',

                                      ))}
                                    </div>
                                  );
                                })()}
                              </div>
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>

        <p className="text-center text-[10px] text-gray-400 mt-6 font-medium">
          GeriSim AI Teacher Portal — ข้อมูลอัปเดตจาก Google Sheets แบบ Real-time
        </p>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
