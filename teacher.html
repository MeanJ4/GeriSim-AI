function AdminPanel({ onClose }) {
  const [authed,  setAuthed]  = useState(false);
  const [pw,      setPw]      = useState('');
  const [stats,   setStats]   = useState(null);
  const [view,    setView]    = useState('overview');  // overview | architecture
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState('');
  const pwRef = useRef('');

  const load = async (password) => {
    setLoading(true); setError('');
    try {
      const res = await post({ action:'admin_stats', password });
      if (res.status === 'success') { setStats(res.stats); setAuthed(true); pwRef.current = password; }
      else setError(res.message || 'รหัสผ่านไม่ถูกต้อง');
    } catch { setError('ไม่สามารถติดต่อเซิร์ฟเวอร์ได้'); }
    setLoading(false);
  };

  const submit = (e) => { e.preventDefault(); load(pw); };

  // ── Password gate ──────────────────────────────────────────────────────
  if (!authed) {
    return (
      <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
        style={{ background:'rgba(15,23,42,0.65)', backdropFilter:'blur(4px)' }}>
        <div className="w-full max-w-sm bg-white rounded-3xl shadow-2xl p-7 fade-in">
          <div className="text-center mb-5">
            <div className="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-3"
              style={{ background:'#1E3A5F' }}>
              <i className="fas fa-shield-halved text-white text-xl"></i>
            </div>
            <h2 className="text-lg font-black text-gray-800">ระบบผู้ดูแล (Admin)</h2>
            <p className="text-xs text-gray-400 mt-1">กรุณากรอกรหัสผ่านผู้ดูแลระบบ</p>
          </div>
          {error && (
            <div className="mb-4 px-4 py-2.5 rounded-xl text-xs font-medium text-red-700 fade-in"
              style={{ background:'#FEF2F2', border:'1.5px solid #FECACA' }}>
              <i className="fas fa-exclamation-circle mr-2"></i>{error}
            </div>
          )}
          <form onSubmit={submit} className="space-y-3">
            <input type="password" autoFocus required placeholder="รหัสผ่านผู้ดูแล"
              value={pw} onChange={e=>setPw(e.target.value)}
              className="w-full px-4 py-3 rounded-2xl border-2 text-sm font-medium outline-none transition"
              style={{ fontFamily:'Prompt,sans-serif', borderColor:'#E5E7EB' }}
              onFocus={e => e.target.style.borderColor='#1E3A5F'}
              onBlur={e => e.target.style.borderColor='#E5E7EB'} />
            <button type="submit" disabled={loading}
              className="w-full py-3.5 rounded-2xl font-black text-white text-sm flex items-center justify-center gap-2 disabled:opacity-50 transition"
              style={{ background:'#1E3A5F' }}>
              {loading
                ? <><i className="fas fa-spinner fa-spin"></i> กำลังตรวจสอบ...</>
                : <><i className="fas fa-unlock"></i> เข้าสู่ระบบผู้ดูแล</>}
            </button>
            <button type="button" onClick={onClose}
              className="w-full py-2.5 rounded-2xl font-bold text-xs text-gray-400 hover:text-gray-600 transition">
              ยกเลิก
            </button>
          </form>
        </div>
      </div>
    );
  }

  // ── Dashboard ──────────────────────────────────────────────────────────
  const maxAct  = Math.max(1, ...stats.activity.map(a => a.count));
  const distArr = [
    { label:'80–100%', key:'80-100', color:'#16A34A' },
    { label:'60–79%',  key:'60-79',  color:'#2563EB' },
    { label:'40–59%',  key:'40-59',  color:'#D97706' },
    { label:'0–39%',   key:'0-39',   color:'#DC2626' },

  const distTotal = Object.values(stats.score_distribution).reduce((a,b)=>a+b, 0) || 1;
  const maxUni    = Math.max(1, ...stats.top_universities.map(u => u.count));
  const shortDate = (d) => { const p = d.split('-'); return p[2] + '/' + p[1]; };

  return (
    <div className="fixed inset-0 z-50 overflow-y-auto" style={{ background:'#F1F5F9' }}>

        <div className="flex items-center gap-3">
          <div className="w-9 h-9 rounded-lg flex items-center justify-center" style={{ background:'rgba(255,255,255,0.15)' }}>
            <i className="fas fa-shield-halved text-white text-sm"></i>
          </div>
          <div>
            <p className="text-white font-black text-sm leading-none">ระบบผู้ดูแล GeriSim AI</p>
            <p className="text-[10px] font-medium leading-none mt-0.5" style={{ color:'rgba(255,255,255,0.55)' }}>ภาพรวมการใช้งานทั้งระบบ</p>

        <div className="flex items-center gap-2">
          <button onClick={() => load(pwRef.current)} disabled={loading}

          <button onClick={onClose}

            style={{ background:'rgba(255,255,255,0.12)', color:'rgba(255,255,255,0.85)' }}>

      </header>

      {/* ── Tabs ── */}
      <div className="px-4 lg:px-6 pt-3 max-w-7xl mx-auto w-full flex gap-2">
        {[
          { k:'overview',     icon:'fa-chart-pie', label:'ภาพรวมการใช้งาน' },
          { k:'architecture', icon:'fa-sitemap',   label:'สถาปัตยกรรมระบบฐานข้อมูล' },

      {view === 'overview' && (
      <div className="p-4 lg:p-6 max-w-7xl mx-auto w-full">

        {/* ── Summary cards ── */}
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
          <StatCard icon="fa-users"        label="ผู้ใช้ (นักศึกษา)" value={stats.total_students}  unit="คน"   color="#1E3A5F" bg="#EFF6FF" />
          <StatCard icon="fa-chalkboard-teacher" label="อาจารย์"     value={stats.total_teachers}  unit="คน"   color="#0EA5E9" bg="#E0F2FE" />
          <StatCard icon="fa-notes-medical" label="กรณีศึกษา"        value={stats.total_cases}     unit="เคส"  color="#7C3AED" bg="#F5F3FF" />
          <StatCard icon="fa-bolt"          label="จำนวนการใช้งาน"   value={stats.total_sessions}  unit="ครั้ง" color="#16A34A" bg="#F0FDF4" />
          <StatCard icon="fa-university"    label="มหาวิทยาลัย"       value={stats.universities}    unit="แห่ง" color="#D97706" bg="#FFFBEB" />
          <StatCard icon="fa-chart-line"    label="คะแนนเฉลี่ยรวม"    value={stats.avg_score}       unit="%"    color="#DB2777" bg="#FDF2F8" />
          <StatCard icon="fa-tools"         label="เลือกเครื่องมือถูก" value={stats.tool_accuracy}   unit="%"    color="#0D9488" bg="#F0FDFA" />
          <StatCard icon="fa-layer-group"   label="ใช้งานเฉลี่ย/คน"   value={stats.total_students ? (stats.total_sessions/stats.total_students).toFixed(1) : 0} unit="ครั้ง" color="#4F46E5" bg="#EEF2FF" />
        </div>

        {/* ── Activity graph (30 days) ── */}
        <div className="bg-white rounded-2xl shadow-sm p-5 mb-4">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-black text-gray-700">
              <i className="fas fa-chart-area mr-2 text-indigo-400"></i>กิจกรรมการใช้งานรายวัน (30 วันล่าสุด)
            </h3>
            <span className="text-[10px] font-bold text-gray-400">รวม {stats.activity.reduce((a,b)=>a+b.count,0)} ครั้ง</span>
          </div>
          <div className="flex items-end gap-[3px] h-44">
            {stats.activity.map((a, i) => (
              <div key={i} className="flex-1 flex flex-col justify-end items-center group relative" style={{ minWidth:0 }}>
                <div className="w-full rounded-t transition-all"
                  style={{ height:`${(a.count/maxAct)*100}%`, minHeight: a.count>0 ? '3px' : '0',
                           background: a.count>0 ? 'linear-gradient(180deg,#2563EB,#1E3A5F)' : 'transparent' }}></div>
                <div className="absolute bottom-full mb-1 px-2 py-1 rounded-lg text-[10px] font-bold text-white whitespace-nowrap opacity-0 group-hover:opacity-100 transition pointer-events-none z-10"
                  style={{ background:'#1E3A5F' }}>
                  {shortDate(a.date)} · {a.count} ครั้ง
                </div>
              </div>
            ))}
          </div>
          <div className="flex justify-between mt-2 text-[9px] font-bold text-gray-400">
            <span>{shortDate(stats.activity[0].date)}</span>
            <span>{shortDate(stats.activity[Math.floor(stats.activity.length/2)].date)}</span>
            <span>{shortDate(stats.activity[stats.activity.length-1].date)} (วันนี้)</span>
          </div>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
          {/* ── Score distribution ── */}
          <div className="bg-white rounded-2xl shadow-sm p-5">
            <h3 className="text-sm font-black text-gray-700 mb-4">
              <i className="fas fa-chart-pie mr-2 text-indigo-400"></i>การกระจายของคะแนนรวม
            </h3>
            <div className="space-y-3">
              {distArr.map(d => {
                const n = stats.score_distribution[d.key] || 0;
                const pct = Math.round((n/distTotal)*100);
                return (
                  <div key={d.key}>
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-xs font-bold text-gray-500">{d.label}</span>
                      <span className="text-xs font-black" style={{ color:d.color }}>{n} ครั้ง ({pct}%)</span>
                    </div>
                    <div className="w-full bg-gray-100 rounded-full h-2.5">
                      <div className="score-bar h-full rounded-full" style={{ width:`${pct}%`, background:d.color }}></div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* ── Top universities ── */}
          <div className="bg-white rounded-2xl shadow-sm p-5">
            <h3 className="text-sm font-black text-gray-700 mb-4">
              <i className="fas fa-university mr-2 text-indigo-400"></i>มหาวิทยาลัยที่ใช้งานสูงสุด (ตามจำนวนนักศึกษา)
            </h3>
            {stats.top_universities.length === 0 ? (
              <p className="text-xs text-gray-300 py-6 text-center">ยังไม่มีข้อมูล</p>
            ) : (
              <div className="space-y-3">
                {stats.top_universities.map((u, i) => (
                  <div key={i}>
                    <div className="flex items-center justify-between mb-1 gap-2">
                      <span className="text-xs font-bold text-gray-600 truncate" title={u.university}>{i+1}. {u.university}</span>
                      <span className="text-xs font-black text-indigo-600 shrink-0">{u.count} คน</span>
                    </div>
                    <div className="w-full bg-gray-100 rounded-full h-2.5">
                      <div className="score-bar h-full rounded-full" style={{ width:`${(u.count/maxUni)*100}%`, background:'linear-gradient(90deg,#7C3AED,#1E3A5F)' }}></div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        <p className="text-center text-[10px] text-gray-400 mt-6 mb-2 font-medium">
          GeriSim AI — แดชบอร์ดผู้ดูแลระบบ · ข้อมูลรวมจากทุกมหาวิทยาลัยแบบ Real-time
        </p>
      </div>
      )}

      {view === 'architecture' && (
      <div className="p-4 lg:p-6 max-w-7xl mx-auto w-full">
        <div className="bg-white rounded-2xl shadow-sm p-5">
          <div className="flex items-center justify-between mb-1 flex-wrap gap-2">
            <h3 className="text-sm font-black text-gray-700">
              <i className="fas fa-sitemap mr-2 text-indigo-400"></i>สถาปัตยกรรมระบบฐานข้อมูล GeriSim-AI
            </h3>
            <span className="text-[10px] font-bold px-2 py-1 rounded-lg" style={{ background:'#F0FDF4', color:'#15803D' }}>
              <i className="fas fa-shield-halved mr-1"></i>เอกสารยืนยันสถาปัตยกรรม (verification)
            </span>
          </div>
          <p className="text-[11px] text-gray-400 mb-3">
            แผนผังแสดงชั้นผู้ใช้งาน · ชั้น API (Google Apps Script) · บริการ AI และโครงสร้างตารางฐานข้อมูลพร้อมความสัมพันธ์ (PK / FK)
          </p>
          <div className="overflow-x-auto border border-gray-100 rounded-xl p-2" style={{ background:'#FCFDFF' }}>
            <div style={{ minWidth:'760px' }} dangerouslySetInnerHTML={{ __html: ARCH_DIAGRAM_SVG }} />
          </div>
        </div>
        <p className="text-center text-[10px] text-gray-400 mt-6 mb-2 font-medium">
          GeriSim AI — สถาปัตยกรรมระบบ จัดเก็บในระบบผู้ดูแลเพื่อการตรวจสอบ
        </p>
      </div>
      )}
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [page,      setPage]      = useState('login');  // login | register | dashboard
  const [auth,      setAuth]      = useState(null);
  const [loading,   setLoading]   = useState(false);
  const [error,     setError]     = useState('');
  const [students,  setStudents]  = useState([]);
  const [dataLoading, setDataLoading] = useState(false);
  const [search,    setSearch]    = useState('');
  const [expanded,  setExpanded]  = useState(null);  // email of expanded row
  const [sortKey,   setSortKey]   = useState('best_score');
  const [sortDir,   setSortDir]   = useState('desc');
  const [tab,       setTab]       = useState('login');  // login | register | reset (on auth page)
  const [regPassword, setRegPassword] = useState('');
  const [adminOpen, setAdminOpen] = useState(false);  // Admin overview panel

  // Restore session
  useEffect(() => {
    try {
      const saved = sessionStorage.getItem(AUTH_KEY);
      if (saved) {
        const a = JSON.parse(saved);
        setAuth(a);
        setPage('dashboard');
      }
    } catch {}
  }, []);

  // Load data when entering dashboard
  useEffect(() => {
    if (page === 'dashboard' && auth) loadData();
  }, [page, auth]);

  const loadData = async () => {
    setDataLoading(true);
    try {
      const res = await post({ action:'teacher_data', university: auth.university });
      if (res.status === 'success') setStudents(res.students || []);
    } catch (e) {
      console.error(e);
    } finally {
      setDataLoading(false);
    }
  };

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    const fd = new FormData(e.target);
    try {
      const res = await post({ action:'teacher_login', email: fd.get('email'), password: fd.get('password') });
      if (res.status === 'success') {
        const a = { teacher_name: res.teacher_name, email: res.email, university: res.university };
        sessionStorage.setItem(AUTH_KEY, JSON.stringify(a));
        setAuth(a); setPage('dashboard');
      } else {
        setError(res.message || 'เข้าสู่ระบบไม่สำเร็จ');
      }
    } catch { setError('ไม่สามารถติดต่อเซิร์ฟเวอร์ได้'); }
    setLoading(false);
  };

  const handleRegister = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    const fd = new FormData(e.target);
    if (fd.get('password') !== fd.get('confirm')) {
      setError('รหัสผ่านไม่ตรงกัน'); setLoading(false); return;
    }
    try {
      const res = await post({
        action:'teacher_register',
        email: fd.get('email'),
        password: fd.get('password'),
        teacher_name: fd.get('name'),
        university: fd.get('university')
      });
      if (res.status === 'success') {
        setError(''); setRegPassword(''); setTab('login');
        alert('ลงทะเบียนสำเร็จ กรุณาเข้าสู่ระบบ');
      } else {
        setError(res.message || 'ลงทะเบียนไม่สำเร็จ');
      }
    } catch { setError('ไม่สามารถติดต่อเซิร์ฟเวอร์ได้'); }
    setLoading(false);
  };

  const handleReset = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    const fd = new FormData(e.target);
    if (fd.get('new_password') !== fd.get('confirm')) {
      setError('รหัสผ่านไม่ตรงกัน'); setLoading(false); return;
    }
    try {
      const res = await post({
        action: 'teacher_resetPassword',
        email: fd.get('email'),
        teacher_name: fd.get('teacher_name'),
        new_password: fd.get('new_password'),
      });
      if (res.status === 'success') {
        setError(''); setRegPassword(''); setTab('login');
        alert('รีเซ็ตรหัสผ่านสำเร็จ กรุณาเข้าสู่ระบบด้วยรหัสผ่านใหม่');
      } else {
        setError(res.message || 'ไม่สามารถรีเซ็ตรหัสผ่านได้');
      }
    } catch { setError('ไม่สามารถติดต่อเซิร์ฟเวอร์ได้'); }
    setLoading(false);
  };

  const logout = () => {
    sessionStorage.removeItem(AUTH_KEY);
    setAuth(null); setStudents([]); setPage('login');
  };

  const toggleSort = (key) => {
    if (sortKey === key) setSortDir(d => d === 'desc' ? 'asc' : 'desc');
    else { setSortKey(key); setSortDir('desc'); }
  };

  const exportExcel = () => {
    const XLSX = window.XLSX;
    if (!XLSX) { alert('กำลังโหลด SheetJS กรุณารอสักครู่แล้วลองใหม่'); return; }

    // ── Sheet 1: Student summary ──────────────────────────────────────────
    const summaryHeader = ['ชื่อ Username','อีเมล','รหัสนักศึกษา','ครั้งที่ฝึก','Best Score (%)','Avg Score (%)','ล่าสุด'];
    const summaryRows = filtered.map(s => [
      s.student_name, s.email, s.student_id,
      s.session_count, s.best_score, s.avg_score, s.last_active
    ]);
    const ws1 = XLSX.utils.aoa_to_sheet([summaryHeader, ...summaryRows]);
    ws1['!cols'] = [28,32,16,12,14,14,16].map(w => ({ wch: w }));

    // ── Sheet 2: All sessions detail ──────────────────────────────────────
    const detailHeader = [
      'ชื่อ Username','อีเมล','รหัสนักศึกษา',
      'วันที่-เวลา','กรณีศึกษา',
      'เครื่องมือที่เลือก','เครื่องมือที่ถูก','ผลเครื่องมือ',
      'คะแนนประเมิน (%)','คะแนนคำแนะนำ (%)','คะแนนรวม (%)','ระยะเวลา'
    ];
    const detailRows = [];
    filtered.forEach(s => {
      s.sessions.forEach(ses => {
        detailRows.push([
          s.student_name, s.email, s.student_id,
          ses.submitted_at, ses.case_name,
          ses.chosen_tool, ses.correct_tool, ses.tool_match,
          ses.assessment_score, ses.intervention_score, ses.total_score, ses.duration
        ]);
      });
    });
    const ws2 = XLSX.utils.aoa_to_sheet([detailHeader, ...detailRows]);
    ws2['!cols'] = [24,28,14,20,28,20,20,12,14,14,12,12].map(w => ({ wch: w }));

    // ── Workbook ──────────────────────────────────────────────────────────
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws1, 'สรุปนักศึกษา');
    XLSX.utils.book_append_sheet(wb, ws2, 'ประวัติการฝึกทั้งหมด');

    const date = new Date().toLocaleDateString('th-TH').replace(/\//g, '-');
    XLSX.writeFile(wb, `GeriSim_${auth.university}_${date}.xlsx`);
  };

  // ── Derived data ─────────────────────────────────────────────────────────
  const filtered = students
    .filter(s => !search || s.student_name.includes(search) || s.student_id.includes(search) || s.email.includes(search))
    .sort((a, b) => {
      const av = a[sortKey] ?? 0, bv = b[sortKey] ?? 0;
      return sortDir === 'desc' ? (bv > av ? 1 : -1) : (av > bv ? 1 : -1);
    });

  const totalSessions = students.reduce((s,st) => s + st.session_count, 0);
  const avgScore      = students.length ? Math.round(students.reduce((s,st) => s + st.avg_score, 0) / students.length) : 0;
  const topStudent    = students.reduce((best,s) => (!best || s.best_score > best.best_score) ? s : best, null);

  // ── Auth page ─────────────────────────────────────────────────────────────
  if (page !== 'dashboard') {
    return (
      <div className="min-h-screen flex items-center justify-center p-4"
        style={{ background:'linear-gradient(135deg,#1E3A5F 0%,#2D1B69 100%)' }}>
        <div className="w-full max-w-md">
          {/* Logo */}
          <div className="text-center mb-8">
            <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-3"
              style={{ background:'rgba(255,255,255,0.15)', border:'2px solid rgba(255,255,255,0.25)' }}>
              <i className="fas fa-chalkboard-teacher text-white text-2xl"></i>
            </div>
            <h1 className="text-2xl font-black text-white">GeriSim AI</h1>
            <p className="text-sm font-medium mt-1" style={{ color:'rgba(255,255,255,0.6)' }}>ระบบดูแลผลการเรียนรู้ — สำหรับอาจารย์</p>
          </div>

          {/* ── Main card ── */}
          <div className="bg-white rounded-3xl shadow-2xl p-6 mb-3">
            {error && (
              <div className="mb-4 px-4 py-3 rounded-xl text-sm font-medium text-red-700 fade-in"
                style={{ background:'#FEF2F2', border:'1.5px solid #FECACA' }}>
                <i className="fas fa-exclamation-circle mr-2"></i>{error}
              </div>
            )}

            {tab === 'login' && (
              <form onSubmit={handleLogin} className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">อีเมล์ส่วนตัว หรือ อีเมล์มหาวิทยาลัย</label>
                  <input name="email" type="email" required placeholder="teacher@university.ac.th"
                    className="w-full px-4 py-3 rounded-2xl border-2 text-sm font-medium outline-none transition"
                    style={{ fontFamily:'Prompt,sans-serif', borderColor:'#E5E7EB' }}
                    onFocus={e => e.target.style.borderColor='#1E3A5F'}
                    onBlur={e => e.target.style.borderColor='#E5E7EB'} />
                </div>
                <div>
                  <label className="block text-xs font-bold text-gray-500 mb-1.5 uppercase tracking-wider">รหัสผ่าน</label>
                  <input name="password" type="password" required placeholder="รหัสผ่าน"
                    className="w-full px-4 py-3 rounded-2xl border-2 text-sm font-medium outline-none transition"
                    style={{ fontFamily:'Prompt,sans-serif', borderColor:'#E5E7EB' }}
                    onFocus={e => e.target.style.borderColor='#1E3A5F'}
                    onBlur={e => e.target.style.borderColor='#E5E7EB'} />
                </div>
                {/* Forgot password — same style as student login */}
                <div className="flex justify-end">
                  <button type="button" onClick={() => { setTab('reset'); setError(''); }}
                    className="text-xs font-bold flex items-center gap-1"
                    style={{ color:'#1E3A5F' }}>
                    <i className="fas fa-key text-[10px]"></i> ลืมรหัสผ่าน?
                  </button>
                </div>
                <button type="submit" disabled={loading}
                  className="w-full py-4 rounded-2xl font-black text-white text-base flex items-center justify-center gap-2 disabled:opacity-50 transition"
                  style={{ background:'#1E3A5F', boxShadow:'6px 6px 14px rgba(30,58,95,0.45),-4px -4px 10px rgba(255,255,255,0.12)' }}>
                  {loading
                    ? <><i className="fas fa-spinner fa-spin"></i> กำลังเข้าสู่ระบบ...</>
                    : <><i className="fas fa-arrow-right"></i> เข้าสู่ระบบ</>}
                </button>
              </form>
            )}

            {tab === 'register' && (
              <form onSubmit={handleRegister} className="space-y-3">

                                      <div className="rounded-xl px-3 py-2.5" style={{ background:'linear-gradient(135deg,#1E3A5F,#2D1B69)', border:'1.5px solid #1E3A5F' }}>
                                        <div className="flex items-center gap-1.5 mb-1">
                                          <i className="fas fa-star text-[9px] text-yellow-300"></i>
                                          <span className="text-[9px] font-bold text-indigo-200">คะแนนรวม</span>
                                        </div>
                                        <div className="flex items-end gap-1">
                                          <span className="text-lg font-black leading-none text-white">{avgTot}</span>
                                          <span className="text-[9px] text-indigo-300 mb-0.5">%</span>
                                        </div>
                                        <div className="w-full rounded-full mt-1.5" style={{ height:'4px', background:'rgba(255,255,255,0.15)' }}>
                                          <div className="score-bar h-full rounded-full" style={{ width:`${avgTot}%`, background:'#FCD34D' }} />
                                        </div>
                                        <span className="text-[8px] text-indigo-300 mt-0.5 block">100 คะแนน</span>
                                      </div>
                                    </div>
                                  </div>
                                );
                              })()}

                              <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                  <thead>
                                    <tr style={{ background:'#EEF2FF' }}>
                                      {['วันที่','กรณีศึกษา','เครื่องมือที่เลือก','เครื่องมือที่ถูก','ผลเครื่องมือ','คะแนนประเมิน','คะแนนวางแผนทางการพยาบาล','คะแนนรวม','ระยะเวลา']
                                        .map(h => (
                                          <th key={h} className="px-4 py-2 text-[9px] font-black text-indigo-500 uppercase tracking-wider whitespace-nowrap">{h}</th>
                                        ))}
                                    </tr>
                                  </thead>
                                  <tbody className="divide-y divide-indigo-50">
                                    {s.sessions.length === 0 ? (
                                      <tr><td colSpan={9} className="px-4 py-4 text-xs text-gray-400 text-center">ยังไม่มีข้อมูล</td></tr>
                                    ) : s.sessions.map((ses, si) => (
                                      <tr key={si} style={{ background: si%2===0 ? 'white' : '#F9FAFB' }}>
                                        <td className="px-4 py-2 text-[10px] text-gray-500 whitespace-nowrap">{ses.submitted_at}</td>
                                        <td className="px-4 py-2 text-[10px] font-medium text-gray-700 max-w-[160px] truncate">{ses.case_name}</td>
                                        <td className="px-4 py-2 text-[10px] text-gray-600">{ses.chosen_tool}</td>
                                        <td className="px-4 py-2 text-[10px] text-gray-600">{ses.correct_tool}</td>
                                        <td className="px-4 py-2">
                                          <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded-md ${ses.tool_match==='ถูกต้อง' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                            {ses.tool_match}
                                          </span>
                                        </td>
                                        <td className="px-4 py-2"><ScorePill score={ses.assessment_score} /></td>
                                        <td className="px-4 py-2"><ScorePill score={ses.intervention_score} /></td>
                                        <td className="px-4 py-2">
                                          <span className="font-black text-xs" style={{ color: scoreColor(ses.total_score) }}>{ses.total_score}%</span>
                                        </td>
                                        <td className="px-4 py-2 text-[10px] text-gray-400">{ses.duration}</td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>

                                {/* Error report for latest session */}
                                {s.sessions.length > 0 && (() => {
                                  const latest = s.sessions[0];
                                  const issues = [];
                                  if (latest.tool_match === 'ผิด') issues.push({
                                    icon:'fa-tools', color:'#DC2626', bg:'#FEF2F2', border:'#FECACA',
                                    label:'เครื่องมือไม่ถูกต้อง',
                                    detail:`เลือก: "${latest.chosen_tool}" → ที่ถูกต้อง: "${latest.correct_tool}"`
                                  });
                                  if (latest.assessment_score < 60) issues.push({
                                    icon:'fa-clipboard-check', color:'#D97706', bg:'#FFFBEB', border:'#FDE68A',
                                    label:'คะแนนประเมินต่ำ',
                                    detail:`ได้ ${latest.assessment_score}% — ควรทบทวนเกณฑ์การประเมิน`
                                  });
                                  if (latest.intervention_score < 60) issues.push({
                                    icon:'fa-hand-holding-medical', color:'#7C3AED', bg:'#F5F3FF', border:'#DDD6FE',
                                    label:'คะแนนวางแผนทางการพยาบาลต่ำ',
                                    detail:`ได้ ${latest.intervention_score}% — ควรทบทวนการวางแผนทางการพยาบาล`
                                  });
                                  if (issues.length === 0) return null;
                                  return (
                                    <div className="px-5 py-3 space-y-2 border-t border-indigo-50">
                                      <p className="text-[10px] font-black text-gray-500 uppercase tracking-wider mb-2">
                                        <i className="fas fa-exclamation-triangle mr-1 text-amber-400"></i>
                                        จุดที่ควรพัฒนา (ครั้งล่าสุด)
                                      </p>
                                      {issues.map((iss, ii) => (
                                        <div key={ii} className="flex items-start gap-2 px-3 py-2 rounded-xl text-xs"
                                          style={{ background: iss.bg, border:`1.5px solid ${iss.border}` }}>
                                          <i className={`fas ${iss.icon} mt-0.5 shrink-0`} style={{ color: iss.color }}></i>
                                          <div>
                                            <span className="font-bold" style={{ color: iss.color }}>{iss.label}: </span>
                                            <span className="text-gray-600">{iss.detail}</span>
                                          </div>
                                        </div>
                                      ))}
                                    </div>
                                  );
                                })()}
                              </div>
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>

        <p className="text-center text-[10px] text-gray-400 mt-6 font-medium">
          GeriSim AI Teacher Portal — ข้อมูลอัปเดตจาก Google Sheets แบบ Real-time
        </p>
      </div>

      {adminOpen && <AdminPanel onClose={() => setAdminOpen(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
