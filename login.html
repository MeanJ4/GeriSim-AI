<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GeriSim AI — เข้าสู่ระบบ</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; height:100dvh; overflow:hidden;
                 font-family:'Prompt',sans-serif; background:#111827; }
    #root { width:100%; height:100%; }
    @keyframes slideUp   { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .animate-slideUp { animation:slideUp 0.3s ease-out forwards; }
    .no-scrollbar::-webkit-scrollbar { display:none; }

    /* ── Login → Home transition overlay ── */
    @keyframes tFadeIn  { from{opacity:0} to{opacity:1} }
    @media (min-width:1024px) {
      .lg-no-overlap { margin-top:0 !important; border-top-left-radius:0 !important; border-top-right-radius:0 !important; }
    }
    @keyframes tFadeOut { from{opacity:1} to{opacity:0} }
    @keyframes tPulse   { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes tDotWave { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-8px);opacity:1} }
    @keyframes tNameIn  { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes tRingGrow{ from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }

    #transitionOverlay {
      position:fixed; inset:0; z-index:9999;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background: linear-gradient(160deg,#1e0a3c 0%,#3b1278 55%,#6d28d9 100%);
      opacity:0; pointer-events:none;
      will-change: opacity;
    }
    #transitionOverlay.active {
      animation: tFadeIn .35s ease forwards;
      pointer-events:all;
    }
    #transitionOverlay.leaving { animation: tFadeOut .4s ease forwards; }
    .t-ring {
      width:110px; height:110px; border-radius:50%;
      border:3px solid rgba(255,255,255,.15);
      display:flex; align-items:center; justify-content:center;
      animation: tRingGrow .5s cubic-bezier(.34,1.56,.64,1) .1s both;
      box-shadow: 0 0 40px rgba(139,92,246,.5);
      will-change: transform, opacity;
    }
    .t-avatar {
      width:88px; height:88px; border-radius:50%;
      background:rgba(255,255,255,.12);
      display:flex; align-items:center; justify-content:center;
      font-size:2.8rem; animation: tPulse 2s ease-in-out infinite;
      will-change: transform;
    }
    .t-name {
      margin-top:1.5rem; font-size:1.35rem; font-weight:700;
      color:#fff; letter-spacing:.03em; text-align:center;
      animation: tNameIn .5s ease .4s both;
      will-change: opacity, transform;
    }
    .t-sub {
      margin-top:.35rem; font-size:.8rem; color:rgba(255,255,255,.55);
      animation: tNameIn .5s ease .55s both;
      will-change: opacity, transform;
    }
    .t-dots { display:flex; gap:7px; margin-top:2.2rem; animation: tNameIn .4s ease .7s both; }
    .t-dots span {
      width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.7);
      animation: tDotWave 1.2s ease-in-out infinite;
      will-change: transform, opacity;
    }
    .t-dots span:nth-child(2){ animation-delay:.15s }
    .t-dots span:nth-child(3){ animation-delay:.3s }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- ── Login → Home transition overlay (plain DOM, outside React) ── -->
  <div id="transitionOverlay">
    <div class="t-ring">
      <div class="t-avatar" id="tAvatar"></div>
    </div>
    <div class="t-name" id="tName"></div>
    <div class="t-sub" id="tSub"></div>
    <div class="t-dots"><span></span><span></span><span></span></div>
  </div>

  <script>
  var TRANSITION_GAS_URL = 'https://script.google.com/macros/s/AKfycbzvubNbpyZonn6qK3OIZZiKcvOy6dM124pyfa275SvTX8t0PesB2r-oRmAxwR7EX9EUXg/exec';
  var TRANSITION_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTa-StWVtjKA9v2xWRRhCO8qr-P3iwu8S_yx5BH6_2UgDk31NFF1RfsdXSKmYn4gu3tKa1XMiYL94r_/pub?output=csv&gid=0';

  // ── Parse CSV text → array of header-keyed objects (minimal version) ──
  function parseTransitionCSV(text) {
    var lines = text.split(/\r?\n/).filter(function(l){ return l.trim(); });
    if (lines.length < 2) return [];
    var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/^"|"$/g,''); });
    return lines.slice(1).map(function(line) {
      var vals = [], cur = '', inQ = false;
      for (var i = 0; i < line.length; i++) {
        var ch = line[i];
        if (ch === '"' && !inQ) { inQ = true; }
        else if (ch === '"' && inQ && line[i+1] === '"') { cur += '"'; i++; }
        else if (ch === '"' && inQ) { inQ = false; }
        else if (ch === ',' && !inQ) { vals.push(cur); cur = ''; }
        else { cur += ch; }
      }
      vals.push(cur);
      var obj = {};
      headers.forEach(function(h, i){ obj[h] = (vals[i] || '').trim(); });
      return obj;
    }).filter(function(r){ return r['case_id'] && r['case_id'].trim(); });
  }

  // ── Fetch a random case: CSV first, GAS fallback ──────────────────────
  function fetchTransitionCase() {
    return fetch(TRANSITION_CSV_URL)
      .then(function(r){ return r.text(); })
      .then(function(text) {
        var rows = parseTransitionCSV(text);
        if (!rows.length) throw new Error('empty CSV');
        var row = rows[Math.floor(Math.random() * rows.length)];
        // Gather q1–q15
        var q = [];
        for (var i = 1; i <= 15; i++) q.push(row['q' + i] || '');
        return {
          case_id: row['case_id'] || '', submitted_at: row['submitted_at'] || '',
          patient_name: row['patient_name'] || '', gender: row['gender'] || '',
          age_years: parseInt(row['age_years']) || 0, age_months: parseInt(row['age_months']) || 0,
          ethnicity: row['ethnicity'] || '', religion: row['religion'] || '',
          marital_status: row['marital_status'] || '', hometown: row['hometown'] || '',
          occupation: row['occupation'] || '', occupation_detail: row['occupation_detail'] || '',
          community_participation: row['community_participation'] || '', community_detail: row['community_detail'] || '',
          weight_kg: row['weight_kg'] || '', height_cm: row['height_cm'] || '',
          bmi: row['bmi'] || '', waist_cm: row['waist_cm'] || '',
          pulse_rate: row['pulse_rate'] || '', pulse_strength: row['pulse_strength'] || '',
          pulse_rhythm: row['pulse_rhythm'] || '', blood_pressure: row['blood_pressure'] || '',
          bp_position: row['bp_position'] || '', vision: row['vision'] || '', hearing: row['hearing'] || '',
          health_perception: row['health_perception'] || '', health_comparison: row['health_comparison'] || '',
          medical_devices_yn: row['medical_devices_yn'] || '', medical_devices_detail: row['medical_devices_detail'] || '',
          health_facility: row['health_facility'] || '', assessment_location: row['assessment_location'] || '',
          symptom_group: row['symptom_group'] || '',
          q1:q[0],q2:q[1],q3:q[2],q4:q[3],q5:q[4],q6:q[5],q7:q[6],q8:q[7],
          q9:q[8],q10:q[9],q11:q[10],q12:q[11],q13:q[12],q14:q[13],q15:q[14],
          correct_tool: row['correct_tool'] || '', score_min: parseInt(row['score_min']) || 0,
          score_max: parseInt(row['score_max']) || 100,
          expected_interventions: row['expected_interventions']
            ? row['expected_interventions'].split('|').map(function(s){return s.trim();}).filter(Boolean) : [],
          system_prompt: row['system_prompt'] || ''
        };
      })
      .catch(function() {
        // GAS fallback
        return fetch(TRANSITION_GAS_URL, { method:'POST', body: JSON.stringify({ action:'getCase' }) })
          .then(function(r){ return r.json(); })
          .then(function(d){ if (d.status === 'success' && d.case) return d.case; throw new Error('no case'); });
      });
  }

  // ── Transition function — called from React after login success ───────
  window.showLoginTransition = function() {
    var el = document.getElementById('transitionOverlay');
    var nameEl = document.getElementById('tName');
    var subEl  = document.getElementById('tSub');
    var avatarEl = document.getElementById('tAvatar');

    // Show overlay immediately with loading state
    avatarEl.textContent = '👵';
    nameEl.textContent   = 'กำลังโหลดกรณีศึกษา...';
    subEl.textContent    = 'กรุณารอสักครู่';
    el.classList.add('active');

    var navigateTimer = null;
    var caseReady = false;
    var minTimeReady = false;

    function doNavigate() {
      if (!caseReady || !minTimeReady) return;
      el.classList.add('leaving');
      setTimeout(function(){ window.location.href = 'home.html'; }, 420);
    }

    // Minimum display time: 1.8s so user can read the name
    setTimeout(function(){ minTimeReady = true; doNavigate(); }, 1800);

    // Fetch real case from Proposition_DB
    fetchTransitionCase()
      .then(function(caseObj) {
        var name    = caseObj.patient_name || '';
        var gender  = caseObj.gender || '';
        var age     = caseObj.age_years || '';
        var isMale  = gender.includes('ชาย');
        var title   = (!name && gender)
          ? (isMale ? 'คุณตา' : 'คุณยาย')
          : '';
        avatarEl.textContent = isMale ? '👴' : '👵';
        nameEl.textContent   = name || (isMale ? 'คุณตา' : 'คุณยาย');
        subEl.textContent    = (age ? 'อายุ ' + age + ' ปี • ' : '') + 'กรณีศึกษาวันนี้';
        // Save full case so home.html can use it instantly (no duplicate fetch)
        try { sessionStorage.setItem('_preloadedCase', JSON.stringify(caseObj)); } catch(e) {}
        caseReady = true;
        doNavigate();
      })
      .catch(function() {
        // If fetch fails entirely, just navigate after min time
        caseReady = true;
        doNavigate();
      });
  };
  </script>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzvubNbpyZonn6qK3OIZZiKcvOy6dM124pyfa275SvTX8t0PesB2r-oRmAxwR7EX9EUXg/exec';

    const NURSING_UNIVERSITIES = [
      'จุฬาลงกรณ์มหาวิทยาลัย','มหาวิทยาลัยเกษตรศาสตร์','มหาวิทยาลัยขอนแก่น',
      'มหาวิทยาลัยเชียงใหม่','มหาวิทยาลัยทักษิณ','มหาวิทยาลัยเทคโนโลยีราชมงคลธัญบุรี',
      'มหาวิทยาลัยเทคโนโลยีสุรนารี','มหาวิทยาลัยธรรมศาสตร์','มหาวิทยาลัยนครพนม',
      'มหาวิทยาลัยนราธิวาสราชนครินทร์','มหาวิทยาลัยนเรศวร','มหาวิทยาลัยนวมินทราธิราช',
      'มหาวิทยาลัยบูรพา','มหาวิทยาลัยพะเยา','มหาวิทยาลัยมหาสารคาม',
      'มหาวิทยาลัยมหิดล (คณะพยาบาลศาสตร์ ศิริราช)','มหาวิทยาลัยมหิดล (โรงเรียนพยาบาลรามาธิบดี)',
      'มหาวิทยาลัยแม่ฟ้าหลวง','มหาวิทยาลัยราชภัฏกำแพงเพชร','มหาวิทยาลัยราชภัฏชัยภูมิ',
      'มหาวิทยาลัยราชภัฏเชียงราย','มหาวิทยาลัยราชภัฏธนบุรี','มหาวิทยาลัยราชภัฏนครปฐม',
      'มหาวิทยาลัยราชภัฏนครราชสีมา','มหาวิทยาลัยราชภัฏบุรีรัมย์','มหาวิทยาลัยราชภัฏพิบูลสงคราม',
      'มหาวิทยาลัยราชภัฏเพชรบุรี','มหาวิทยาลัยราชภัฏเพชรบูรณ์','มหาวิทยาลัยราชภัฏร้อยเอ็ด',
      'มหาวิทยาลัยราชภัฏรำไพพรรณี','มหาวิทยาลัยราชภัฏสวนสุนันทา','มหาวิทยาลัยราชภัฏสุราษฎร์ธานี',
      'มหาวิทยาลัยราชภัฏอุดรธานี','มหาวิทยาลัยราชภัฏอุบลราชธานี','มหาวิทยาลัยวลัยลักษณ์',
      'มหาวิทยาลัยศรีนครินทรวิโรฒ','มหาวิทยาลัยสงขลานครินทร์ (วิทยาเขตหาดใหญ่)',
      'มหาวิทยาลัยสงขลานครินทร์ (วิทยาเขตปัตตานี)','มหาวิทยาลัยสวนดุสิต',
      'มหาวิทยาลัยสุโขทัยธรรมาธิราช','มหาวิทยาลัยอุบลราชธานี',
      'ราชวิทยาลัยจุฬาภรณ์','วิทยาลัยพยาบาลกองทัพบก','วิทยาลัยพยาบาลกองทัพเรือ',
      'วิทยาลัยพยาบาลตำรวจ','วิทยาลัยพยาบาลทหารอากาศ',
      'สถาบันการพยาบาลศรีสวรินทิรา สภากาชาดไทย',
    ];

    // ── Bottom sheet wrapper (must be outside LoginApp to stay stable) ──
    function BottomSheet({ title, icon, iconBg, onClose, children, onSubmit, submitLabel, submitIcon, isLoading }) {
      return (
        <div className="absolute inset-0 bg-black/50 z-50 flex flex-col justify-end">
          <div className="bg-white w-full rounded-t-3xl p-6 flex flex-col animate-slideUp"
            style={{boxShadow:'0 -8px 40px rgba(0,0,0,0.12)'}}>
            <div className="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-5"></div>
            <div className="flex justify-between items-center mb-5">
              <h3 className="font-black text-gray-800 text-base flex items-center gap-2">
                <span className="w-8 h-8 rounded-2xl flex items-center justify-center" style={{background: iconBg || '#9146FF'}}>
                  <i className={`fas ${icon} text-white text-xs`}></i>
                </span>{title}
              </h3>
              <button onClick={onClose} className="w-8 h-8 rounded-full flex items-center justify-center bg-gray-100">
                <i className="fas fa-times text-gray-500 text-xs"></i>
              </button>
            </div>
            <div className="space-y-3 mb-4 overflow-y-auto no-scrollbar" style={{maxHeight:'55vh'}}>
              {children}
            </div>
            <button onClick={onSubmit} disabled={isLoading}
              className="w-full py-4 rounded-2xl font-black text-white flex items-center justify-center gap-2 disabled:opacity-50"
              style={{background: iconBg || '#9146FF', boxShadow:'6px 6px 14px rgba(80,20,180,0.55),-4px -4px 10px rgba(255,255,255,0.18)'}}>
              {isLoading
                ? <><i className="fas fa-spinner fa-spin"></i> กำลังดำเนินการ...</>
                : <><i className={`fas ${submitIcon}`}></i> {submitLabel}</>}
            </button>
          </div>
        </div>
      );
    }

    // ── Shared styled input ────────────────────────────────────────────
    function Field({ icon, ph, val, fn, type='text', onEnter }) {
      return (
        <div className="relative">
          <span className="absolute left-3.5 top-3.5" style={{color:'#9146FF'}}>
            <i className={`fas ${icon} text-sm`}></i>
          </span>
          <input type={type} placeholder={ph} value={val} onChange={fn}
            onKeyPress={onEnter ? (e=>e.key==='Enter'&&onEnter()) : undefined}
            className="w-full rounded-2xl py-3 pl-10 pr-4 text-sm font-medium focus:outline-none text-gray-800"
            style={{background:'#fff',border:'1.5px solid #E5E7EB'}}
            onFocus={e=>{e.target.style.border='1.5px solid #9146FF'}}
            onBlur={e=>{e.target.style.border='1.5px solid #E5E7EB'}}/>
        </div>
      );
    }

    function LoginApp() {
      const [email,        setEmail]        = useState('');
      const [password,     setPassword]     = useState('');
      const [isLoading,    setIsLoading]    = useState(false);

      // Register state
      const [showRegister,  setShowRegister]  = useState(false);
      const [regEmail,      setRegEmail]      = useState('');
      const [regId,         setRegId]         = useState('');
      const [regName,       setRegName]       = useState('');
      const [regUniversity, setRegUniversity] = useState('');
      const [regPassword,   setRegPassword]   = useState('');
      const [regConfirm,    setRegConfirm]    = useState('');

      // Forgot password state
      const [showReset,    setShowReset]    = useState(false);
      const [resetEmail,   setResetEmail]   = useState('');
      const [resetName,    setResetName]    = useState('');
      const [resetNewPass, setResetNewPass] = useState('');
      const [resetConfirm, setResetConfirm] = useState('');

      // ── Login ────────────────────────────────────────────────────────
      const handleLogin = async () => {
        if (!email.trim())    { alert('กรุณากรอกอีเมล'); return; }
        if (!password.trim()) { alert('กรุณากรอกรหัสผ่าน'); return; }
        setIsLoading(true);
        try {
          const res  = await fetch(GAS_URL, { method:'POST',
            body: JSON.stringify({ action:'login', email:email.trim(), password:password.trim() }) });
          const data = await res.json();
          if (data.status === 'success') {
            sessionStorage.setItem('gerisim_auth', JSON.stringify({
              email        : data.email        || email.trim(),
              studentId    : data.student_id   || '',
              studentName  : data.student_name || email.trim(),
              university   : data.university   || '',
              gold_badges  : data.gold_badges  || 0,
              silver_badges: data.silver_badges|| 0,
              bronze_badges: data.bronze_badges|| 0,
            }));
            window.showLoginTransition(data.student_name || email.trim());
          } else {
            alert(data.message || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง');
          }
        } catch (err) {
          alert('ไม่สามารถเชื่อมต่อระบบได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต');
        } finally {
          setIsLoading(false);
        }
      };

      // ── Register ─────────────────────────────────────────────────────
      const handleRegister = async () => {
        if (!regEmail.trim())      { alert('กรุณากรอกอีเมล'); return; }
        if (!regName.trim())       { alert('กรุณากรอกชื่อ-นามสกุล'); return; }
        if (!regUniversity.trim()) { alert('กรุณาเลือกมหาวิทยาลัย'); return; }
        if (!regPassword.trim())         { alert('กรุณากรอกรหัสผ่าน'); return; }
        if (regPassword.trim().length < 8) { alert('รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร'); return; }
        if (regPassword !== regConfirm)  { alert('รหัสผ่านและการยืนยันรหัสผ่านไม่ตรงกัน'); return; }
        setIsLoading(true);
        try {
          const res  = await fetch(GAS_URL, { method:'POST',
            body: JSON.stringify({ action:'register', email:regEmail.trim(),
              student_id:regId.trim(), student_name:regName.trim(),
              university:regUniversity.trim(), password:regPassword.trim() }) });
          const data = await res.json();
          if (data.status === 'success') {
            alert('✅ ลงทะเบียนสำเร็จ! กรุณาเข้าสู่ระบบ');
            setShowRegister(false);
            setEmail(regEmail.trim());
            setPassword(regPassword.trim());
            setRegEmail(''); setRegId(''); setRegName(''); setRegUniversity(''); setRegPassword(''); setRegConfirm('');
          } else {
            alert('⚠️ ' + (data.message || 'ไม่สามารถลงทะเบียนได้'));
          }
        } catch (err) {
          alert('ไม่สามารถเชื่อมต่อระบบได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต');
        } finally {
          setIsLoading(false);
        }
      };

      // ── Reset password ───────────────────────────────────────────────
      const handleReset = async () => {
        if (!resetEmail.trim())   { alert('กรุณากรอกอีเมล'); return; }
        if (!resetName.trim())    { alert('กรุณากรอกชื่อ-นามสกุลที่ลงทะเบียนไว้'); return; }
        if (!resetNewPass.trim()) { alert('กรุณากรอกรหัสผ่านใหม่'); return; }
        if (resetNewPass.length < 8) { alert('รหัสผ่านใหม่ต้องมีอย่างน้อย 8 ตัวอักษร'); return; }
        if (resetNewPass !== resetConfirm) { alert('รหัสผ่านใหม่และการยืนยันไม่ตรงกัน'); return; }
        setIsLoading(true);
        try {
          const res  = await fetch(GAS_URL, { method:'POST',
            body: JSON.stringify({ action:'resetPassword', email:resetEmail.trim(),
              student_name:resetName.trim(), new_password:resetNewPass.trim() }) });
          const data = await res.json();
          if (data.status === 'success') {
            alert('✅ รีเซ็ตรหัสผ่านสำเร็จ กรุณาเข้าสู่ระบบด้วยรหัสผ่านใหม่');
            setShowReset(false);
            setEmail(resetEmail.trim());
            setPassword(resetNewPass.trim());
            setResetEmail(''); setResetName(''); setResetNewPass(''); setResetConfirm('');
          } else {
            alert('⚠️ ' + (data.message || 'ไม่สามารถรีเซ็ตรหัสผ่านได้'));
          }
        } catch (err) {
          alert('ไม่สามารถเชื่อมต่อระบบได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต');
        } finally {
          setIsLoading(false);
        }
      };

      // ── UI ───────────────────────────────────────────────────────────
      return (
        <div className="fixed inset-0 flex items-center justify-center bg-gray-900 lg:p-6">
          <div className="relative w-full max-w-md lg:max-w-4xl h-full max-h-[900px] lg:max-h-[660px] overflow-hidden shadow-2xl flex flex-col lg:flex-row rounded-none lg:rounded-3xl"
            style={{fontFamily:"'Prompt',sans-serif"}}>

            {/* ── LEFT PANEL (desktop only) ── */}
            <div className="hidden lg:flex w-[42%] flex-col items-center justify-center px-10 py-12 flex-none"
              style={{background:'linear-gradient(160deg,#4c1d95 0%,#7c3aed 55%,#9146FF 100%)'}}>
              <div className="w-20 h-20 rounded-3xl flex items-center justify-center mb-5"
                style={{background:'rgba(255,255,255,0.15)',border:'2px solid rgba(255,255,255,0.3)'}}>
                <i className="fas fa-person-cane text-4xl text-white"></i>
              </div>
              <h1 className="text-4xl font-black text-white tracking-tight mb-2">GeriSim AI</h1>
              <p className="text-sm text-center leading-relaxed mb-8" style={{color:'#DDD6FE'}}>
                ระบบจำลองผู้สูงอายุเพื่อฝึกสมรรถนะ<br/>การประเมินสุขภาพสำหรับนักศึกษาพยาบาล
              </p>
              <div className="w-full space-y-3">
                {[
                  {icon:'fa-robot',     text:'AI ผู้สูงอายุจำลองที่สมจริง'},
                  {icon:'fa-chart-line',text:'วัดประสิทธิภาพการใช้งาน'},
                  {icon:'fa-trophy',    text:'ระบบ Badge และ Leaderboard'},
                  {icon:'fa-hospital',  text:'รองรับทุกมหาวิทยาลัยพยาบาล'},
                ].map((f,i)=>(
                  <div key={i} className="flex items-center gap-3 px-4 py-3 rounded-2xl"
                    style={{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.15)'}}>
                    <i className={`fas ${f.icon} w-5 text-center`} style={{color:'rgba(255,255,255,0.8)'}}></i>
                    <span className="text-sm font-medium" style={{color:'rgba(255,255,255,0.9)'}}>{f.text}</span>
                  </div>
                ))}
              </div>
              <span className="text-xs font-semibold mt-8" style={{color:'#C4B5FD'}}>v3.4.9</span>
            </div>

            {/* ── RIGHT PANEL ── */}
            <div className="relative flex-1 flex flex-col overflow-hidden" style={{background:'#EEE8FF'}}>

              {/* Top panel (mobile only) */}
              <div className="lg:hidden flex flex-col items-center pt-12 pb-10 px-6 flex-none"
                style={{background:'#9146FF'}}>
                <div className="w-16 h-16 rounded-3xl flex items-center justify-center mb-3"
                  style={{background:'#fff',boxShadow:'0 4px 16px rgba(2,132,199,0.25)'}}>
                  <i className="fas fa-person-cane text-3xl" style={{color:'#9146FF'}}></i>
                </div>
                <h1 className="text-3xl font-black text-white tracking-tight mb-1">GeriSim AI</h1>
                <p className="text-[11px] text-center font-medium leading-relaxed" style={{color:'#DDD6FE'}}>
                  ฝึกสมรรถนะการประเมินสุขภาพผู้สูงอายุ
                </p>
                <span className="text-[10px] font-semibold mt-1 px-2 py-0.5 rounded-full"
                  style={{background:'rgba(255,255,255,0.15)',color:'#EDE9FE'}}>
                  v3.4.9
                </span>
              </div>

              {/* Desktop header */}
              <div className="hidden lg:flex items-center gap-3 px-8 pt-7 pb-3">
                <div className="w-10 h-10 rounded-2xl flex items-center justify-center flex-none"
                  style={{background:'#9146FF'}}>
                  <i className="fas fa-sign-in-alt text-white text-sm"></i>
                </div>
                <div>
                  <p className="font-black text-gray-800 text-base leading-tight">เข้าสู่ระบบ</p>
                  <p className="text-xs text-gray-400">ป้อนข้อมูลบัญชีของคุณเพื่อเริ่มการฝึก</p>
                </div>
              </div>

              {/* Login card area */}
              <div className="flex-1 px-5 lg:px-8 pt-5 pb-5 flex flex-col justify-between overflow-y-auto no-scrollbar lg-no-overlap"
                style={{background:'#EEE8FF',borderTopLeftRadius:'2rem',borderTopRightRadius:'2rem',marginTop:'-2rem'}}>
                <div className="bg-white rounded-3xl p-5 mb-3"
                  style={{boxShadow:'8px 8px 16px rgba(109,40,217,0.15),-8px -8px 16px rgba(255,255,255,0.9)'}}>
                  <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3 flex items-center gap-1.5">
                    <i className="fas fa-sign-in-alt" style={{color:'#9146FF'}}></i> เข้าสู่ระบบ
                  </p>
                  <div className="space-y-3 mb-3">
                    <Field icon="fa-envelope" ph="อีเมล (Email)" val={email} fn={e=>setEmail(e.target.value)} type="email" />
                    <Field icon="fa-lock"    ph="รหัสผ่าน (Password)" val={password} fn={e=>setPassword(e.target.value)} type="password" onEnter={handleLogin} />
                  </div>
                  {/* Forgot password link */}
                  <div className="flex justify-end mb-3">
                    <button onClick={()=>setShowReset(true)} disabled={isLoading}
                      className="text-xs font-bold flex items-center gap-1"
                      style={{color:'#9146FF'}}>
                      <i className="fas fa-key text-[10px]"></i> ลืมรหัสผ่าน?
                    </button>
                  </div>
                  <button onClick={handleLogin} disabled={isLoading}
                    className="w-full py-4 rounded-2xl font-black text-white text-base flex items-center justify-center gap-2 disabled:opacity-50"
                    style={{background:'#9146FF',boxShadow:'6px 6px 14px rgba(80,20,180,0.55),-4px -4px 10px rgba(255,255,255,0.18)'}}>
                    {isLoading
                      ? <><i className="fas fa-spinner fa-spin"></i> กำลังเข้าสู่ระบบ...</>
                      : <><i className="fas fa-arrow-right"></i> เข้าสู่ระบบ</>}
                  </button>
                </div>

                {/* Register link */}
                <div className="bg-white rounded-3xl px-5 py-4 flex items-center justify-between mb-3"
                  style={{boxShadow:'6px 6px 12px rgba(109,40,217,0.12),-6px -6px 12px rgba(255,255,255,0.9)'}}>
                  <div>
                    <p className="text-xs font-bold text-gray-700">ยังไม่มีบัญชี?</p>
                    <p className="text-[10px] text-gray-400">สมัครสมาชิกใหม่</p>
                  </div>
                  <button onClick={()=>setShowRegister(true)} disabled={isLoading}
                    className="px-4 py-2.5 rounded-2xl font-bold text-sm"
                    style={{background:'#EEE8FF',color:'#9146FF',boxShadow:'5px 5px 10px rgba(109,40,217,0.18),-5px -5px 10px rgba(255,255,255,0.9)'}}>
                    <i className="fas fa-user-plus mr-1.5"></i>ลงทะเบียน
                  </button>
                </div>

                {/* Version footer */}
                <div className="flex flex-col items-center gap-1 pt-1 pb-1">
                  <div className="flex items-center gap-2">
                    <span className="text-[10px] text-gray-400 font-medium">GeriSim AI</span>
                    <span className="text-[10px] text-gray-300">·</span>
                    <span className="text-[10px] font-bold" style={{color:'#9146FF'}}>v3.4.9</span>
                  </div>
                  <div className="flex items-center gap-1.5 px-3 py-1 rounded-full"
                    style={{background:'#F5F3FF',border:'1px solid #DDD6FE'}}>
                    <i className="fas fa-trophy text-[8px]" style={{color:'#F59E0B'}}></i>
                    <span className="text-[9px] font-bold" style={{color:'#7C3AED'}}>ใหม่: ระบบประสิทธิภาพการใช้งาน (Efficiency)</span>
                  </div>
                </div>
              </div>

              {/* ── Register bottom sheet ── */}
              {showRegister && (
                <BottomSheet
                  title="ลงทะเบียนนักศึกษาใหม่" icon="fa-user-plus" iconBg="#9146FF"
                  onClose={()=>setShowRegister(false)} isLoading={isLoading}
                  onSubmit={handleRegister} submitLabel="ยืนยันการลงทะเบียน" submitIcon="fa-check">
                  <Field icon="fa-envelope" ph="อีเมล *"           val={regEmail}    fn={e=>setRegEmail(e.target.value)} type="email" />
                  <Field icon="fa-id-card" ph="รหัสนักศึกษา (ไม่บังคับ)" val={regId} fn={e=>setRegId(e.target.value)} />
                  <Field icon="fa-user"    ph="ชื่อ-นามสกุล *"  val={regName}     fn={e=>setRegName(e.target.value)} />
                  {/* University */}
                  <div className="relative">
                    <span className="absolute left-3.5 top-3.5 z-10" style={{color:'#9146FF'}}>
                      <i className="fas fa-university text-sm"></i>
                    </span>
                    <select value={regUniversity} onChange={e=>setRegUniversity(e.target.value)}
                      className="w-full rounded-2xl py-3 pl-10 pr-8 text-sm font-medium focus:outline-none text-gray-800 appearance-none"
                      style={{background:'#fff',border:'1.5px solid #E5E7EB'}}
                      onFocus={e=>{e.target.style.border='1.5px solid #9146FF'}}
                      onBlur={e=>{e.target.style.border='1.5px solid #E5E7EB'}}>
                      <option value="">เลือกมหาวิทยาลัย *</option>
                      {NURSING_UNIVERSITIES.map(u=><option key={u} value={u}>{u}</option>)}
                    </select>
                    <span className="absolute right-3.5 top-3.5 pointer-events-none" style={{color:'#9146FF'}}>
                      <i className="fas fa-chevron-down text-xs"></i>
                    </span>
                  </div>
                  <Field icon="fa-lock" ph="รหัสผ่าน *"         val={regPassword} fn={e=>setRegPassword(e.target.value)} type="password" />
                  {regPassword.length > 0 && (()=>{
                    const p = regPassword;
                    const lenOk  = p.length >= 8;
                    const hasNum = /[0-9]/.test(p);
                    const hasLet = /[a-zA-Z]/.test(p);
                    const allOk  = lenOk && hasNum && hasLet;
                    const row = (ok, label) => (
                      <div key={label} className="flex items-center gap-1.5">
                        <i className={`fas ${ok ? 'fa-check-circle' : 'fa-times-circle'} text-xs`}
                          style={{color: ok ? '#16a34a' : '#dc2626'}}></i>
                        <span className="text-xs" style={{color: ok ? '#16a34a' : '#6b7280'}}>{label}</span>
                      </div>
                    );
                    return (
                      <div className="rounded-xl px-3 py-2.5 flex flex-col gap-1"
                        style={{background: allOk ? '#f0fdf4' : '#fafafa', border: `1.5px solid ${allOk ? '#86efac' : '#e5e7eb'}`}}>
                        {row(lenOk,  'อย่างน้อย 8 ตัวอักษร')}
                        {row(hasLet, 'มีตัวอักษรภาษาอังกฤษ (a–z, A–Z)')}
                        {row(hasNum, 'มีตัวเลขอย่างน้อย 1 ตัว (0–9)')}
                      </div>
                    );
                  })()}
                  <Field icon="fa-lock" ph="ยืนยันรหัสผ่าน *"   val={regConfirm}  fn={e=>setRegConfirm(e.target.value)}  type="password" onEnter={handleRegister} />
                </BottomSheet>
              )}

              {/* ── Forgot password bottom sheet ── */}
              {showReset && (
                <BottomSheet
                  title="รีเซ็ตรหัสผ่าน" icon="fa-key" iconBg="#7C3AED"
                  onClose={()=>setShowReset(false)} isLoading={isLoading}
                  onSubmit={handleReset} submitLabel="ยืนยันรีเซ็ตรหัสผ่าน" submitIcon="fa-check">
                  {/* Info banner */}
                  <div className="flex items-start gap-2 rounded-2xl px-3 py-2.5"
                    style={{background:'#F5F3FF',border:'1.5px solid #DDD6FE'}}>
                    <i className="fas fa-info-circle text-xs mt-0.5 shrink-0" style={{color:'#7C3AED'}}></i>
                    <p className="text-xs leading-relaxed text-gray-600">
                      ยืนยันตัวตนด้วย <span className="font-black" style={{color:'#7C3AED'}}>อีเมล</span> และ
                      <span className="font-black" style={{color:'#7C3AED'}}> ชื่อ-นามสกุล</span> ที่ลงทะเบียนไว้
                    </p>
                  </div>
                  <Field icon="fa-envelope" ph="อีเมล *"                          val={resetEmail}   fn={e=>setResetEmail(e.target.value)}   type="email" />
                  <Field icon="fa-user"     ph="ชื่อ-นามสกุล (ตามที่ลงทะเบียน) *" val={resetName}  fn={e=>setResetName(e.target.value)} />
                  <Field icon="fa-lock"     ph="รหัสผ่านใหม่ *"                  val={resetNewPass} fn={e=>setResetNewPass(e.target.value)} type="password" />
                  <Field icon="fa-lock"     ph="ยืนยันรหัสผ่านใหม่ *"           val={resetConfirm} fn={e=>setResetConfirm(e.target.value)} type="password" onEnter={handleReset} />
                </BottomSheet>
              )}

            </div>{/* end RIGHT PANEL */}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<LoginApp/>);
  </script>
</body>
</html>
