<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GeriSim AI</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Prompt', sans-serif;
            background-color: #111827;
        }
        #root { width: 100%; height: 100%; }

        @keyframes breathe {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-6px); }
        }
        @keyframes headBob {
          0%, 100% { transform: rotate(0deg) translateY(0); }
          25% { transform: rotate(-3deg) translateY(-2px); }
          75% { transform: rotate(3deg) translateY(2px); }
        }
        @keyframes talkMouth {
          0%, 100% { height: 4px; width: 24px; border-radius: 4px; }
          33% { height: 16px; width: 14px; border-radius: 8px; }
          66% { height: 10px; width: 20px; border-radius: 10px; }
        }
        @keyframes blink {
          0%, 93%, 97%, 100% { transform: scaleY(1); }
          95% { transform: scaleY(0.1); }
        }
        @keyframes slideUp {
          from { transform: translateY(100%); }
          to { transform: translateY(0); }
        }
        @keyframes dotBounce {
          0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
          40% { transform: translateY(-7px); opacity: 1; }
        }

        .animate-breathe  { animation: breathe 4s ease-in-out infinite; }
        .animate-headBob  { animation: headBob 6s ease-in-out infinite; }
        .animate-talk     { animation: talkMouth 0.3s infinite; }
        .animate-blink    { animation: blink 5s infinite; transform-origin: center; }
        .animate-slideUp  { animation: slideUp 0.3s ease-out forwards; }
        .dot-bounce       { animation: dotBounce 1.2s ease-in-out infinite; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        /* @jsx React.createElement */
        /* @jsxFrag React.Fragment */

        const { useState, useEffect, useRef } = React;

        // ============================================================
        // CONFIGURATION — Google Apps Script Web App URL (Student App)
        // ============================================================
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbz4nc37Vr6M1R1Y4p9XgVRzhF2WsDSv9xgc0csnX4bRKVwMQ2BzwZofZ99Q7J4MYSgA9g/exec';

        // ============================================================
        // SYSTEM PROMPT — Persona for คุณยายสมศรี (Gemini 1.5 Flash)
        // ============================================================
        const SYSTEM_PROMPT = `คุณคือ "คุณยายสมศรี" ผู้สูงอายุชาวไทย อายุ 75 ปี อาศัยอยู่กับลูกสาว มีอาการนอนไม่หลับและเบื่ออาหารมาเป็นระยะเวลาหลายเดือน มีโรคประจำตัวคือความดันโลหิตสูงและปวดเข่าจากข้อเสื่อม พูดภาษาไทยสำเนียงภาคใต้ปนภาษากลาง ใจดี แต่บางครั้งขี้กังวล ตอบประโยคสั้นๆ เป็นธรรมชาติแบบผู้สูงอายุ ไม่ใช้ศัพท์วิชาการ`;

        // ============================================================
        // STATIC DATA
        // ============================================================
        const mockPatients = [
          {
            id: 1,
            name: 'คุณยายสมศรี',
            age: 75,
            condition: 'นอนไม่หลับ, เบื่ออาหาร',
            skinColor: '#FFBFA3',
            hairColor: '#64748B',
            shirtColor: '#DB2777'
          },
        ];

        const assessmentTools = {
          'ADL': {
            name: 'ADL (กิจวัตรประจำวัน)',
            questions: ['ลุกจากเตียงเองได้ไหม?', 'ทานอาหารเองได้ไหม?', 'อาบน้ำแต่งตัวเองได้ไหม?'],
            recommendations: ['จัดสภาพแวดล้อมให้ปลอดภัย', 'แนะนำอุปกรณ์ช่วยเดิน', 'ฝึกทำกายภาพบำบัดเบื้องต้น']
          },
          'IADL': {
            name: 'IADL (กิจวัตรประจำวันขั้นสูง)',
            questions: ['ไปซื้อของเองได้ไหม?', 'จัดการเรื่องเงินเองได้ไหม?', 'ทานยาตามแพทย์สั่งเองได้ไหม?'],
            recommendations: ['จัดยามื้อสัปดาห์ให้', 'มีญาติช่วยดูแลเรื่องการเงิน', 'แนะนำบริการส่งอาหาร']
          },
          'GDS': {
            name: 'GDS (ภาวะซึมเศร้า)',
            questions: ['รู้สึกเบื่อหน่ายหรือไม่?', 'รู้สึกชีวิตว่างเปล่าหรือไม่?', 'อารมณ์ดีเป็นส่วนใหญ่หรือไม่?'],
            recommendations: ['หากิจกรรมนันทนาการทำ', 'ให้ญาติมีเวลาพูดคุยมากขึ้น', 'ปรึกษาจิตแพทย์หากจำเป็น']
          }
        };

        // ============================================================
        // APP COMPONENT
        // ============================================================
        function App() {

          // ── Pages & UI ──────────────────────────────────────────────
          const [currentPage, setCurrentPage]     = useState('welcome');
          const [activePatient]                   = useState(mockPatients[0]);
          const [selectedTool, setSelectedTool]   = useState(null);
          const [activeModal, setActiveModal]     = useState(null);
          const [isCalling, setIsCalling]         = useState(false);
          const [showReport, setShowReport]       = useState(false);

          // ── Student identity (captured at login) ────────────────────
          const [studentId, setStudentId]         = useState('');
          const [password, setPassword]           = useState('');
          const [studentName, setStudentName]     = useState('');

          // ── Chat & AI ───────────────────────────────────────────────
          const [chatLog, setChatLog] = useState([
            { text: 'เริ่มการสนทนาประเมินสุขภาพ', sender: 'system' }
          ]);
          const [inputText, setInputText]         = useState('');
          const [isSpeaking, setIsSpeaking]       = useState(false);
          const [isLoading, setIsLoading]         = useState(false);   // waiting for AI reply
          const [isListening, setIsListening]     = useState(false);   // STT active

          // ── Assessment ──────────────────────────────────────────────
          const [scores, setScores]               = useState({ tool: 0, assessment: 0, recommendation: 0 });
          const [assessmentAnswers, setAssessmentAnswers]             = useState({});
          const [selectedRecommendations, setSelectedRecommendations] = useState([]);

          // ── Refs ────────────────────────────────────────────────────
          const chatEndRef     = useRef(null);
          const recognitionRef = useRef(null);
          const isLoadingRef   = useRef(false);   // avoids stale-closure race in STT callback
          const chatTurnsRef   = useRef([]);       // [{user, ai}] → compiled into q1-q15 on save

          // Auto-scroll chat to bottom
          useEffect(() => {
            chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
          }, [chatLog, isLoading]);

          const navigate = (page) => { setCurrentPage(page); window.scrollTo(0, 0); };

          // ============================================================
          // TEXT-TO-SPEECH  (rate 0.75 → elderly pacing)
          // ============================================================
          const speakText = (text) => {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();

            const utter = new SpeechSynthesisUtterance(text);
            utter.lang   = 'th-TH';
            utter.rate   = 0.75;   // slower — simulates elderly speech
            utter.pitch  = 0.9;
            utter.volume = 1.0;

            utter.onstart = () => setIsSpeaking(true);
            utter.onend   = () => setIsSpeaking(false);
            utter.onerror = () => setIsSpeaking(false);

            const doSpeak = () => {
              const voices    = window.speechSynthesis.getVoices();
              const thaiVoice = voices.find(v => v.lang && v.lang.startsWith('th'));
              if (thaiVoice) utter.voice = thaiVoice;
              window.speechSynthesis.speak(utter);
            };

            // getVoices() may be empty until voiceschanged fires (Chrome quirk)
            if (window.speechSynthesis.getVoices().length > 0) {
              doSpeak();
            } else {
              window.speechSynthesis.addEventListener('voiceschanged', doSpeak, { once: true });
            }
          };

          // ============================================================
          // LOGIN — POST action:"login" to GAS, verify credentials
          // ============================================================
          const handleLogin = async () => {
            if (!studentId.trim()) { alert('กรุณากรอกรหัสนักศึกษา'); return; }
            if (!password.trim()) { alert('กรุณากรอกรหัสผ่าน'); return; }

            isLoadingRef.current = true;
            setIsLoading(true);

            try {
              const res  = await fetch(GAS_URL, {
                method : 'POST',
                // Omit Content-Type → browser sends as text/plain → avoids CORS preflight
                body   : JSON.stringify({
                  action   : 'login',
                  username : studentId.trim(),
                  password : password.trim()
                })
              });
              const data = await res.json();

              if (data.status === 'success') {
                setStudentName(data.student_name || studentId);
                navigate('home');
              } else {
                alert(data.message || 'รหัสนักศึกษาหรือรหัสผ่านไม่ถูกต้อง กรุณาลองใหม่');
              }
            } catch (err) {
              console.error('[GeriSim] Login error:', err);
              alert('ไม่สามารถเชื่อมต่อระบบได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต');
            } finally {
              isLoadingRef.current = false;
              setIsLoading(false);
            }
          };

          // ============================================================
          // API INTEGRATION — POST action:"chat" to GAS → Gemini 1.5 Flash
          // ============================================================
          const sendToAI = async (messageText) => {
            if (!messageText.trim() || isLoadingRef.current) return;

            isLoadingRef.current = true;
            setIsLoading(true);
            setChatLog(prev => [...prev, { text: messageText, sender: 'user' }]);
            setInputText('');

            try {
              const res  = await fetch(GAS_URL, {
                method : 'POST',
                // Omit Content-Type → text/plain → avoids CORS preflight with GAS
                body   : JSON.stringify({
                  action       : 'chat',
                  message      : messageText,
                  systemPrompt : SYSTEM_PROMPT,
                  studentId    : studentId || 'anonymous'
                })
              });

              const data  = await res.json();
              const reply = data.reply || 'ขออภัยค่ะ ยายไม่ได้ยินที่ถาม ลองถามใหม่อีกทีนะลูก';

              // Track Q&A turn for q1-q15 save payload (cap at 15 turns)
              if (chatTurnsRef.current.length < 15) {
                chatTurnsRef.current.push({ user: messageText, ai: reply });
              }

              setChatLog(prev => [...prev, { text: reply, sender: 'ai' }]);
              speakText(reply);

            } catch (err) {
              console.error('[GeriSim] Chat error:', err);
              const errMsg = 'ไม่สามารถเชื่อมต่อ AI ได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต';
              setChatLog(prev => [...prev, { text: errMsg, sender: 'ai' }]);
            } finally {
              isLoadingRef.current = false;
              setIsLoading(false);
            }
          };

          const handleSendMessage = () => {
            if (!inputText.trim()) return;
            sendToAI(inputText);
          };

          // ============================================================
          // SPEECH-TO-TEXT  (Web Speech API — Chrome / Edge)
          // ============================================================
          const startListening = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
              alert('เบราว์เซอร์นี้ไม่รองรับการรับเสียง\nกรุณาใช้ Google Chrome แล้วลองใหม่');
              return;
            }

            // Stop TTS before listening to avoid capturing our own output
            window.speechSynthesis?.cancel();
            setIsSpeaking(false);

            const recognition          = new SpeechRecognition();
            recognition.lang           = 'th-TH';
            recognition.continuous     = false;
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => setIsListening(true);

            recognition.onresult = (event) => {
              let transcript = '';
              for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
              }
              setInputText(transcript);

              // Auto-send when the engine signals a final (confident) result
              if (event.results[event.results.length - 1].isFinal) {
                setIsListening(false);
                recognitionRef.current = null;
                sendToAI(transcript);
              }
            };

            recognition.onerror = (e) => {
              console.error('[GeriSim] STT error:', e.error);
              setIsListening(false);
              recognitionRef.current = null;
            };

            recognition.onend = () => {
              setIsListening(false);
              recognitionRef.current = null;
            };

            recognitionRef.current = recognition;
            recognition.start();
          };

          const stopListening = () => {
            recognitionRef.current?.stop();
            recognitionRef.current = null;
            setIsListening(false);
          };

          const toggleListening = () => {
            if (isListening) stopListening();
            else startListening();
          };

          // ============================================================
          // SESSION LIFECYCLE
          // ============================================================
          const resetSession = () => {
            stopListening();
            window.speechSynthesis?.cancel();
            setScores({ tool: 0, assessment: 0, recommendation: 0 });
            setSelectedTool(null);
            setAssessmentAnswers({});
            setSelectedRecommendations([]);
            setChatLog([{ text: 'เริ่มการสนทนาประเมินสุขภาพ', sender: 'system' }]);
            setShowReport(false);
            setIsLoading(false);
            setIsSpeaking(false);
            chatTurnsRef.current = [];   // clear Q&A turns for new session
          };

          const startVdoCall = () => {
            setIsCalling(true);
            setTimeout(() => {
              setIsCalling(false);
              navigate('simulation');
              const greeting = 'ฮัลโหลวว ได้ยินไหมลูก ยายรอนานแล้วนะ';
              setChatLog([
                { text: 'เริ่มการสนทนาประเมินสุขภาพ', sender: 'system' },
                { text: greeting, sender: 'ai' }
              ]);
              speakText(greeting);
            }, 1500);
          };

          // ============================================================
          // 4-STEP CLINICAL REASONING HANDLERS
          // ============================================================
          const handleToolSelect = (toolKey) => {
            setSelectedTool(toolKey);
            setAssessmentAnswers({});
            setSelectedRecommendations([]);
            setScores(prev => ({ ...prev, tool: 100 }));
            setActiveModal(null);
            setChatLog(prev => [...prev, {
              text: `ระบบ: คุณเลือกเครื่องมือประเมิน ${assessmentTools[toolKey].name}`,
              sender: 'system'
            }]);
          };

          const handleAnswerSelect = (questionIndex, answer) => {
            setAssessmentAnswers(prev => ({ ...prev, [questionIndex]: answer }));
          };

          const handleRecommendationToggle = (rec) => {
            setSelectedRecommendations(prev =>
              prev.includes(rec) ? prev.filter(r => r !== rec) : [...prev, rec]
            );
          };

          const submitAssessment = () => {
            const totalQ = assessmentTools[selectedTool].questions.length;
            if (Object.keys(assessmentAnswers).length < totalQ) {
              alert('กรุณาประเมินให้ครบทุกข้อก่อนบันทึก');
              return;
            }
            const yesCount = Object.values(assessmentAnswers).filter(a => a === 'yes').length;
            const score    = Math.round((yesCount / totalQ) * 100);
            setScores(prev => ({ ...prev, assessment: Math.max(score, 10) }));
            setActiveModal(null);
            setChatLog(prev => [...prev, {
              text: `ระบบ: บันทึกผลการประเมิน ${assessmentTools[selectedTool].name} (คะแนน ${score}%)`,
              sender: 'system'
            }]);
          };

          const submitRecommendation = () => {
            if (selectedRecommendations.length === 0) {
              alert('กรุณาเลือกคำแนะนำอย่างน้อย 1 ข้อ');
              return;
            }
            setScores(prev => ({ ...prev, recommendation: 90 }));
            setActiveModal(null);
            setChatLog(prev => [...prev, {
              text: `ระบบ: บันทึกคำแนะนำ: ${selectedRecommendations.join(', ')}`,
              sender: 'system'
            }]);
          };

          // ── Step 4: Compile payload → POST action:'save' to GAS ─────
          // Payload matches GAS doPost save schema exactly:
          //   student_id, case_name, assessment_tool, assessment_score,
          //   nursing_intervention, system_feedback, q1…q15
          const handleSubmitSession = () => {
            if (scores.tool === 0 || scores.assessment === 0 || scores.recommendation === 0) {
              alert('กรุณาทำขั้นตอน 1-3 ให้ครบก่อนส่งข้อมูล');
              return;
            }

            const totalScore = Math.round((scores.tool + scores.assessment + scores.recommendation) / 3);

            // Build q1-q15: each slot = one Q&A exchange (user → AI)
            const qPayload = {};
            chatTurnsRef.current.slice(0, 15).forEach((turn, i) => {
              qPayload[`q${i + 1}`] = `[นักศึกษา] ${turn.user} | [ผู้ป่วย] ${turn.ai}`;
            });

            const payload = {
              action              : 'save',
              student_id          : studentId || 'ไม่ระบุ',
              case_name           : activePatient.name,
              assessment_tool     : selectedTool,
              assessment_score    : scores.assessment,
              nursing_intervention: selectedRecommendations.join(' | '),
              system_feedback     : `เครื่องมือ: ${assessmentTools[selectedTool]?.name} | คะแนนรวม: ${totalScore}%`,
              ...qPayload
            };

            // Fire-and-forget — navigate immediately, log in background
            fetch(GAS_URL, {
              method : 'POST',
              body   : JSON.stringify(payload)
            }).catch(err => console.error('[GeriSim] Save error:', err));

            navigate('summary');
          };

          // ============================================================
          // AVATAR  (Flat / Corporate Memphis style)
          // ============================================================
          const renderAvatar = (patient, speaking, scaleClass = 'scale-100') => (
            <div className={`relative flex flex-col items-center justify-end w-full h-full pt-4 transition-transform duration-300 ${scaleClass}`}>
              <div className="absolute top-10 left-4 w-32 h-32 bg-[#FDE68A] rounded-full mix-blend-multiply opacity-80 z-0"></div>
              <div className="absolute bottom-10 right-0 w-40 h-48 bg-[#FBCFE8] rounded-[5rem] mix-blend-multiply opacity-80 transform rotate-12 z-0"></div>
              <div className="absolute top-1/4 right-8 w-16 h-16 bg-[#A7F3D0] rounded-full mix-blend-multiply opacity-80 z-0"></div>

              <div className="relative z-20 flex justify-center w-full animate-headBob">
                <div className="absolute top-4 right-[25%] w-20 h-20 rounded-full z-0 shadow-sm" style={{ backgroundColor: patient.hairColor }}></div>
                <div className="relative w-32 h-32 rounded-full flex flex-col items-center justify-start overflow-hidden z-10 border border-black/5" style={{ backgroundColor: patient.skinColor }}>
                  <div className="absolute top-0 w-[120%] h-11 z-10 rounded-b-[40%]" style={{ backgroundColor: patient.hairColor }}></div>
                  <div className="absolute top-6 left-[-10px] w-12 h-8 rounded-br-full z-10 transform -rotate-12" style={{ backgroundColor: patient.hairColor }}></div>
                  <div className="absolute top-6 right-[-10px] w-12 h-8 rounded-bl-full z-10 transform rotate-12" style={{ backgroundColor: patient.hairColor }}></div>
                  <div className="absolute top-12 flex space-x-1 items-center z-20">
                     <div className="w-12 h-12 border-[4px] border-[#1F2937] rounded-full flex items-center justify-center bg-white/20">
                        <div className="w-2.5 h-2.5 bg-[#1F2937] rounded-full animate-blink ml-2"></div>
                     </div>
                     <div className="w-3 h-[4px] bg-[#1F2937] -mt-2"></div>
                     <div className="w-12 h-12 border-[4px] border-[#1F2937] rounded-full flex items-center justify-center bg-white/20">
                        <div className="w-2.5 h-2.5 bg-[#1F2937] rounded-full animate-blink mr-2"></div>
                     </div>
                  </div>
                  <div className="w-2 h-2 border-b-2 border-r-2 border-black/20 rounded-br-sm absolute top-[5.5rem] transform rotate-45 z-20"></div>
                  <div className={`absolute bottom-5 bg-[#1F2937] transition-all duration-75 z-20 ${speaking ? 'animate-talk' : 'h-[3px] w-6 rounded-full'}`}></div>
                </div>
              </div>

              <div className="w-[140%] max-w-[380px] h-44 rounded-t-[10rem] z-10 relative flex justify-center pt-1 animate-breathe" style={{ backgroundColor: patient.shirtColor }}>
                <div className="w-14 h-10 rounded-b-3xl absolute -top-4 shadow-sm" style={{ backgroundColor: patient.skinColor }}></div>
                <div className="w-20 h-4 border-b-4 border-black/10 rounded-b-full absolute -top-1"></div>
              </div>
            </div>
          );

          // ============================================================
          // PAGE: WELCOME (Login)
          // ============================================================
          const renderWelcome = () => (
            <div className="flex flex-col justify-center items-center p-8 h-full bg-white w-full max-w-md mx-auto relative overflow-hidden">
              <div className="absolute top-0 right-0 w-64 h-64 bg-[#FDE68A] rounded-bl-[10rem] opacity-30"></div>
              <div className="absolute bottom-0 left-0 w-48 h-48 bg-[#A7F3D0] rounded-tr-[8rem] opacity-30"></div>

              <div className="w-24 h-24 bg-[#E0E7FF] rounded-full flex items-center justify-center mb-6 z-10">
                <i className="fas fa-brain text-[#4F46E5] text-4xl"></i>
              </div>
              <h2 className="text-xs text-center text-gray-500 mb-2 leading-relaxed z-10">

                      <span className="font-black text-gray-800 text-lg">{scores.tool}%</span>
                    </div>
                    <div className="flex justify-between items-center text-sm border-b border-gray-100 pb-3">
                      <span className="text-gray-600 font-bold flex items-center"><i className="fas fa-heartbeat mr-3 text-[#8B5CF6] text-lg"></i> 2. การประเมินภาวะสุขภาพ</span>
                      <span className="font-black text-gray-800 text-lg">{scores.assessment}%</span>
                    </div>
                    <div className="flex justify-between items-center text-sm pb-2">
                      <span className="text-gray-600 font-bold flex items-center"><i className="fas fa-hand-holding-heart mr-3 text-[#F97316] text-lg"></i> 3. การให้คำแนะนำ</span>
                      <span className="font-black text-gray-800 text-lg">{scores.recommendation}%</span>
                    </div>
                  </div>

                  <button
                    onClick={() => { resetSession(); navigate('home'); }}
                    className="w-full bg-[#4F46E5] hover:bg-[#4338CA] text-white font-bold py-4 rounded-2xl shadow-lg transition"
                  >
                    กลับสู่หน้าหลัก
                  </button>
                </div>

                <div className="w-full mt-8 flex flex-col items-center pb-8 z-10">
                  <button
                    onClick={() => setShowReport(!showReport)}
                    className="text-white hover:text-[#FDE68A] text-sm font-bold flex items-center border-2 border-white/40 px-6 py-3 rounded-full hover:bg-white/10 transition backdrop-blur-sm"
                  >
                    <i className="fas fa-heartbeat mr-2"></i>
                    {showReport ? 'ซ่อนรายงาน (Hide Report)' : 'ดูรายงานข้อผิดพลาด (Show Report)'}
                  </button>

                  {showReport && (
                    <div className="w-full mt-6 space-y-4 animate-slideUp">
                      {mockMistakes.map((item, index) => (
                        <div key={index} className="bg-white/95 backdrop-blur-md rounded-[1.5rem] p-6 shadow-xl border-l-[6px] border-[#EF4444]">
                          <h4 className="text-sm font-black text-[#EF4444] mb-3 flex items-center">
                            <i className="fas fa-times mr-2"></i> {item.topic}
                          </h4>
                          <p className="text-sm font-bold text-gray-800 mb-1">สิ่งที่คุณตอบ:</p>
                          <p className="text-xs font-medium text-gray-600 mb-4 bg-[#FEF2F2] p-3 rounded-xl border border-[#FEE2E2]">{item.mistake}</p>
                          <p className="text-sm font-bold text-gray-800 mb-1">คำแนะนำ (Feedback):</p>
                          <p className="text-xs font-medium text-[#047857] bg-[#ECFDF5] p-3 rounded-xl border border-[#D1FAE5]">{item.correct}</p>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          };

          // ============================================================
          // RENDER
          // ============================================================
          return (
            <div className="h-full w-full bg-[#111827] font-sans text-gray-900 selection:bg-[#E0E7FF] overflow-hidden">
              {currentPage === 'welcome'    && renderWelcome()}
              {currentPage === 'home'       && renderHome()}
              {currentPage === 'simulation' && renderSimulation()}
              {currentPage === 'summary'    && renderSummary()}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
