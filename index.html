<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GeriSim AI</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Prompt', sans-serif;
            background-color: #111827;
        }
        #root { width: 100%; height: 100%; }

        @keyframes breathe {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-6px); }
        }
        @keyframes headBob {
          0%, 100% { transform: rotate(0deg) translateY(0); }
          25% { transform: rotate(-3deg) translateY(-2px); }
          75% { transform: rotate(3deg) translateY(2px); }
        }
        @keyframes talkMouth {
          0%, 100% { height: 4px; width: 24px; border-radius: 4px; }
          33% { height: 16px; width: 14px; border-radius: 8px; }
          66% { height: 10px; width: 20px; border-radius: 10px; }
        }
        @keyframes blink {
          0%, 93%, 97%, 100% { transform: scaleY(1); }
          95% { transform: scaleY(0.1); }
        }
        @keyframes slideUp {
          from { transform: translateY(100%); }
          to { transform: translateY(0); }
        }
        @keyframes dotBounce {
          0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
          40% { transform: translateY(-7px); opacity: 1; }
        }

        .animate-breathe  { animation: breathe 4s ease-in-out infinite; }
        .animate-headBob  { animation: headBob 6s ease-in-out infinite; }
        .animate-talk     { animation: talkMouth 0.3s infinite; }
        .animate-blink    { animation: blink 5s infinite; transform-origin: center; }

        @keyframes svgBlink {
          0%, 90%, 96%, 100% { transform: scaleY(1); }
          93% { transform: scaleY(0.05); }
        }
        @keyframes svgFloat {
          0%, 100% { transform: translateY(0px); }
          50% { transform: translateY(-5px); }
        }
        .svg-eye-l { animation: svgBlink 4.2s infinite; transform-box: fill-box; transform-origin: center; }
        .svg-eye-r { animation: svgBlink 4.2s infinite; transform-box: fill-box; transform-origin: center; }
        .svg-upper-float { animation: svgFloat 5s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
        .animate-slideUp  { animation: slideUp 0.3s ease-out forwards; }
        .dot-bounce       { animation: dotBounce 1.2s ease-in-out infinite; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        /* @jsx React.createElement */

        const { useState, useEffect, useRef } = React;

        // ============================================================

        // ============================================================
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzvubNbpyZonn6qK3OIZZiKcvOy6dM124pyfa275SvTX8t0PesB2r-oRmAxwR7EX9EUXg/exec';

        // ============================================================
        // AI PROVIDER CHAIN — browser-direct fallback (Gemini → Qwen)

        // Service account — used to mint short-lived Gemini access tokens
        const GEMINI_SA = {
          client_email : 'gerisim-ai-dataset-db@gen-lang-client-0909422950.iam.gserviceaccount.com',
          private_key  : '-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQC9n2W2JL7j6iRr\nRke+Y/C9dhci7cqy9abTdIMdb4mmmeaCB4gHaTIdm9nSi37WpZJqNkMcub23X+DM\nowRPjaUN06UuF1H3Hqlg34Q3stiLxV8Nw3kHISOvCr+QHDl0Cjy/ZdmMZqrdDfb2\njDEnBELBUQghLXGMlrgqtPXcsY0IJPSyuMAjxTFfa3YLZWoE0kmJ52S5q53Lw19Z\nesDhEalJ1vvmota1879Ij3uPSyvHOj746ZS4zJopTrw4bVzYetOWdjPJKvGtGYGZ\nPb/2I5NXuDag3WhGyEkdxt68SM8HoM2AQz54k6itDfWdeiB72Cer817XH7v0yY6z\nxXcJpVppAgMBAAECggEABQ0UrsYqTpRrXW8tFJGBdW6KnbvTWTKJe9r/7h4NPuKd\nHQwZz8a51seSxRTBr3KQJKOm5II/Hz4e1Rynjf3yLlzbqs9kt845iVLS6Q/qzEhY\n6JszI2E629wPr8VMs35dUWTjZ2XJueM4F6ey3Hz00UT5EDcvbeUK6VpSLUuOe+/C\nUbNjaooFfVf9YYK9pTFeYV8I37gUVJ//eGNP/lXB3jzUbEH3ziKAZIaqhwcHESZD\njeg5tDQ9Ihbc1Efkd/A428z1IB07YIiWw441gXAhqDr0r+pciFDP8BuHKyImwUec\nVS3E4or4qAz6YhTxl7zj5sZvmI2NaJ2duZglO+xUDQKBgQDpxBFk/aRRFdtqH3lp\nOc9/n4OQPaC+TWi4T39xjFh87IVkS4+DCYrWo5Vd0LCeK1lFyqpW+79UHgavLcE/\no90O6BWTfyOAYwV0qRMU0KpmljjJ4d3/egvYtseLILMk3MUOIX2JNfxszUXamjDs\nLvx2djB1KtJLj2BrxR0Sw9GrpQKBgQDPqH3pn0OEGydPtOnRN6ui1kacwpWD/uks\npX2U9tX1aUcVcsPWdoK2tXcxn28rhCXKtO7m3RCYz9r/fjGO6hgiTwOOWgiwta6H\n4EvygLN817KKpKsZEu1Ok5TcXUBoqk9STK8K487RjjqkexTBFiBpAFWS03iFTfsk\nS2QeUIXIdQKBgGLLExLcQwJlu1oJPTVkUjY8gsyFzxY9/sDOEC07w/Xfu6wcZuVZ\nNgzqC2kfllTyOwNM2Fp0gHKbUfXc32v246i2GtBADg/nSVn5TnAgk7NRT2S6iSi8\nOp9297PruOoeR0Vmj/haEXkl85ykR4K5hMbHwkjyNPfr+zLwlg3lJgplAoGAblxv\nvo+kBDuiItxVP5nEoCAdGwbXC3WYWuAA5ABjKbAv1RhPOFV3lr7OgBLptEjhBOAv\n74YhYfVlwE9C619CQEmZ7DexUqjb/t6XvmPkAD9qZgCp5gOHFzGb9Zmht3579ZNH\nnBQCQKDETdIT76Jgyy0gTY4SCVauWFWw+eN1llkCgYEA26z/RZo8zupbmi2l/lHb\nGNY5GuTVVMwN04Po6aFeG/BtIJsuoMK/vYwByB+a10zsxr3UW4nFVEP4gAyVZ9Vr\nVqzkc4g6YddC+nj/vhEIvYJFW7rSdM/kHGfacrDZSCZ0GLM4fW+pBwWEBJ4gsDXW\nyJRuaHeVV3aOmvI6Nab1Z1c=\n-----END PRIVATE KEY-----\n',
          token_uri    : 'https://oauth2.googleapis.com/token',
          scope        : 'https://www.googleapis.com/auth/generative-language'
        };

        // Cache: { token, expiry }
        let _saToken = null;

        const getGeminiToken = async () => {
          if (_saToken && Date.now() < _saToken.expiry) return _saToken.token;

          const b64url = obj =>
            btoa(JSON.stringify(obj)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');

          const now = Math.floor(Date.now() / 1000);
          const header  = b64url({ alg: 'RS256', typ: 'JWT' });
          const payload = b64url({
            iss  : GEMINI_SA.client_email,
            scope: GEMINI_SA.scope,
            aud  : GEMINI_SA.token_uri,
            iat  : now,
            exp  : now + 3600
          });
          const unsigned = `${header}.${payload}`;

          // Import PKCS8 private key
          const pem = GEMINI_SA.private_key.replace(/-----[^-]+-----/g,'').replace(/\s/g,'');
          const der = Uint8Array.from(atob(pem), c => c.charCodeAt(0));
          const cryptoKey = await crypto.subtle.importKey(
            'pkcs8', der.buffer,
            { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' },
            false, ['sign']
          );

          // Sign and assemble JWT
          const sigBuf = await crypto.subtle.sign(
            'RSASSA-PKCS1-v1_5', cryptoKey,
            new TextEncoder().encode(unsigned)
          );
          const sig = btoa(String.fromCharCode(...new Uint8Array(sigBuf)))
            .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
          const jwt = `${unsigned}.${sig}`;

          // Exchange JWT for access token
          const res = await fetch(GEMINI_SA.token_uri, {
            method : 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body   : `grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`
          });
          const data = await res.json();
          if (!data.access_token) throw new Error('SA token failed: ' + JSON.stringify(data));

          _saToken = { token: data.access_token, expiry: Date.now() + (data.expires_in - 60) * 1000 };
          console.log('[GeriSim] Gemini SA token refreshed');
          return _saToken.token;
        };

        // AI_CHAIN: Qwen first (stable), Gemini second (native endpoint + SA token).
        // Gemini requires billing credits on project gen-lang-client-0909422950.
        const AI_CHAIN = [
          {
            name  : 'Qwen',
            url   : 'https://gateway.9arm.co/v1/chat/completions',
            key   : 'sk-eZUCIqUoggLU57ahNAt1DA',
            model : 'qwen3.6-35b-a3b'
          },
          {
            name  : 'Gemini',
            // Native REST endpoint — accepts SA OAuth2 tokens (OpenAI-compat only accepts API keys)
            url   : 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent',
            model : 'gemini-2.0-flash'
          },
        ];

        // Convert OpenAI-style messages[] to Gemini native format
        const toGeminiNative = (messages) => {
          const systemMsg = messages.find(m => m.role === 'system');
          const turns = messages.filter(m => m.role !== 'system');
          const contents = turns.map(m => ({
            role  : m.role === 'assistant' ? 'model' : 'user',
            parts : [{ text: m.content }]
          }));
          const req = { contents, generationConfig: { temperature: 0.82, maxOutputTokens: 600, topP: 0.9 } };
          if (systemMsg) req.systemInstruction = { parts: [{ text: systemMsg.content }] };
          return req;
        };

        // Call AI providers in order; returns { text, log[] } or throws with log[].
        const callAIChain = async (messages) => {
          const log = [];
          for (const provider of AI_CHAIN) {
            try {
              let res;
              if (provider.name === 'Gemini') {
                const token = await getGeminiToken();
                res = await fetch(provider.url, {
                  method  : 'POST',
                  headers : { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                  body    : JSON.stringify(toGeminiNative(messages)),
                });
              } else {
                const body = { model: provider.model, messages, temperature: 0.82, max_tokens: 600, top_p: 0.9 };
                if (provider.name === 'Qwen') body.enable_thinking = false;
                res = await fetch(provider.url, {
                  method  : 'POST',
                  headers : { 'Content-Type': 'application/json', 'Authorization': `Bearer ${provider.key}` },
                  body    : JSON.stringify(body),
                });
              }

              if (!res.ok) {
                const errBody = await res.text().catch(() => '');
                const msg = `${provider.name}: HTTP ${res.status} — ${errBody.substring(0, 120)}`;
                log.push(msg);
                console.warn('[GeriSim]', msg);
                continue;
              }

              const json = await res.json();
              // Gemini native response shape differs from OpenAI
              let text = provider.name === 'Gemini'
                ? (json?.candidates?.[0]?.content?.parts?.[0]?.text || '').trim()
                : (json?.choices?.[0]?.message?.content || '').trim();
              text = text.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
              if (text) {
                console.log(`[GeriSim] Used provider: ${provider.name}`);
                return { text, log };
              }
              const emptyMsg = `${provider.name}: empty reply`;
              log.push(emptyMsg);
              console.warn('[GeriSim]', emptyMsg);
            } catch (err) {
              const errMsg = `${provider.name}: ${err.message}`;
              log.push(errMsg);
              console.warn('[GeriSim]', errMsg);
            }
          }
          const err = new Error('ALL_PROVIDERS_FAILED');
          err.log = log;
          throw err;
        };

        // ============================================================
        // AGENTIC SYSTEM PROMPT BUILDER — Full Geriatric Simulation v3
        // Builds a clinically-rich persona from all 4 assessment parts:
        // Part 1 (General Info), Part 2 (Physical), Part 3 (Health Perception), Part 4 (Q1-Q15 traits)
        // ============================================================
        const FALLBACK_PROMPT = `คุณคือผู้สูงอายุชาวไทย ตอบเป็นภาษาไทยแบบเป็นธรรมชาติ ไม่ใช้ศัพท์วิชาการ`;

        // ============================================================
        // PUBLISHED GOOGLE SHEETS — Direct CSV reader
        // Primary data source; GAS getCase is the fallback.
        // Change PROPOSITION_CSV_GID if Proposition_DB is not the first sheet.
        // Find gid: open sheet → look at URL ?gid=XXXXXX
        // ============================================================
        const PROPOSITION_PUBHTML = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTa-StWVtjKA9v2xWRRhCO8qr-P3iwu8S_yx5BH6_2UgDk31NFF1RfsdXSKmYn4gu3tKa1XMiYL94r_';
        const PROPOSITION_CSV_GID  = '0';   // 0 = first/default sheet tab
        const PROPOSITION_CSV_URL  = `${PROPOSITION_PUBHTML}/pub?output=csv&gid=${PROPOSITION_CSV_GID}`;

        // ── CSV line parser (handles quoted fields with embedded commas) ──
        const parseCSVLine = (line) => {
          const result = [];
          let cur = '', inQ = false;
          for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"' && !inQ)                       { inQ = true; }
            else if (ch === '"' && inQ && line[i+1] === '"') { cur += '"'; i++; }
            else if (ch === '"' && inQ)                   { inQ = false; }
            else if (ch === ',' && !inQ)                  { result.push(cur); cur = ''; }
            else                                           { cur += ch; }
          }
          result.push(cur);
          return result;
        };

        // ── Parse full CSV text → array of header-keyed objects ──
        const parseCSV = (text) => {
          const lines = text.split(/\r?\n/).filter(l => l.trim());
          if (lines.length < 2) return [];
          const headers = parseCSVLine(lines[0]).map(h => h.trim());
          return lines.slice(1).map(line => {
            const vals = parseCSVLine(line);
            const obj  = {};
            headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
            return obj;
          }).filter(r => r['case_id'] && r['case_id'].trim() !== '');
        };

        // ── Map a CSV row object → case shape expected by the UI ──
        const csvRowToCase = (row) => {
          const q = [];
          for (let i = 1; i <= 15; i++) q.push(row[`q${i}`] || '');
          return {
            case_id               : row['case_id']               || '',
            patient_name          : row['patient_name']          || '',
            gender                : row['gender']                || 'หญิง',
            age_years             : parseInt(row['age_years'])   || 70,
            age_months            : parseInt(row['age_months'])  || 0,
            ethnicity             : row['ethnicity']             || '',
            religion              : row['religion']              || '',
            marital_status        : row['marital_status']        || '',
            hometown              : row['hometown']              || '',
            occupation            : row['occupation']            || '',
            occupation_detail     : row['occupation_detail']     || '',
            community_participation: row['community_participation'] || '',
            community_detail      : row['community_detail']      || '',
            weight_kg             : row['weight_kg']             || '',
            height_cm             : row['height_cm']             || '',
            bmi                   : row['bmi']                   || '',
            waist_cm              : row['waist_cm']              || '',
            pulse_rate            : row['pulse_rate']            || '',
            pulse_strength        : row['pulse_strength']        || '',
            pulse_rhythm          : row['pulse_rhythm']          || '',
            blood_pressure        : row['blood_pressure']        || '',
            bp_position           : row['bp_position']           || '',
            vision                : row['vision']                || '',
            hearing               : row['hearing']               || '',
            health_perception     : row['health_perception']     || '',
            health_comparison     : row['health_comparison']     || '',
            medical_devices_yn    : row['medical_devices_yn']    || '',
            medical_devices_detail: row['medical_devices_detail']|| '',
            health_facility       : row['health_facility']       || '',
            assessment_location   : row['assessment_location']   || '',
            symptom_group         : row['symptom_group']         || '',
            q1 : q[0],  q2 : q[1],  q3 : q[2],  q4 : q[3],  q5 : q[4],
            q6 : q[5],  q7 : q[6],  q8 : q[7],  q9 : q[8],  q10: q[9],
            q11: q[10], q12: q[11], q13: q[12], q14: q[13], q15: q[14],
            correct_tool          : row['correct_tool']          || '',
            score_min             : parseInt(row['score_min'])   || 0,
            score_max             : parseInt(row['score_max'])   || 100,
            expected_interventions: (row['expected_interventions'] || '')
                                      .split('|').map(s => s.trim()).filter(Boolean),
            system_prompt         : row['system_prompt']         || ''
          };
        };

        // ── Majority-composite system prompt from N sampled rows ─────────
        // Picks the most frequent value across rows for each key field;
        // for symptom/trait text it concatenates unique values so the AI
        // can synthesise a realistic composite patient.
        const buildMajorityPrompt = (cases) => {
          if (!cases || cases.length === 0) return null;
          if (cases.length === 1) return null; // single case → use normal flow

          const majority = (arr) => {
            const freq = {};
            arr.forEach(v => { if (v) freq[v] = (freq[v] || 0) + 1; });
            return Object.entries(freq).sort((a,b) => b[1]-a[1])[0]?.[0] || '';
          };
          const unique = (arr) => [...new Set(arr.filter(Boolean))];

          const gender      = majority(cases.map(c => c.gender));
          const isMale      = gender.includes('ชาย');
          const selfWord    = isMale ? 'ตา' : 'ยาย';
          const age         = Math.round(cases.reduce((s,c) => s + (c.age_years||70), 0) / cases.length);
          const symptomGrp  = majority(cases.map(c => c.symptom_group));
          const hearing     = majority(cases.map(c => c.hearing));
          const vision      = majority(cases.map(c => c.vision));
          const marital     = majority(cases.map(c => c.marital_status));
          const hometown    = majority(cases.map(c => c.hometown));

          // Aggregate symptom traits across all sampled rows
          const mainSx   = unique(cases.map(c => c.q2)).slice(0,2).join(' หรือ ');
          const extraSx  = unique(cases.map(c => c.q3)).slice(0,2).join(' และ ');
          const diseases = unique(cases.map(c => c.q6)).slice(0,2).join(', ');
          const meds     = unique(cases.map(c => c.q5)).slice(0,2).join(', ');
          const allergy  = majority(cases.map(c => c.q4));
          const adl      = majority(cases.map(c => c.q12));
          const emotion  = unique(cases.map(c => c.q13)).slice(0,2).join(' ');
          const speak    = majority(cases.map(c => c.q14));
          const special  = unique(cases.map(c => c.q15)).slice(0,2).join(' ');
          const family   = majority(cases.map(c => c.q9));
          const reason   = majority(cases.map(c => c.q1));

          const hardHear = hearing.includes('ไม่ชัดเจน') || hearing.includes('ไม่ได้ยิน');

          return `คุณคือ "${selfWord}" ผู้สูงอายุชาวไทย อายุประมาณ ${age} ปี ${marital ? '(' + marital + ')' : ''}${hometown ? ' มาจาก' + hometown : ''}
กลุ่มอาการ: ${symptomGrp}
สาเหตุที่มาพบ: ${reason}
อาการหลัก: ${mainSx}
อาการร่วม: ${extraSx}
โรคประจำตัว: ${diseases} | ยา: ${meds}${allergy && allergy !== 'ไม่แพ้ยา' ? ' | แพ้: ' + allergy : ''}
${adl ? 'กิจวัตร: ' + adl : ''}
${emotion ? 'บุคลิก/อารมณ์: ' + emotion : ''}
${speak ? 'ลักษณะพูด: ' + speak : ''}
${special ? 'ข้อมูลพิเศษ: ' + special : ''}
${family ? 'ครอบครัว: ' + family : ''}
${vision && !vision.includes('ชัดเจน') ? 'การมองเห็น: ' + vision : ''}
${hardHear ? 'การได้ยิน: ' + hearing + ' — บางครั้งขอให้พูดซ้ำหรือพูดดังขึ้น' : ''}

เรียกตัวเองว่า "${selfWord}" เรียกนักศึกษาว่า "ลูก" หรือ "หนู" ห้ามใช้คำว่า "ผม" "ฉัน" "ดิฉัน"
ตอบภาษาพูดไทยธรรมชาติ 2-3 ประโยค ห้าม bullet ห้ามออกนอกบทบาท ห้ามบอกว่าเป็น AI
ตอบเฉพาะสิ่งที่ถูกถาม หากไม่มีข้อมูลให้ตอบสมเหตุสมผลในฐานะผู้สูงอายุไทย`;
        };

        // ============================================================
        // MOOD DETECTION — infer patient emotion from AI reply text
        // Returns: 'pain' | 'happy' | 'sad' | 'confused' | 'neutral'
        // ============================================================
        const detectMood = (text) => {
          if (!text) return 'neutral';

        // ============================================================
        // CHUNK TEXT — splits a string into iApp-safe segments
        // Strategy: sentence boundaries first (.!?), then commas,
        // then hard-cut at maxLen chars at a word boundary.
        // ============================================================
        function chunkText(text, maxLen = 120) {
          if (!text || !text.trim()) return [];

          // Normalise whitespace
          const clean = text.replace(/\s+/g, ' ').trim();

          // ── Step 1: split on sentence-ending punctuation ────────────
          // e.g. "...ค่ะ. ยาย..." → ["...ค่ะ.", "ยาย..."]
          const sentenceParts = [];
          clean.split(/([.!?])\s+/).forEach((part, i, arr) => {
            if (i % 2 === 0) {
              const punct = arr[i + 1] || '';
              const seg   = (part + punct).trim();
              if (seg) sentenceParts.push(seg);
            }
          });
          if (!sentenceParts.length) sentenceParts.push(clean);

          // ── Step 2: sub-split anything still over maxLen on commas ──
          const commaChunked = [];
          for (const sentence of sentenceParts) {
            if (sentence.length <= maxLen) {
              commaChunked.push(sentence);
            } else {
              let buffer = '';
              sentence.split(/,\s*/).forEach(part => {
                const candidate = buffer ? `${buffer}, ${part}` : part;
                if (candidate.length > maxLen && buffer) {
                  commaChunked.push(buffer.trim());
                  buffer = part;
                } else {
                  buffer = candidate;
                }
              });
              if (buffer.trim()) commaChunked.push(buffer.trim());
            }
          }

          // ── Step 3: hard-cut any remaining oversized segments ───────
          const final = [];
          for (const chunk of commaChunked) {
            if (chunk.length <= maxLen) {
              final.push(chunk);
            } else {
              let remaining = chunk;
              while (remaining.length > maxLen) {
                // Prefer splitting at a space near the limit
                let at = remaining.lastIndexOf(' ', maxLen);
                if (at < maxLen / 2) at = maxLen;   // no good space — hard cut
                final.push(remaining.slice(0, at).trim());
                remaining = remaining.slice(at).trim();
              }
              if (remaining) final.push(remaining);
            }
          }

          return final.filter(c => c.length > 0);
        }

          // ============================================================
          // TEXT-TO-SPEECH — Fallback: native Web Speech API
          // Used when iApp TTS fetch fails or returns an error.
          // ============================================================
          const speakNative = (text) => {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();

            const utter = new SpeechSynthesisUtterance(text);
            utter.lang   = 'th-TH';
            utter.rate   = 0.75;   // slightly below 0.8 → more natural elderly pacing
            utter.pitch  = 0.7;    // deeper pitch → older-sounding voice
            utter.volume = 1.0;

            utter.onstart = () => setIsSpeaking(true);
            utter.onend   = () => setIsSpeaking(false);
            utter.onerror = () => setIsSpeaking(false);

            const doSpeak = () => {
              const thaiVoice = window.speechSynthesis.getVoices().find(v => v.lang && v.lang.startsWith('th'));
              if (thaiVoice) utter.voice = thaiVoice;
              window.speechSynthesis.speak(utter);
            };

            // Chrome loads voices asynchronously — wait for voiceschanged if needed
            if (window.speechSynthesis.getVoices().length > 0) {
              doSpeak();
            } else {
              window.speechSynthesis.addEventListener('voiceschanged', doSpeak, { once: true });
            }
          };

          // ============================================================
          // TEXT-TO-SPEECH — Primary: iApp TTS API with chunked queue
          //
          // Flow for a reply of N chunks:
          //   fetch chunk[0] ──► play chunk[0]
          //                         └─ while playing, fetch chunk[1]  (pre-fetch)
          //                              └─ on ended, play chunk[1]
          //                                   └─ while playing, fetch chunk[2] …
          //
          // Pre-fetching the next blob while the current one is playing
          // eliminates inter-chunk silence almost completely.
          //
          // queueIdRef acts as a cancellation token: incrementing it
          // causes any in-flight queue loop to abort silently when a
          // new message interrupts (e.g. student sends another message
          // while the patient is still speaking).
          // ============================================================
          const speakText = async (fullText) => {
            // ── Cancel any in-progress queue ────────────────────────
            queueIdRef.current += 1;
            const myId = queueIdRef.current;

            if (audioRef.current) {
              audioRef.current.pause();
              audioRef.current = null;
            }
            window.speechSynthesis?.cancel();
            setIsSpeaking(false);

            // ── Split full reply into API-safe segments ──────────────
            const chunks = chunkText(fullText);
            if (!chunks.length) return;

            // ── Helper: fetch one chunk → returns a Blob Promise ────
            const fetchChunkBlob = async (chunk) => {
              const res = await fetch(IAPP_TTS_URL, {
                method  : 'POST',
                headers : {
                  'Content-Type' : 'application/json',
                  'apikey'       : IAPP_TTS_APIKEY
                },
                body: JSON.stringify({
                  text  : chunk,          // full chunk, never truncated
                  voice : IAPP_TTS_VOICE,
                  speed : IAPP_TTS_SPEED
                })
              });
              if (!res.ok) throw new Error(`iApp HTTP ${res.status}`);
              return res.blob();
            };

            // ── Helper: play a Blob → Promise resolves on audio end ─
            const playBlob = (blob) => new Promise((resolve, reject) => {
              const url   = URL.createObjectURL(blob);
              const audio = new Audio(url);
              audioRef.current = audio;

              // oncanplaythrough fires as soon as enough data is buffered
              // — use it to set speaking state so avatar starts moving
              // the moment audio is ready, not after a potential buffer wait
              audio.oncanplaythrough = () => setIsSpeaking(true);
              audio.onended = () => {
                setIsSpeaking(false);          // avatar stops after last word
                URL.revokeObjectURL(url);      // free blob memory
                audioRef.current = null;
                resolve();
              };
              audio.onerror = () => {
                URL.revokeObjectURL(url);
                audioRef.current = null;
                reject(new Error('Audio element playback error'));
              };

              audio.play().catch(reject);
            });

            // ── Main queue loop with pre-fetch ───────────────────────
            try {
              // Kick off the first fetch immediately
              let nextBlobPromise = fetchChunkBlob(chunks[0]);

              for (let i = 0; i < chunks.length; i++) {
                if (queueIdRef.current !== myId) return;  // interrupted

                const blob = await nextBlobPromise;

                // Pre-fetch the NEXT chunk in parallel while current plays
                if (i + 1 < chunks.length) {
                  nextBlobPromise = fetchChunkBlob(chunks[i + 1]);
                }

                if (queueIdRef.current !== myId) return;  // interrupted after fetch
                await playBlob(blob);                      // awaits until audio.onended
              }

              // All chunks done — ensure speaking flag is off
              if (queueIdRef.current === myId) setIsSpeaking(false);

            } catch (err) {
              console.warn('[GeriSim] iApp TTS error — falling back to native TTS:', err.message);
              if (queueIdRef.current === myId) {
                setIsSpeaking(false);
                speakNative(fullText);   // native handles its own chunking via browser engine
              }
            }
          };

          // ============================================================
          // LOGIN — POST action:"login" to GAS, verify credentials
          // ============================================================
          const handleLogin = async () => {
            if (!studentId.trim()) { alert('กรุณากรอกรหัสนักศึกษา'); return; }

            try {
              const res  = await fetch(GAS_URL, {
                method : 'POST',
                // Omit Content-Type → browser sends as text/plain → avoids CORS preflight
                body   : JSON.stringify({
                  action   : 'login',
                  username : studentId.trim(),
                  password : password.trim()
                })
              });
              const data = await res.json();

              if (data.status === 'success') {
                setStudentName(data.student_name || studentId);
                navigate('home');
                fetchCase(); // ← randomly pick a case from Proposition_DB
              } else {
                alert(data.message || 'รหัสนักศึกษาหรือรหัสผ่านไม่ถูกต้อง กรุณาลองใหม่');
              }
            } catch (err) {
              console.error('[GeriSim] Login error:', err);
              alert('ไม่สามารถเชื่อมต่อระบบได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต');
            } finally {
              isLoadingRef.current = false;
              setIsLoading(false);
            }
          };

          // ============================================================
          // REGISTER — POST action:"register" to GAS
          // ============================================================
          const handleRegister = async () => {
            if (!regId.trim())       { alert('กรุณากรอกรหัสนักศึกษา'); return; }
            if (!regName.trim())     { alert('กรุณากรอกชื่อ-นามสกุล'); return; }
            if (!regPassword.trim()) { alert('กรุณากรอกรหัสผ่าน'); return; }
            if (regPassword !== regConfirm) { alert('รหัสผ่านและการยืนยันรหัสผ่านไม่ตรงกัน'); return; }

            setIsLoading(true);
            try {
              const res  = await fetch(GAS_URL, {
                method : 'POST',
                body   : JSON.stringify({
                  action       : 'register',
                  username     : regId.trim(),
                  student_name : regName.trim(),
                  password     : regPassword.trim()
                })
              });
              const data = await res.json();
              if (data.status === 'success') {
                alert('✅ ลงทะเบียนสำเร็จ! กรุณาเข้าสู่ระบบด้วยรหัสนักศึกษาและรหัสผ่านของคุณ');
                setShowRegisterModal(false);
                setStudentId(regId.trim());
                setRegId(''); setRegName(''); setRegPassword(''); setRegConfirm('');
              } else {
                alert('⚠️ ' + (data.message || 'ไม่สามารถลงทะเบียนได้ กรุณาลองใหม่'));
              }
            } catch (err) {
              console.error('[GeriSim] Register error:', err);
              alert('ไม่สามารถเชื่อมต่อระบบได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต');
            } finally {
              setIsLoading(false);
            }
          };

          // ============================================================
          // AI CHAT — calls providers directly from browser (no GAS hop)
          // Priority: Gemini → OpenRouter → Qwen
          // Falls back to local in-character template only if all fail.
          // ============================================================
          const sendToAI = async (messageText) => {
            if (!messageText.trim() || isLoadingRef.current) return;

            isLoadingRef.current = true;
            setIsLoading(true);
            setChatLog(prev => [...prev, { text: messageText, sender: 'user' }]);
            setInputText('');

            try {
              turnCountRef.current += 1;

              // Build system prompt from live patient data
              const englishFrame =
                "You are roleplaying as a real elderly Thai person for nursing student simulation.\n" +
                "CRITICAL: Answer ONLY what the student directly asks — do NOT volunteer extra information they haven't asked about yet.\n" +
                "If the student asks something NOT in the background notes, invent a realistic, consistent answer — never refuse or say you don't know.\n" +
                "Keep each reply to 1-2 short sentences in natural spoken Thai. Use the correct gendered speech particle throughout (ค่ะ/นะคะ for female, ครับ/นะครับ for male) — never mix them.\n" +
                "Never reveal you are an AI. Never name any clinical assessment tool.\n\n";

              const thaiPrompt = activeCaseId
                ? buildAgenticPrompt(
                    activePatient.name,
                    activePatient.age,
                    activePatient.gender || 'หญิง',
                    activePatient.condition || '',
                    caseTraits,
                    patientData
                  )
                : FALLBACK_PROMPT;

              const fullSystem = englishFrame + thaiPrompt;

              // Build messages array with conversation history
              const messages = [{ role: 'system', content: fullSystem }];
              chatTurnsRef.current.forEach(turn => {
                if (turn.user && turn.ai) {
                  messages.push({ role: 'user',      content: turn.user });
                  messages.push({ role: 'assistant', content: turn.ai  });
                }
              });
              messages.push({ role: 'user', content: messageText });

              let reply;
              let isRealReply = true;
              try {
                const result = await callAIChain(messages);
                reply = result.text;
              } catch (aiErr) {
                const details = (aiErr.log || []).join(' | ') || aiErr.message;
                console.error('[GeriSim] All AI providers failed:', details);
                // Show the real error as a system note so it's diagnosable
                setChatLog(prev => [...prev, {
                  text   : `[ระบบ: AI ไม่ตอบสนอง — ${details}]`,
                  sender : 'system'
                }]);
                reply = generateInCharacterFallback(activePatient);
                isRealReply = false;
              }

              setAvatarMood(detectMood(reply));

              // Only add real replies to history (fallback replies must not corrupt context)
              if (isRealReply && chatTurnsRef.current.length < 15) {
                chatTurnsRef.current.push({ user: messageText, ai: reply });
              }

              setChatLog(prev => [...prev, { text: reply, sender: 'ai' }]);
              speakText(reply);

            } catch (err) {
              console.error('[GeriSim] Unexpected error in sendToAI:', err);
              const netReply = generateInCharacterFallback(activePatient);
              setChatLog(prev => [...prev, { text: netReply, sender: 'ai' }]);
              speakText(netReply);
            } finally {
              isLoadingRef.current = false;
              setIsLoading(false);
            }
          };

          const handleSendMessage = () => {
            if (!inputText.trim()) return;
            sendToAI(inputText);
          };

          // ============================================================
          // SPEECH-TO-TEXT  (Web Speech API — Chrome / Edge)
          // ============================================================
          const startListening = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
              alert('เบราว์เซอร์นี้ไม่รองรับการรับเสียง\nกรุณาใช้ Google Chrome แล้วลองใหม่');
              return;
            }

            // Stop TTS before listening to avoid capturing our own output
            window.speechSynthesis?.cancel();
            setIsSpeaking(false);

            const recognition          = new SpeechRecognition();
            recognition.lang           = 'th-TH';
            recognition.continuous     = false;
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => setIsListening(true);

            recognition.onresult = (event) => {
              let transcript = '';
              for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
              }
              setInputText(transcript);

              // Auto-send when the engine signals a final (confident) result
              if (event.results[event.results.length - 1].isFinal) {
                setIsListening(false);
                recognitionRef.current = null;
                sendToAI(transcript);
              }
            };

            recognition.onerror = (e) => {
              console.error('[GeriSim] STT error:', e.error);
              setIsListening(false);
              recognitionRef.current = null;
            };

            recognition.onend = () => {
              setIsListening(false);
              recognitionRef.current = null;
            };

            recognitionRef.current = recognition;
            recognition.start();
          };

          const stopListening = () => {
            recognitionRef.current?.stop();
            recognitionRef.current = null;
            setIsListening(false);
          };

          const toggleListening = () => {
            if (isListening) stopListening();
            else startListening();
          };

          // ============================================================
          // SESSION LIFECYCLE
          // ============================================================
          const resetSession = () => {
            stopListening();
            window.speechSynthesis?.cancel();
            setScores({ tool: 0, assessment: 0, recommendation: 0 });
            setSelectedTool(null);
            setAssessmentAnswers({});
            setSelectedRecommendations([]);
            setChatLog([{ text: 'เริ่มการสนทนาประเมินสุขภาพ', sender: 'system' }]);
            setShowReport(false);
            setIsLoading(false);
            setIsSpeaking(false);
            setAvatarMood('neutral');
            chatTurnsRef.current = [];   // clear Q&A turns for new session
            turnCountRef.current = 0;    // reset turn counter
          };

          // Play Thai-style ringback tone (400 Hz + 450 Hz, 1 s on / 3 s off)
          const startRingTone = () => {
            try {
              const ctx = new (window.AudioContext || window.webkitAudioContext)();
              const o1 = ctx.createOscillator(); o1.frequency.value = 400;
              const o2 = ctx.createOscillator(); o2.frequency.value = 450;
              const g  = ctx.createGain(); g.gain.value = 0.08;
              o1.connect(g); o2.connect(g); g.connect(ctx.destination);
              o1.start(); o2.start();
              let on = true;
              const toggle = () => {
                g.gain.setTargetAtTime(on ? 0 : 0.08, ctx.currentTime, 0.02);
                on = !on;
              };
              const ivl = setInterval(toggle, on ? 1000 : 3000);
              // First off after 1 s, then cycle 3 s / 1 s
              const timers = [
                setTimeout(() => { toggle(); clearInterval(ivl); setInterval(toggle, on ? 1000 : 3000); }, 1000)
              ];
              ringToneRef.current = { ctx, o1, o2, ivl, timers };
            } catch (_) {}
          };
          const stopRingTone = () => {
            const r = ringToneRef.current;
            if (!r) return;
            try { r.timers?.forEach(clearTimeout); clearInterval(r.ivl); r.o1.stop(); r.o2.stop(); r.ctx.close(); } catch (_) {}
            ringToneRef.current = null;
          };

          const startVdoCall = () => {
            setIsCalling(true);
            startRingTone();
            setTimeout(() => {
              stopRingTone();
              setIsCalling(false);
              navigate('simulation');
              setChatLog([
                { text: 'เริ่มการสนทนาประเมินสุขภาพ — กรุณาทักทายผู้ป่วยก่อน', sender: 'system' }
              ]);
            }, 3500);
          };

          // ============================================================
          // 4-STEP CLINICAL REASONING HANDLERS
          // ============================================================
          const handleToolSelect = (toolKey) => {
            // 100 if no answer key set; 100 if matches key; 30 partial credit if wrong
            const toolScore  = correctTool ? (toolKey === correctTool ? 100 : 30) : 100;
            const matchHint  = correctTool && toolKey !== correctTool
              ? ' ⚠️ (เครื่องมือไม่ตรงกับกรณีศึกษา)'
              : '';
            setSelectedTool(toolKey);
            setAssessmentAnswers({});
            setSelectedRecommendations([]);
            setScores(prev => ({ ...prev, tool: toolScore }));
            setActiveModal(null);
            setChatLog(prev => [...prev, {
              text: `ระบบ: เลือกเครื่องมือ ${assessmentTools[toolKey].name}${matchHint}`,
              sender: 'system'
            }]);
          };

          const handleAnswerSelect = (questionIndex, answer) => {
            setAssessmentAnswers(prev => ({ ...prev, [questionIndex]: answer }));
          };

          const handleRecommendationToggle = (rec) => {
            setSelectedRecommendations(prev =>
              prev.includes(rec) ? prev.filter(r => r !== rec) : [...prev, rec]
            );
          };

          const submitAssessment = () => {
            const tool   = assessmentTools[selectedTool];
            const totalQ = tool.items.length;
            if (Object.keys(assessmentAnswers).length < totalQ) {
              alert('กรุณาประเมินให้ครบทุกข้อก่อนบันทึก');
              return;
            }
            const rawScore = Object.values(assessmentAnswers).reduce((sum, v) => sum + Number(v), 0);
            const pct      = tool.maxScore > 0 ? Math.round((rawScore / tool.maxScore) * 100) : 100;

            // Range-match scoring against case answer key
            let rangeScore;
            if (caseScoreMin === 0 && caseScoreMax === 100) {
              rangeScore = Math.max(pct, 10);   // no answer key — use raw pct
            } else if (pct >= caseScoreMin && pct <= caseScoreMax) {
              rangeScore = 100;                  // perfectly within expected range
            } else {
              const dist = pct < caseScoreMin ? caseScoreMin - pct : pct - caseScoreMax;
              rangeScore = Math.max(0, Math.round(100 - dist * 2));
            }

            setAssessmentPct(pct);
            setAssessmentRawVal(rawScore);
            setScores(prev => ({ ...prev, assessment: rangeScore }));
            setActiveModal(null);
            setChatLog(prev => [...prev, {
              text: `ระบบ: บันทึกผลประเมิน ${tool.name} — คะแนนดิบ ${rawScore}/${tool.maxScore} (${pct}%) → คะแนน ${rangeScore}%`,
              sender: 'system'
            }]);
          };

          const submitRecommendation = () => {
            if (selectedRecommendations.length === 0) {
              alert('กรุณาเลือกคำแนะนำอย่างน้อย 1 ข้อ');
              return;
            }
            // Compute match score against case answer key's expected interventions
            let interventionScore = 90;  // default if no key set
            if (expectedInterventions.length > 0) {
              const matched = selectedRecommendations.filter(r => expectedInterventions.includes(r)).length;
              interventionScore = Math.round((matched / expectedInterventions.length) * 100);
              interventionScore = Math.max(interventionScore, 10);
            }
            setScores(prev => ({ ...prev, recommendation: interventionScore }));
            setActiveModal(null);
            setChatLog(prev => [...prev, {
              text: `ระบบ: บันทึกคำแนะนำ ${selectedRecommendations.length} ข้อ (คะแนน: ${interventionScore}%)`,
              sender: 'system'
            }]);
          };

          // ── Step 4: Compile payload → POST action:'save' to GAS ─────
          // Payload matches GAS doPost save schema exactly:
          //   student_id, case_name, assessment_tool, assessment_score,
          //   nursing_intervention, system_feedback, q1…q15
          const handleSubmitSession = () => {
            if (scores.tool === 0 || scores.assessment === 0 || scores.recommendation === 0) {
              alert('กรุณาทำขั้นตอน 1-3 ให้ครบก่อนส่งข้อมูล');
              return;
            }

            const totalScore = Math.round((scores.tool + scores.assessment + scores.recommendation) / 3);

            // Compute session duration from timer ref
            const elapsedSec = sessionStartRef.current ? Math.floor((Date.now() - sessionStartRef.current) / 1000) : 0;
            const durMin = String(Math.floor(elapsedSec / 60)).padStart(2, '0');
            const durSec = String(elapsedSec % 60).padStart(2, '0');
            const durationStr = `${durMin}:${durSec} นาที`;

            // Build q1-q15: each slot = one Q&A exchange (user → AI)
            const qPayload = {};
            chatTurnsRef.current.slice(0, 15).forEach((turn, i) => {
              qPayload[`q${i + 1}`] = `[นักศึกษา] ${turn.user} | [ผู้ป่วย] ${turn.ai}`;
            });

            const toolMatch = correctTool ? (selectedTool === correctTool) : true;
            const payload = {
              action                : 'save',
              student_id            : studentId || 'ไม่ระบุ',
              student_name          : studentName || '',
              case_id               : activeCaseId || '-',
              case_name             : activePatient.condition || activePatient.name,
              chosen_tool           : selectedTool,
              correct_tool          : correctTool || '',
              tool_match            : toolMatch,
              tool_score            : scores.tool,
              assessment_pct        : assessmentPct,
              score_in_range        : scores.assessment >= 100,
              assessment_score      : scores.assessment,
              intervention_score    : scores.recommendation,
              total_score           : totalScore,
              duration              : durationStr,
              nursing_interventions : selectedRecommendations.join(' | '),
              ...qPayload
            };

            // Fire-and-forget — navigate immediately, log in background
            fetch(GAS_URL, {
              method : 'POST',
              body   : JSON.stringify(payload)
            }).catch(err => console.error('[GeriSim] Save error:', err));

            navigate('summary');
          };

          // ============================================================
          // AVATAR  (Flat / Corporate Memphis style — mood-aware)
          // mood: 'neutral' | 'pain' | 'happy' | 'sad' | 'confused'
          // ============================================================
          const renderAvatar = (patient, speaking, scaleClass = 'scale-100', mood = 'neutral') => {
            // Robust gender check — works with "ชาย", "หญิง", trailing spaces, mixed case
            const genderStr  = (patient.gender || '').toString().trim();
            const isFemale   = !genderStr.includes('ชาย');   // default female if unset
            const hasCane    = correctTool === 'ADL';
            const skinColor  = isFemale ? '#FDDCB5' : '#EFC990';
            const hairColor  = isFemale ? '#C4C4C4' : '#909090';
            const clothColor = isFemale ? '#8B5CF6' : '#3B82F6';

            // ── Mood → eyebrow paths ─────────────────────────────────
            const browL = {
              neutral  : isFemale ? 'M70,101 Q83,96 95,100'  : 'M69,101 Q83,95 95,100',
              pain     : 'M70,104 Q83,97 95,100',   // outer low, arch tight → furrow
              happy    : 'M70,104 Q83,93 95,101',   // raised arch
              sad      : 'M70,99  Q83,103 95,104',  // outer high, inner drops
              confused : 'M70,103 Q83,97 95,100',   // left slightly raised
            };
            const browR = {
              neutral  : isFemale ? 'M105,100 Q117,96 130,101' : 'M105,100 Q117,95 131,101',
              pain     : 'M105,100 Q117,97 130,104',  // inner tight, outer low
              happy    : 'M105,101 Q117,93 130,104',  // raised arch
              sad      : 'M105,104 Q117,103 130,99',  // inner drops, outer high
              confused : 'M105,96  Q117,91 130,101',  // right one raised high
            };
            const eyebrowL = browL[mood] || browL.neutral;
            const eyebrowR = browR[mood] || browR.neutral;

            // ── Mood → mouth path ────────────────────────────────────
            const mouthPaths = {
              neutral  : 'M86,139 Q100,148 114,139',   // gentle smile
              pain     : 'M86,144 Q100,140 114,144',   // tight grimace
              happy    : 'M83,137 Q100,152 117,137',   // big smile
              sad      : 'M86,144 Q100,139 114,144',   // frown
              confused : 'M88,143 Q97,147 112,141',    // asymmetric / crooked
            };
            const mouthPath = mouthPaths[mood] || mouthPaths.neutral;

            // ── Mood → eye radius ────────────────────────────────────
            const eyeR = (mood === 'pain' || mood === 'happy') ? 5.5 : 7;

            return (
              <div className={`relative flex flex-col items-center justify-end w-full h-full pt-2 transition-transform duration-300 ${scaleClass}`}>
                {/* Decorative blobs */}
                <div className="absolute top-10 left-4 w-32 h-32 bg-[#FDE68A] rounded-full mix-blend-multiply opacity-60 z-0"></div>
                <div className="absolute bottom-10 right-0 w-40 h-48 bg-[#FBCFE8] rounded-[5rem] mix-blend-multiply opacity-60 transform rotate-12 z-0"></div>
                <div className="absolute top-1/4 right-8 w-16 h-16 bg-[#A7F3D0] rounded-full mix-blend-multiply opacity-60 z-0"></div>

                <div className="relative z-20 w-full flex justify-center">
                  <svg viewBox="0 0 200 295" xmlns="http://www.w3.org/2000/svg" className="w-52 h-auto drop-shadow-lg">

                    {/* ── BODY (fixed, no float) ── */}
                    {isFemale
                      ? <path d="M62,190 Q36,235 32,295 L168,295 Q164,235 138,190 Q120,179 100,179 Q80,179 62,190 Z" fill={clothColor}/>
                      : <path d="M60,188 Q32,233 28,295 L172,295 Q168,233 140,188 Q121,176 100,176 Q79,176 60,188 Z" fill={clothColor}/>
                    }
                    {/* Shirt / blouse collar (fixed) */}
                    {isFemale
                      ? <path d="M87,186 Q100,200 113,186" fill="none" stroke="#6D28D9" strokeWidth="2.5" strokeLinecap="round"/>
                      : <>
                          <path d="M91,183 L100,198 L109,183" fill="white" stroke="#1D4ED8" strokeWidth="1.5"/>
                          <line x1="100" y1="198" x2="100" y2="240" stroke="#1D4ED8" strokeWidth="1.5" strokeDasharray="3,3"/>
                        </>
                    }
                    {!isFemale && <rect x="112" y="215" width="22" height="18" rx="3" fill="none" stroke="#1D4ED8" strokeWidth="1.5"/>}
                    {/* Cane (fixed to body) */}
                    {hasCane && <>
                      <path d="M147,186 Q160,177 169,188" fill="none" stroke="#92400E" strokeWidth="4.5" strokeLinecap="round"/>
                      <line x1="163" y1="186" x2="167" y2="293" stroke="#92400E" strokeWidth="4" strokeLinecap="round"/>
                      <ellipse cx="167" cy="293" rx="5" ry="2" fill="#78350F" opacity="0.5"/>
                    </>}

                    {/* ── UPPER BODY GROUP (floats: shoulders, neck, head, hair, face) ── */}
                    <g className="svg-upper-float">

                      {/* Neck */}
                      <rect x="88" y="162" width="24" height="26" rx="5" fill={skinColor}/>

                      {/* ── HEAD ── */}
                      <ellipse cx="100" cy="118" rx={isFemale ? 45 : 47} ry={isFemale ? 50 : 52} fill={skinColor}/>

                      {/* ── HAIR ── */}
                      {isFemale ? <>
                        <ellipse cx="58" cy="103" rx="15" ry="30" fill={hairColor}/>
                        <ellipse cx="142" cy="103" rx="15" ry="30" fill={hairColor}/>
                        <ellipse cx="100" cy="73" rx="45" ry="25" fill={hairColor}/>
                        <circle cx="100" cy="54" r="20" fill={hairColor}/>
                        <path d="M90,50 Q100,44 110,50" fill="none" stroke="white" strokeWidth="2" opacity="0.4" strokeLinecap="round"/>
                        <ellipse cx="100" cy="70" rx="20" ry="5" fill="#A78BFA" opacity="0.7"/>
                      </> : <>
                        <ellipse cx="100" cy="72" rx="47" ry="23" fill={hairColor}/>
                        <ellipse cx="57" cy="96" rx="14" ry="26" fill={hairColor}/>
                        <ellipse cx="143" cy="96" rx="14" ry="26" fill={hairColor}/>
                        <path d="M70,78 Q100,66 130,78" fill="none" stroke="#C8C8C8" strokeWidth="1.5" opacity="0.5" strokeLinecap="round"/>
                      </>}

                      {/* ── EARS ── */}
                      <ellipse cx="55" cy="120" rx="9" ry="13" fill={skinColor}/>
                      <ellipse cx="55" cy="120" rx="5" ry="8" fill={isFemale ? '#F5B8A0' : '#E8AA80'} opacity="0.5"/>
                      <ellipse cx="145" cy="120" rx="9" ry="13" fill={skinColor}/>
                      <ellipse cx="145" cy="120" rx="5" ry="8" fill={isFemale ? '#F5B8A0' : '#E8AA80'} opacity="0.5"/>

                      {/* ── GLASSES ── */}
                      <circle cx="83" cy="115" r="16" fill="rgba(200,220,255,0.15)" stroke="#4B3832" strokeWidth="2.5"/>
                      <circle cx="117" cy="115" r="16" fill="rgba(200,220,255,0.15)" stroke="#4B3832" strokeWidth="2.5"/>
                      <line x1="99" y1="115" x2="101" y2="115" stroke="#4B3832" strokeWidth="2.5"/>
                      <line x1="67" y1="113" x2="60" y2="110" stroke="#4B3832" strokeWidth="2"/>
                      <line x1="133" y1="113" x2="140" y2="110" stroke="#4B3832" strokeWidth="2"/>

                      {/* ── EYEBROWS (mood-aware) ── */}
                      <path d={eyebrowL}
                        fill="none" stroke={isFemale ? '#909090' : '#606060'}
                        strokeWidth={isFemale ? 2 : 3} strokeLinecap="round"/>
                      <path d={eyebrowR}
                        fill="none" stroke={isFemale ? '#909090' : '#606060'}

                      {label:'แนะนำ',   color:'#D97706', border:'#B45309', score:scores.recommendation,
                        onClick:()=>{ if(selectedTool) setActiveModal('recommendation'); else alert('กรุณาเลือกแบบประเมินก่อน (ขั้นตอน 1)'); }, enabled:!!selectedTool},
                      {label:'ส่งผล',   color:'#16A34A', border:'#15803D', score:null,
                        onClick:handleSubmitSession, enabled:scores.recommendation > 0},
                    ].map((step, i) => {
                      const done = step.score > 0 || (i === 3 && scores.recommendation > 0);
                      return (
                        <React.Fragment key={i}>
                          <button onClick={step.onClick}
                            className="flex flex-col items-center gap-1 flex-1 py-2 rounded-xl active:translate-y-[2px] transition-transform"
                            style={{
                              background: done ? step.color : '#2D2D4E',
                              border: `2px solid ${done ? step.border : '#3D3D5E'}`,
                              boxShadow: done ? `3px 3px 0px ${step.border}` : '3px 3px 0px #3D3D5E',
                              opacity: step.enabled ? 1 : 0.4,
                            }}>
                            <span className="text-[11px] font-black" style={{color: done ? '#fff' : '#6B7280'}}>{i+1}</span>
                            <span className="text-[8px] font-bold leading-none" style={{color: done ? 'rgba(255,255,255,0.85)' : '#4B5563'}}>{step.label}</span>
                            {done && step.score !== null && (
                              <span className="text-[9px] font-black" style={{color:'#FDE68A'}}>{step.score}%</span>
                            )}
                            {done && step.score === null && (
                              <i className="fas fa-check text-[9px] text-white"></i>
                            )}
                          </button>
                          {i < 3 && (
                            <div className="w-4 h-0.5 shrink-0" style={{background: done ? step.color : '#2D2D4E'}}></div>
                          )}
                        </React.Fragment>
                      );
                    })}
                  </div>
                </div>

                {/* Push-to-Talk / STT button */}
                <div className="flex justify-center mb-3 z-50 relative">
                  <button
                    onClick={toggleListening}
                    disabled={isLoading}
                    className={`flex items-center justify-center space-x-2 px-6 py-3 rounded-full backdrop-blur-md transition-all border shadow-lg ${
                      isListening
                        ? 'bg-[#06C755] border-green-400 text-white'
                        : isLoading
                        ? 'bg-gray-700/80 border-gray-600 text-gray-400 cursor-not-allowed'
                        : 'bg-gray-800/90 border-gray-700 text-gray-200 hover:bg-gray-700'
                    }`}
                  >
                    {isListening ? (
                      <>
                        <i className="fas fa-circle text-white text-xs animate-pulse"></i>
                        <span className="text-[11px] font-bold">กำลังฟัง... (แตะเพื่อหยุด)</span>
                      </>
                    ) : isLoading ? (
                      <>
                        <i className="fas fa-spinner fa-spin text-gray-400"></i>
                        <span className="text-[11px] font-bold">AI กำลังตอบ...</span>
                      </>
                    ) : (
                      <>
                        <i className="fas fa-microphone text-[#06C755]"></i>
                        <span className="text-[11px] font-bold">แตะเพื่อพูด</span>
                      </>
                    )}
                  </button>
                </div>

                {/* Text input (typed fallback / supplement to voice) */}
                <div className="px-4 pb-4 pt-1 relative z-50">
                  <div className="w-full bg-gray-800/90 backdrop-blur-md rounded-full px-4 py-2.5 flex items-center border border-gray-700">
                    {isListening
                      ? <i className="fas fa-circle mr-3 text-[#06C755] animate-pulse text-xs"></i>
                      : <i className="fas fa-microphone mr-3 text-gray-400"></i>
                    }
                    <input
                      type="text"
                      value={inputText}
                      onChange={(e) => setInputText(e.target.value)}
                      onKeyPress={(e) => e.key === 'Enter' && !isLoading && !isListening && handleSendMessage()}
                      placeholder={isListening ? 'กำลังรับเสียง...' : 'พูดหรือพิมพ์เพื่อโต้ตอบ...'}
                      disabled={isListening || isLoading}
                      className="bg-transparent border-none focus:outline-none w-full text-sm text-white placeholder-gray-400 font-medium disabled:opacity-50"
                    />
                    <button
                      onClick={handleSendMessage}
                      disabled={isLoading || isListening || !inputText.trim()}
                      className="ml-2 text-[#06C755] hover:scale-110 transition disabled:opacity-30"
                    >
                      <i className="fas fa-paper-plane text-lg"></i>
                    </button>
                  </div>
                </div>
              </div>

              {/* ── Bottom-sheet Modal ──────────────────────────────── */}
              {activeModal && (
                <div className="absolute inset-0 bg-black/70 backdrop-blur-sm z-50 flex flex-col justify-end">
                  <div className="bg-white w-full rounded-t-[2rem] p-6 shadow-2xl flex flex-col max-h-[85vh] animate-slideUp">
                    <div className="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
                    <div className="flex justify-between items-center mb-4 pb-2">
                      <h3 className="font-bold text-gray-800 text-lg">
                        {activeModal === 'tool'           && '1. เลือกประเภทแบบประเมิน'}
                        {activeModal === 'assessment'     && `2. ประเมิน: ${assessmentTools[selectedTool].name}`}
                        {activeModal === 'recommendation' && `3. คำแนะนำ: ${assessmentTools[selectedTool].name}`}
                      </h3>
                      <button onClick={() => setActiveModal(null)} className="bg-gray-100 p-2 rounded-full hover:bg-gray-200 transition">
                        <i className="fas fa-times text-gray-600"></i>
                      </button>
                    </div>

                    <div className="overflow-y-auto flex-1 no-scrollbar space-y-3 pb-4">

                      {/* Tool picker */}
                      {activeModal === 'tool' && Object.keys(assessmentTools).map(key => (
                        <button key={key} onClick={() => handleToolSelect(key)}
                          className={`w-full text-left py-4 px-5 rounded-2xl border-2 font-bold transition ${selectedTool === key ? 'border-[#4F46E5] bg-[#EEF2FF] text-[#4F46E5]' : 'border-gray-100 text-gray-700 hover:border-[#4F46E5] hover:bg-[#EEF2FF]'}`}
                        >
                          {assessmentTools[key].name}
                        </button>
                      ))}

                      {/* Assessment questions — multi-option per item */}
                      {activeModal === 'assessment' && (
                        <>
                          <div className="bg-[#EEF2FF] px-4 py-2.5 rounded-xl mb-2">
                            <p className="text-xs text-[#4F46E5] font-semibold leading-relaxed">{assessmentTools[selectedTool].formTitle}</p>
                          </div>
                          {assessmentTools[selectedTool].items.map((item, i) => (
                            <div key={i} className="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                              <p className="text-sm font-bold text-gray-800 mb-3">{item.label}</p>
                              <div className="flex flex-col space-y-2">
                                {item.options.map(opt => (
                                  <button key={opt.v + '_' + opt.l} onClick={() => handleAnswerSelect(i, opt.v)}
                                    className={`w-full text-left py-2.5 px-3 rounded-xl border-2 text-xs font-medium transition ${assessmentAnswers[i] === opt.v ? 'bg-[#8B5CF6] text-white border-[#8B5CF6]' : 'border-gray-200 text-gray-600 hover:bg-[#F5F3FF] hover:border-[#8B5CF6] hover:text-[#8B5CF6]'}`}
                                  >{opt.l}</button>
                                ))}
                              </div>
                            </div>
                          ))}
                        </>
                      )}

                      {/* Recommendations — grouped by category */}
                      {activeModal === 'recommendation' && assessmentTools[selectedTool].recommendations.map((group, ci) => (
                        <div key={ci} className="mb-3">
                          <p className="text-xs font-extrabold text-[#4F46E5] uppercase tracking-wide mb-2 px-1">{group.cat}</p>
                          <div className="space-y-2">
                            {group.items.map((r, ii) => (
                              <label key={ii}
                                className={`flex items-start space-x-3 p-3 rounded-xl border cursor-pointer transition ${selectedRecommendations.includes(r) ? 'bg-[#FFF7ED] border-[#F97316]' : 'bg-gray-50 border-gray-100 hover:bg-[#FFF7ED] hover:border-[#F97316]'}`}
                              >
                                <input
                                  type="checkbox"
                                  checked={selectedRecommendations.includes(r)}
                                  onChange={() => handleRecommendationToggle(r)}
                                  className="w-4 h-4 mt-0.5 text-[#F97316] rounded border-gray-300 focus:ring-[#F97316] shrink-0"
                                />
                                <span className="text-xs font-medium text-gray-700 leading-relaxed">{r}</span>
                              </label>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>

                    {activeModal === 'assessment' && (
                      <button onClick={submitAssessment} className="w-full bg-[#8B5CF6] hover:bg-[#7C3AED] text-white font-bold py-4 rounded-2xl shadow-lg mt-2 transition">
                        บันทึกผลประเมิน
                          </button>
                    )}
                    {activeModal === 'recommendation' && (
                      <button onClick={submitRecommendation} className="w-full bg-[#F97316] hover:bg-[#EA580C] text-white font-bold py-4 rounded-2xl shadow-lg mt-2 transition">
                        ยืนยันคำแนะนำ ({selectedRecommendations.length} ข้อ)
                      </button>
                    )}
                  </div>
                </div>
              )}
            </div>
          );

          // ============================================================
          // PAGE: SUMMARY
          // ============================================================
          const renderSummary = () => {
            const totalScore = Math.round((scores.tool + scores.assessment + scores.recommendation) / 3);

            const feedback = [];
            const toolMatch = correctTool ? (selectedTool === correctTool) : true;
            if (correctTool && !toolMatch) {
              feedback.push({
                topic  : '1. การเลือกเครื่องมือประเมิน (Step 1)',
                mistake: `คุณเลือก: ${assessmentTools[selectedTool]?.name || selectedTool}`,
                correct: `เครื่องมือที่เหมาะสมกับกรณีนี้: ${assessmentTools[correctTool]?.name || correctTool}`
              });
            }
            if (correctTool && (caseScoreMin > 0 || caseScoreMax < 100) &&
                (assessmentPct < caseScoreMin || assessmentPct > caseScoreMax)) {
              feedback.push({
                topic  : '2. ผลการประเมิน (Step 2)',
                mistake: `คะแนนที่ได้: ${assessmentPct}%`,
                correct: `ช่วงคะแนนที่คาดหวังสำหรับกรณีนี้: ${caseScoreMin}–${caseScoreMax}% — ตรวจสอบการอ่านผลอีกครั้ง`
              });
            }
            const missedInterv = expectedInterventions.filter(r => !selectedRecommendations.includes(r));
            if (missedInterv.length > 0) {
              feedback.push({
                topic  : '3. คำแนะนำการพยาบาลที่ยังขาด (Step 3)',
                mistake: `เลือก ${selectedRecommendations.length} ข้อ จากที่คาดหวัง ${expectedInterventions.length} ข้อ`,
                correct: missedInterv.slice(0, 3).join(' | ') +
                  (missedInterv.length > 3 ? ` ... (+${missedInterv.length - 3} ข้อ)` : '')
              });
            }
            if (feedback.length === 0 && correctTool) {
              feedback.push({
                topic  : '✅ ผลการประเมินสมบูรณ์',
                mistake: 'ไม่มีข้อผิดพลาด',
                correct: 'คุณเลือกเครื่องมือ ผลการประเมิน และคำแนะนำได้ถูกต้องตามกรณีศึกษา'
              });
            }

            const circumference = 2 * Math.PI * 45;
            const offset = circumference - (totalScore / 100) * circumference;
            const ringColor = totalScore >= 80 ? '#10B981' : totalScore >= 60 ? '#6366F1' : '#F97316';
            const emoji = totalScore >= 80 ? '🏆' : totalScore >= 60 ? '⭐' : '💪';
            const headline = totalScore >= 80 ? 'ยอดเยี่ยม!' : totalScore >= 60 ? 'ทำได้ดี!' : 'สู้ต่อไป!';

            const xpEarned = totalScore * 10;
            const lvls = [
              {lv:1,name:'มือใหม่',    min:0,   color:'#6B7280',border:'#4B5563'},
              {lv:2,name:'กำลังพัฒนา',min:300, color:'#2563EB',border:'#1D4ED8'},
              {lv:3,name:'ชำนาญการ',  min:500, color:'#16A34A',border:'#15803D'},
              {lv:4,name:'เชี่ยวชาญ', min:700, color:'#9333EA',border:'#7E22CE'},
              {lv:5,name:'ยอดเยี่ยม', min:900, color:'#D97706',border:'#B45309'},
            ];
            const curLv = [...lvls].reverse().find(l=>xpEarned>=l.min) || lvls[0];

            return (
              <div className="flex flex-col h-full w-full max-w-md mx-auto overflow-y-auto no-scrollbar" style={{background:'#F9FBF6'}}>

                {/* ── Top banner (green) ── */}
                <div className="px-5 pt-14 pb-6 flex flex-col items-center"
                  style={{background:'#16A34A'}}>
                  <p className="text-5xl mb-3">{emoji}</p>
                  <h2 className="text-3xl font-black text-white mb-1">{headline}</h2>
                  <p className="text-xs font-bold" style={{color:'#BBF7D0'}}>สรุปผลการฝึกประเมินสุขภาพผู้สูงอายุ</p>

                  {/* Big flat score badge */}
                  <div className="mt-5 px-8 py-4 rounded-2xl flex items-baseline gap-1"
                    style={{background:'#fff',border:`3px solid ${ringColor}`,boxShadow:`5px 5px 0px ${ringColor}`}}>
                    <span className="text-6xl font-black" style={{color:ringColor}}>{totalScore}</span>
                    <span className="text-xl font-black text-gray-400">/100</span>
                  </div>
                </div>

                <div className="px-5 pt-5 pb-8 flex flex-col gap-4">

                  {/* XP earned card */}
                  <div className="rounded-2xl p-4 flex items-center gap-4"
                    style={{background:'#FFFBEB',boxShadow:'6px 6px 12px rgba(180,120,0,0.15),-6px -6px 12px rgba(255,255,255,0.9)'}}>
                    <div className="w-12 h-12 rounded-xl flex items-center justify-center shrink-0"
                      style={{background:'#D97706',border:'2px solid #B45309',boxShadow:'3px 3px 0px #B45309'}}>
                      <i className="fas fa-star text-white text-lg"></i>
                    </div>
                    <div className="flex-1">
                      <p className="text-[10px] font-black uppercase tracking-wider text-gray-500 mb-0.5">XP ที่ได้รับ</p>
                      <p className="text-2xl font-black" style={{color:'#D97706'}}>+{xpEarned} <span className="text-sm font-bold text-gray-400">XP</span></p>
                    </div>
                    <div className="px-3 py-1.5 rounded-xl font-black text-xs text-white"
                      style={{background:curLv.color,border:`2px solid ${curLv.border}`,boxShadow:`2px 2px 0px ${curLv.border}`}}>
                      Lv.{curLv.lv} {curLv.name}
                    </div>
                  </div>

                  {/* Score breakdown */}
                  <div className="rounded-2xl p-4 bg-white space-y-3"
                    style={{boxShadow:'8px 8px 16px rgba(109,40,217,0.12),-8px -8px 16px rgba(255,255,255,0.9)'}}>
                    <p className="text-[10px] font-black uppercase tracking-wider text-gray-400">รายละเอียดคะแนน</p>
                    {[
                      {label:'1. การเลือกเครื่องมือ', score:scores.tool,           color:'#5C4EE5',border:'#3D31C4'},
                      {label:'2. การประเมินภาวะสุขภาพ',score:scores.assessment,     color:'#9333EA',border:'#7E22CE'},
                      {label:'3. การให้คำแนะนำ',       score:scores.recommendation, color:'#D97706',border:'#B45309'},
                    ].map((row,i)=>(
                      <div key={i}>
                        <div className="flex justify-between items-center mb-1.5">
                          <span className="text-xs font-bold text-gray-700">{row.label}</span>
                          <span className="text-sm font-black px-2 py-0.5 rounded-lg text-white"
                            style={{background:row.color,border:`2px solid ${row.border}`,boxShadow:`2px 2px 0px ${row.border}`}}>
                            {row.score}%
                          </span>
                        </div>
                        <div className="w-full rounded-full h-2" style={{background:'#E2E4F3'}}>
                          <div className="h-full rounded-full" style={{width:`${row.score}%`,background:row.color}}></div>
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* Buttons */}
                  <button onClick={()=>{resetSession();navigate('home');}}
                    className="w-full py-4 rounded-2xl font-black text-white text-base flex items-center justify-center gap-2 active:opacity-90 transition-opacity"
                    style={{background:'#9146FF',boxShadow:'6px 6px 12px rgba(80,20,180,0.45),-4px -4px 10px rgba(255,255,255,0.15)'}}>
                    <i className="fas fa-home"></i> กลับสู่หน้าหลัก
                  </button>

                  <button onClick={()=>setShowReport(!showReport)}
                    className="w-full py-3.5 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 active:opacity-90 transition-opacity"
                    style={{background:'#EEE8FF',border:'none',color:'#9146FF',boxShadow:'5px 5px 10px rgba(109,40,217,0.18),-5px -5px 10px rgba(255,255,255,0.9)'}}>
                    <i className={`fas ${showReport ? 'fa-chevron-up' : 'fa-clipboard-list'}`}></i>
                    {showReport ? 'ซ่อนรายงาน' : 'ดูรายงานผลการประเมิน'}
                  </button>

                  {/* Feedback report */}
                  {showReport && feedback.length > 0 && (
                    <div className="space-y-3">
                      {feedback.map((fb,i)=>(
                        <div key={i} className="rounded-2xl p-4 bg-white"
                          style={{boxShadow:'6px 6px 12px rgba(109,40,217,0.12),-6px -6px 12px rgba(255,255,255,0.9)'}}>
                          <p className="text-xs font-black text-gray-700 mb-2">{fb.topic}</p>
                          <div className="flex flex-col gap-1.5">
                            <div className="flex items-start gap-2 text-xs rounded-xl px-3 py-2"
                              style={{background:'#FEF2F2',border:'1.5px solid #FECACA'}}>
                              <i className="fas fa-times-circle text-red-400 mt-0.5 shrink-0"></i>
                              <span className="text-red-700 font-medium">{fb.mistake}</span>
                            </div>
                            <div className="flex items-start gap-2 text-xs rounded-xl px-3 py-2"
                              style={{background:'#F3EEFF',border:'1.5px solid #DDD6FE'}}>
                              <i className="fas fa-check-circle mt-0.5 shrink-0" style={{color:'#9146FF'}}></i>
                              <span className="font-medium" style={{color:'#6D28D9'}}>{fb.correct}</span>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          };

          // ============================================================
          // ROUTER
          // ============================================================
          const renderApp = () => {
            switch(currentPage) {
              case 'welcome':    return renderWelcome();
              case 'home':       return renderHome();
              case 'simulation': return renderSimulation();
              case 'summary':    return renderSummary();
              default:           return renderWelcome();
            }
          };

          return (
            <div className="fixed inset-0 flex items-center justify-center bg-gray-900">
              <div className="relative w-full max-w-md h-full max-h-[900px] overflow-hidden shadow-2xl"
                style={{fontFamily:"'Noto Sans Thai', sans-serif"}}>
                {renderApp()}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
      </script>
    </body>
</html>
