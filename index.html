    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Prompt', sans-serif;
            background-color: #111827;
        }
        #root { width: 100%; height: 100%; }

        @keyframes breathe {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-6px); }
        }
        @keyframes headBob {
          0%, 100% { transform: rotate(0deg) translateY(0); }
          25% { transform: rotate(-3deg) translateY(-2px); }
          75% { transform: rotate(3deg) translateY(2px); }
        }
        @keyframes talkMouth {
          0%, 100% { height: 4px; width: 24px; border-radius: 4px; }
          33% { height: 16px; width: 14px; border-radius: 8px; }
          66% { height: 10px; width: 20px; border-radius: 10px; }
        }
        @keyframes blink {
          0%, 93%, 97%, 100% { transform: scaleY(1); }
          95% { transform: scaleY(0.1); }
        }
        @keyframes slideUp {
          from { transform: translateY(100%); }
          to { transform: translateY(0); }
        }
        @keyframes dotBounce {
          0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
          40% { transform: translateY(-7px); opacity: 1; }
        }

        .animate-breathe  { animation: breathe 4s ease-in-out infinite; }
        .animate-headBob  { animation: headBob 6s ease-in-out infinite; }
        .animate-talk     { animation: talkMouth 0.3s infinite; }
        .animate-blink    { animation: blink 5s infinite; transform-origin: center; }
        .animate-slideUp  { animation: slideUp 0.3s ease-out forwards; }
        .dot-bounce       { animation: dotBounce 1.2s ease-in-out infinite; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
    </style>
</head>

        // ============================================================
        // CHUNK TEXT — splits a string into iApp-safe segments
        // Strategy: sentence boundaries first (.!?), then commas,
        // then hard-cut at maxLen chars at a word boundary.
        // ============================================================
        function chunkText(text, maxLen = 120) {
          if (!text || !text.trim()) return [];

          // Normalise whitespace
          const clean = text.replace(/\s+/g, ' ').trim();

          // ── Step 1: split on sentence-ending punctuation ────────────
          // e.g. "...ค่ะ. ยาย..." → ["...ค่ะ.", "ยาย..."]
          const sentenceParts = [];
          clean.split(/([.!?])\s+/).forEach((part, i, arr) => {
            if (i % 2 === 0) {
              const punct = arr[i + 1] || '';
              const seg   = (part + punct).trim();
              if (seg) sentenceParts.push(seg);
            }
          });
          if (!sentenceParts.length) sentenceParts.push(clean);

          // ── Step 2: sub-split anything still over maxLen on commas ──
          const commaChunked = [];
          for (const sentence of sentenceParts) {
            if (sentence.length <= maxLen) {
              commaChunked.push(sentence);
            } else {
              let buffer = '';
              sentence.split(/,\s*/).forEach(part => {
                const candidate = buffer ? `${buffer}, ${part}` : part;
                if (candidate.length > maxLen && buffer) {
                  commaChunked.push(buffer.trim());
                  buffer = part;
                } else {
                  buffer = candidate;
                }
              });
              if (buffer.trim()) commaChunked.push(buffer.trim());
            }
          }

          // ── Step 3: hard-cut any remaining oversized segments ───────
          const final = [];
          for (const chunk of commaChunked) {
            if (chunk.length <= maxLen) {
              final.push(chunk);
            } else {
              let remaining = chunk;
              while (remaining.length > maxLen) {
                // Prefer splitting at a space near the limit
                let at = remaining.lastIndexOf(' ', maxLen);
                if (at < maxLen / 2) at = maxLen;   // no good space — hard cut
                final.push(remaining.slice(0, at).trim());
                remaining = remaining.slice(at).trim();
              }
              if (remaining) final.push(remaining);
            }
          }

          return final.filter(c => c.length > 0);
        }

          // ============================================================
          // TEXT-TO-SPEECH — Fallback: native Web Speech API
          // Used when iApp TTS fetch fails or returns an error.
          // ============================================================
          const speakNative = (text) => {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();

            const utter = new SpeechSynthesisUtterance(text);
            utter.lang   = 'th-TH';
            utter.rate   = 0.75;   // slightly below 0.8 → more natural elderly pacing
            utter.pitch  = 0.7;    // deeper pitch → older-sounding voice
            utter.volume = 1.0;

            utter.onstart = () => setIsSpeaking(true);
            utter.onend   = () => setIsSpeaking(false);
            utter.onerror = () => setIsSpeaking(false);

            const doSpeak = () => {
              const thaiVoice = window.speechSynthesis.getVoices().find(v => v.lang && v.lang.startsWith('th'));
              if (thaiVoice) utter.voice = thaiVoice;
              window.speechSynthesis.speak(utter);
            };

            // Chrome loads voices asynchronously — wait for voiceschanged if needed
            if (window.speechSynthesis.getVoices().length > 0) {
              doSpeak();
            } else {
              window.speechSynthesis.addEventListener('voiceschanged', doSpeak, { once: true });
            }
          };

          // ============================================================
          // TEXT-TO-SPEECH — Primary: iApp TTS API with chunked queue
          //
          // Flow for a reply of N chunks:
          //   fetch chunk[0] ──► play chunk[0]
          //                         └─ while playing, fetch chunk[1]  (pre-fetch)
          //                              └─ on ended, play chunk[1]
          //                                   └─ while playing, fetch chunk[2] …
          //
          // Pre-fetching the next blob while the current one is playing
          // eliminates inter-chunk silence almost completely.
          //
          // queueIdRef acts as a cancellation token: incrementing it
          // causes any in-flight queue loop to abort silently when a
          // new message interrupts (e.g. student sends another message
          // while the patient is still speaking).
          // ============================================================
          const speakText = async (fullText) => {
            // ── Cancel any in-progress queue ────────────────────────
            queueIdRef.current += 1;
            const myId = queueIdRef.current;

            if (audioRef.current) {
              audioRef.current.pause();
              audioRef.current = null;
            }
            window.speechSynthesis?.cancel();
            setIsSpeaking(false);

            // ── Split full reply into API-safe segments ──────────────
            const chunks = chunkText(fullText);
            if (!chunks.length) return;

            // ── Helper: fetch one chunk → returns a Blob Promise ────
            const fetchChunkBlob = async (chunk) => {
              const res = await fetch(IAPP_TTS_URL, {
                method  : 'POST',
                headers : {
                  'Content-Type' : 'application/json',
                  'apikey'       : IAPP_TTS_APIKEY
                },
                body: JSON.stringify({
                  text  : chunk,          // full chunk, never truncated
                  voice : IAPP_TTS_VOICE,
                  speed : IAPP_TTS_SPEED
                })
              });
              if (!res.ok) throw new Error(`iApp HTTP ${res.status}`);
              return res.blob();
            };

            // ── Helper: play a Blob → Promise resolves on audio end ─
            const playBlob = (blob) => new Promise((resolve, reject) => {
              const url   = URL.createObjectURL(blob);
              const audio = new Audio(url);
              audioRef.current = audio;

              // oncanplaythrough fires as soon as enough data is buffered
              // — use it to set speaking state so avatar starts moving
              // the moment audio is ready, not after a potential buffer wait
              audio.oncanplaythrough = () => setIsSpeaking(true);
              audio.onended = () => {
                setIsSpeaking(false);          // avatar stops after last word
                URL.revokeObjectURL(url);      // free blob memory
                audioRef.current = null;
                resolve();
              };
              audio.onerror = () => {
                URL.revokeObjectURL(url);
                audioRef.current = null;
                reject(new Error('Audio element playback error'));
              };

              audio.play().catch(reject);
            });

            // ── Main queue loop with pre-fetch ───────────────────────
            try {
              // Kick off the first fetch immediately
              let nextBlobPromise = fetchChunkBlob(chunks[0]);

              for (let i = 0; i < chunks.length; i++) {
                if (queueIdRef.current !== myId) return;  // interrupted

                const blob = await nextBlobPromise;

                // Pre-fetch the NEXT chunk in parallel while current plays
                if (i + 1 < chunks.length) {
                  nextBlobPromise = fetchChunkBlob(chunks[i + 1]);
                }

                if (queueIdRef.current !== myId) return;  // interrupted after fetch
                await playBlob(blob);                      // awaits until audio.onended
              }

              // All chunks done — ensure speaking flag is off
              if (queueIdRef.current === myId) setIsSpeaking(false);

            } catch (err) {
              console.warn('[GeriSim] iApp TTS error — falling back to native TTS:', err.message);
              if (queueIdRef.current === myId) {
                setIsSpeaking(false);
                speakNative(fullText);   // native handles its own chunking via browser engine
              }
            }
          };

          // ============================================================
          // LOGIN — POST action:"login" to GAS, verify credentials
          // ============================================================
          const handleLogin = async () => {
            if (!studentId.trim()) { alert('กรุณากรอกรหัสนักศึกษา'); return; }
            if (!password.trim()) { alert('กรุณากรอกรหัสผ่าน'); return; }

            isLoadingRef.current = true;
            setIsLoading(true);

            try {
              const res  = await fetch(GAS_URL, {
                method : 'POST',
                // Omit Content-Type → browser sends as text/plain → avoids CORS preflight
                body   : JSON.stringify({
                  action   : 'login',
                  username : studentId.trim(),
                  password : password.trim()
                })
              });
              const data = await res.json();

              if (data.status === 'success') {

              }
            } catch (err) {
              console.error('[GeriSim] Login error:', err);
              alert('ไม่สามารถเชื่อมต่อระบบได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต');
            } finally {
              isLoadingRef.current = false;
              setIsLoading(false);
            }
          };

          // ============================================================
          // REGISTER — POST action:"register" to GAS
          // ============================================================
          const handleRegister = async () => {
            if (!regId.trim())       { alert('กรุณากรอกรหัสนักศึกษา'); return; }
            if (!regName.trim())     { alert('กรุณากรอกชื่อ-นามสกุล'); return; }

            setIsLoading(true);

              const res  = await fetch(GAS_URL, {

              }
            } catch (err) {
              console.error('[GeriSim] Register error:', err);
              alert('ไม่สามารถเชื่อมต่อระบบได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต');
            } finally {
              setIsLoading(false);
            }
          };

          // ============================================================
          // API INTEGRATION — POST action:"chat" to GAS → Gemini 1.5 Flash
          // ============================================================
          const sendToAI = async (messageText) => {
            if (!messageText.trim() || isLoadingRef.current) return;

            isLoadingRef.current = true;
            setIsLoading(true);
            setChatLog(prev => [...prev, { text: messageText, sender: 'user' }]);
            setInputText('');

            try {
              const res  = await fetch(GAS_URL, {
                method : 'POST',
                // Omit Content-Type → text/plain → avoids CORS preflight with GAS
                body   : JSON.stringify({
                  action       : 'chat',
                  message      : messageText,
                  systemPrompt : SYSTEM_PROMPT,
                  studentId    : studentId || 'anonymous'
                })
              });

              const data  = await res.json();
              const reply = data.reply || 'ขออภัยค่ะ ยายไม่ได้ยินที่ถาม ลองถามใหม่อีกทีนะลูก';

              // Track Q&A turn for q1-q15 save payload (cap at 15 turns)
              if (chatTurnsRef.current.length < 15) {
                chatTurnsRef.current.push({ user: messageText, ai: reply });
              }

              setChatLog(prev => [...prev, { text: reply, sender: 'ai' }]);
              speakText(reply);

            } catch (err) {
              console.error('[GeriSim] Chat error:', err);
              const errMsg = 'ไม่สามารถเชื่อมต่อ AI ได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต';
              setChatLog(prev => [...prev, { text: errMsg, sender: 'ai' }]);
            } finally {
              isLoadingRef.current = false;
              setIsLoading(false);
            }
          };

          const handleSendMessage = () => {
            if (!inputText.trim()) return;
            sendToAI(inputText);
          };

          // ============================================================
          // SPEECH-TO-TEXT  (Web Speech API — Chrome / Edge)
          // ============================================================
          const startListening = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
              alert('เบราว์เซอร์นี้ไม่รองรับการรับเสียง\nกรุณาใช้ Google Chrome แล้วลองใหม่');
              return;
            }

            // Stop TTS before listening to avoid capturing our own output
            window.speechSynthesis?.cancel();
            setIsSpeaking(false);

            const recognition          = new SpeechRecognition();
            recognition.lang           = 'th-TH';
            recognition.continuous     = false;
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => setIsListening(true);

            recognition.onresult = (event) => {
              let transcript = '';
              for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
              }
              setInputText(transcript);

              // Auto-send when the engine signals a final (confident) result
              if (event.results[event.results.length - 1].isFinal) {
                setIsListening(false);
                recognitionRef.current = null;
                sendToAI(transcript);
              }
            };

            recognition.onerror = (e) => {
              console.error('[GeriSim] STT error:', e.error);
              setIsListening(false);
              recognitionRef.current = null;
            };

            recognition.onend = () => {
              setIsListening(false);
              recognitionRef.current = null;
            };

            recognitionRef.current = recognition;
            recognition.start();
          };

          const stopListening = () => {
            recognitionRef.current?.stop();
            recognitionRef.current = null;
            setIsListening(false);
          };

          const toggleListening = () => {
            if (isListening) stopListening();
            else startListening();
          };

          // ============================================================
          // SESSION LIFECYCLE
          // ============================================================
          const resetSession = () => {
            stopListening();
            window.speechSynthesis?.cancel();
            setScores({ tool: 0, assessment: 0, recommendation: 0 });

            setAssessmentAnswers({});

            setIsLoading(false);
            setIsSpeaking(false);
            chatTurnsRef.current = [];   // clear Q&A turns for new session
          };

          const startVdoCall = () => {
            setIsCalling(true);
            setTimeout(() => {
              setIsCalling(false);
              navigate('simulation');
              const greeting = 'ฮัลโหลวว ได้ยินไหมลูก ยายรอนานแล้วนะ';
              setChatLog([
                { text: 'เริ่มการสนทนาประเมินสุขภาพ', sender: 'system' },
                { text: greeting, sender: 'ai' }
              ]);
              speakText(greeting);
            }, 1500);
          };

          // ============================================================
          // 4-STEP CLINICAL REASONING HANDLERS
          // ============================================================
          const handleToolSelect = (toolKey) => {
            setSelectedTool(toolKey);
            setAssessmentAnswers({});
            setSelectedRecommendations([]);
            setScores(prev => ({ ...prev, tool: 100 }));

              sender: 'system'

            setAssessmentAnswers(prev => ({ ...prev, [questionIndex]: answer }));
          };

          const handleRecommendationToggle = (rec) => {
            setSelectedRecommendations(prev =>
              prev.includes(rec) ? prev.filter(r => r !== rec) : [...prev, rec]
            );
          };

          const submitAssessment = () => {
            const tool   = assessmentTools[selectedTool];
            const totalQ = tool.items.length;
            if (Object.keys(assessmentAnswers).length < totalQ) {
              alert('กรุณาประเมินให้ครบทุกข้อก่อนบันทึก');
              return;
            }
            const rawScore = Object.values(assessmentAnswers).reduce((sum, v) => sum + Number(v), 0);
            const pct      = tool.maxScore > 0 ? Math.round((rawScore / tool.maxScore) * 100) : 100;
            setScores(prev => ({ ...prev, assessment: Math.max(pct, 10) }));
            setActiveModal(null);
            setChatLog(prev => [...prev, {
              text: `ระบบ: บันทึกผลการประเมิน ${tool.name} (คะแนนดิบ ${rawScore}/${tool.maxScore} = ${pct}%)`,
              sender: 'system'

            const durMin = String(Math.floor(elapsedSec / 60)).padStart(2, '0');

              ...qPayload

                          <span className="text-sm text-gray-500 font-medium flex items-center gap-2">
                            <i className="fas fa-user text-[#8B5CF6] w-4 text-center"></i> ชื่อ-นามสกุล
                          </span>
                          <span className="text-sm font-black text-gray-800">{studentName || '-'}</span>
                        </div>
                        <div className="flex justify-between items-center px-4 py-3.5">
                          <span className="text-sm text-gray-500 font-medium flex items-center gap-2">
                            <i className="fas fa-trophy text-[#F97316] w-4 text-center"></i> คะแนนสูงสุด
                          </span>
                          <span className="text-sm font-black text-[#4F46E5]">
                            {profileLoading
                              ? <i className="fas fa-spinner fa-spin text-gray-400"></i>
                              : profileBestScore !== null
                                ? `${profileBestScore}%`
                                : <span className="text-gray-400 font-medium">-</span>
                            }
                          </span>
                        </div>
                      </div>

                      {/* Logout */}
                      <button
                        onClick={() => { setShowProfileModal(false); navigate('welcome'); }}
                        className="w-full border-2 border-red-100 text-red-500 hover:bg-red-50 font-bold py-3.5 rounded-2xl transition flex items-center justify-center gap-2"
                      >
                        <i className="fas fa-sign-out-alt"></i> ออกจากระบบ
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );

          // ============================================================
          // PAGE: SIMULATION (VDO Call)
          // ============================================================
          const renderSimulation = () => (
            <div className="flex flex-col h-full bg-[#111827] w-full max-w-md mx-auto relative overflow-hidden">

              {/* ── Top bar ─────────────────────────────────────────── */}
              <div className="absolute top-0 w-full px-4 pt-10 pb-4 flex items-center justify-between z-40 bg-gradient-to-b from-black/60 to-transparent">
                <div className="flex flex-col">
                  <span className="text-white font-bold text-lg drop-shadow-md">{activePatient.name}</span>
                  <span className="text-[#06C755] text-xs font-medium flex items-center drop-shadow-md">
                    <span className="w-1.5 h-1.5 bg-[#06C755] rounded-full mr-1.5 animate-pulse"></span>
                    {isSpeaking ? 'กำลังพูด...' : isListening ? 'กำลังฟัง...' : 'กำลังสนทนา'}
                  </span>
                  <span className="text-white/60 text-[10px] font-medium mt-0.5 flex items-center gap-1">
                    <i className="fas fa-clock text-[9px]"></i> เวลาที่ใช้: {sessionTimer}
                  </span>
                </div>
                <div className="flex items-center space-x-3">
                  <button className="w-10 h-10 rounded-full bg-white/10 backdrop-blur-sm flex items-center justify-center text-white">
                    <i className="fas fa-ellipsis-v"></i>
                  </button>
                  <button
                    onClick={() => { resetSession(); navigate('home'); }}
                    className="w-10 h-10 rounded-full bg-red-500 flex items-center justify-center text-white shadow-lg"
                  >
                    <i className="fas fa-phone-slash"></i>
                  </button>
                </div>
              </div>

              {/* ── Avatar background ───────────────────────────────── */}
              <div className="absolute inset-0 flex flex-col items-center justify-start pt-[12vh] bg-[#F8FAFC]">
                <div className="w-full h-[400px]">
                  {renderAvatar(activePatient, isSpeaking, isSpeaking ? 'scale-[1.15]' : 'scale-[1.1]')}
                </div>
              </div>

              {/* ── Self-view thumbnail ─────────────────────────────── */}
              <div className="absolute top-28 right-4 w-24 h-36 bg-gray-800 rounded-2xl overflow-hidden shadow-2xl border-[3px] border-[#111827] z-30 flex items-center justify-center">
                 <span className="text-4xl opacity-80">👩‍⚕️</span>
              </div>

              {/* ── Bottom panel ────────────────────────────────────── */}
              <div className="absolute bottom-0 w-full flex flex-col justify-end bg-gradient-to-t from-[#111827] via-[#111827]/90 to-transparent z-40 pt-20 pb-safe">

                {/* Chat log */}
                <div className="max-h-48 overflow-y-auto px-4 space-y-3 no-scrollbar flex flex-col mb-4">
                  {chatLog.map((msg, idx) => (
                    <div key={idx} className={`flex flex-col ${msg.sender === 'user' ? 'items-end' : msg.sender === 'ai' ? 'items-start' : 'items-center'}`}>
                      {msg.sender === 'system' ? (
                        <span className="text-[10px] bg-white/10 text-gray-300 px-3 py-1 rounded-full my-1 backdrop-blur-sm font-medium">{msg.text}</span>
                      ) : (
                        <div className={`max-w-[85%] px-4 py-2.5 text-sm font-medium shadow-sm backdrop-blur-md ${msg.sender === 'user' ? 'bg-[#06C755] text-white rounded-2xl rounded-tr-sm' : 'bg-gray-800/90 text-white rounded-2xl rounded-tl-sm border border-gray-700/50'}`}>
                          {msg.text}
                        </div>
                      )}
                    </div>
                  ))}

                  {/* AI typing indicator */}
                  {isLoading && (
                    <div className="flex items-start">
                      <div className="bg-gray-800/90 rounded-2xl rounded-tl-sm px-4 py-3 border border-gray-700/50 flex items-center space-x-1.5">
                        <span className="w-2 h-2 bg-gray-400 rounded-full dot-bounce" style={{animationDelay:'0ms'}}></span>
                        <span className="w-2 h-2 bg-gray-400 rounded-full dot-bounce" style={{animationDelay:'200ms'}}></span>
                        <span className="w-2 h-2 bg-gray-400 rounded-full dot-bounce" style={{animationDelay:'400ms'}}></span>
                      </div>
                    </div>
                  )}
                  <div ref={chatEndRef} />
                </div>

                {/* 4-step buttons */}
                <div className="flex justify-around items-center px-4 mb-4">
                  <div className="flex flex-col items-center">
                    <button
                      onClick={() => setActiveModal('tool')}
                      className={`w-14 h-14 rounded-full backdrop-blur-md flex items-center justify-center text-white mb-1.5 transition border text-lg ${scores.tool > 0 ? 'bg-[#4F46E5] border-[#4F46E5] shadow-[0_0_12px_rgba(79,70,229,0.5)]' : 'bg-gray-800/80 border-gray-700 hover:bg-[#4F46E5]'}`}
                    >
                      <i className="fas fa-clipboard-list"></i>
                    </button>
                    <span className="text-[10px] text-gray-300 font-medium">1. เลือกแบบ</span>
                  </div>

                  <div className="flex flex-col items-center">
                    <button
                      onClick={() => { if (selectedTool) setActiveModal('assessment'); else alert('กรุณาเลือกแบบประเมินก่อน (ปุ่ม 1)'); }}
                      className={`w-14 h-14 rounded-full backdrop-blur-md flex items-center justify-center text-white mb-1.5 transition border text-lg ${scores.assessment > 0 ? 'bg-[#8B5CF6] border-[#8B5CF6] shadow-[0_0_12px_rgba(139,92,246,0.5)]' : selectedTool ? 'bg-[#8B5CF6]/80 border-gray-700 hover:bg-[#7C3AED]' : 'bg-gray-800/50 opacity-50 border-gray-700'}`}
                    >
                      <i className="fas fa-heartbeat"></i>
                    </button>
                    <span className="text-[10px] text-gray-300 font-medium">2. ประเมิน</span>
                  </div>

                  <div className="flex flex-col items-center">
                    <button
                      onClick={() => { if (selectedTool) setActiveModal('recommendation'); else alert('กรุณาเลือกแบบประเมินก่อน (ปุ่ม 1)'); }}
                      className={`w-14 h-14 rounded-full backdrop-blur-md flex items-center justify-center text-white mb-1.5 transition border text-lg ${scores.recommendation > 0 ? 'bg-[#F97316] border-[#F97316] shadow-[0_0_12px_rgba(249,115,22,0.5)]' : selectedTool ? 'bg-[#F97316]/80 border-gray-700 hover:bg-[#EA580C]' : 'bg-gray-800/50 opacity-50 border-gray-700'}`}
                    >
                      <i className="fas fa-hand-holding-heart"></i>
                    </button>
                    <span className="text-[10px] text-gray-300 font-medium">3. คำแนะนำ</span>
                  </div>

                  <div className="flex flex-col items-center">
                    <button
                      onClick={handleSubmitSession}
                      className={`w-14 h-14 rounded-full backdrop-blur-md flex items-center justify-center text-white mb-1.5 transition border text-lg ${scores.recommendation > 0 ? 'bg-[#4F46E5] border-[#4F46E5] shadow-[0_0_15px_rgba(79,70,229,0.6)]' : 'bg-gray-800/50 opacity-50 border-gray-700'}`}
                    >
                      <i className="fas fa-check-circle"></i>
                    </button>
                    <span className="text-[10px] text-gray-300 font-medium">4. ส่งข้อมูล</span>
                  </div>
                </div>

                {/* Push-to-Talk / STT button */}
                <div className="flex justify-center mb-3 z-50 relative">
                  <button
                    onClick={toggleListening}
                    disabled={isLoading}
                    className={`flex items-center justify-center space-x-2 px-6 py-3 rounded-full backdrop-blur-md transition-all border shadow-lg ${
                      isListening
                        ? 'bg-[#06C755] border-green-400 text-white'
                        : isLoading
                        ? 'bg-gray-700/80 border-gray-600 text-gray-400 cursor-not-allowed'
                        : 'bg-gray-800/90 border-gray-700 text-gray-200 hover:bg-gray-700'
                    }`}
                  >
                    {isListening ? (
                      <>
                        <i className="fas fa-circle text-white text-xs animate-pulse"></i>
                        <span className="text-[11px] font-bold">กำลังฟัง... (แตะเพื่อหยุด)</span>
                      </>
                    ) : isLoading ? (
                      <>
                        <i className="fas fa-spinner fa-spin text-gray-400"></i>
                        <span className="text-[11px] font-bold">AI กำลังตอบ...</span>
                      </>
                    ) : (
                      <>
                        <i className="fas fa-microphone text-[#06C755]"></i>
                        <span className="text-[11px] font-bold">แตะเพื่อพูด</span>
                      </>
                    )}
                  </button>
                </div>

                {/* Text input (typed fallback / supplement to voice) */}
                <div className="px-4 pb-4 pt-1 relative z-50">
                  <div className="w-full bg-gray-800/90 backdrop-blur-md rounded-full px-4 py-2.5 flex items-center border border-gray-700">
                    {isListening
                      ? <i className="fas fa-circle mr-3 text-[#06C755] animate-pulse text-xs"></i>
                      : <i className="fas fa-microphone mr-3 text-gray-400"></i>
                    }
                    <input
                      type="text"
                      value={inputText}
                      onChange={(e) => setInputText(e.target.value)}
                      onKeyPress={(e) => e.key === 'Enter' && !isLoading && !isListening && handleSendMessage()}
                      placeholder={isListening ? 'กำลังรับเสียง...' : 'พูดหรือพิมพ์เพื่อโต้ตอบ...'}
                      disabled={isListening || isLoading}
                      className="bg-transparent border-none focus:outline-none w-full text-sm text-white placeholder-gray-400 font-medium disabled:opacity-50"
                    />
                    <button
                      onClick={handleSendMessage}
                      disabled={isLoading || isListening || !inputText.trim()}
                      className="ml-2 text-[#06C755] hover:scale-110 transition disabled:opacity-30"
                    >
                      <i className="fas fa-paper-plane text-lg"></i>
                    </button>
                  </div>
                </div>
              </div>

              {/* ── Bottom-sheet Modal ──────────────────────────────── */}
              {activeModal && (
                <div className="absolute inset-0 bg-black/70 backdrop-blur-sm z-50 flex flex-col justify-end">
                  <div className="bg-white w-full rounded-t-[2rem] p-6 shadow-2xl flex flex-col max-h-[85vh] animate-slideUp">
                    <div className="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
                    <div className="flex justify-between items-center mb-4 pb-2">
                      <h3 className="font-bold text-gray-800 text-lg">
                        {activeModal === 'tool'           && '1. เลือกประเภทแบบประเมิน'}
                        {activeModal === 'assessment'     && `2. ประเมิน: ${assessmentTools[selectedTool].name}`}
                        {activeModal === 'recommendation' && `3. คำแนะนำ: ${assessmentTools[selectedTool].name}`}
                      </h3>
                      <button onClick={() => setActiveModal(null)} className="bg-gray-100 p-2 rounded-full hover:bg-gray-200 transition">
                        <i className="fas fa-times text-gray-600"></i>
                      </button>
                    </div>

                    <div className="overflow-y-auto flex-1 no-scrollbar space-y-3 pb-4">

                      {/* Tool picker */}
                      {activeModal === 'tool' && Object.keys(assessmentTools).map(key => (
                        <button key={key} onClick={() => handleToolSelect(key)}
                          className={`w-full text-left py-4 px-5 rounded-2xl border-2 font-bold transition ${selectedTool === key ? 'border-[#4F46E5] bg-[#EEF2FF] text-[#4F46E5]' : 'border-gray-100 text-gray-700 hover:border-[#4F46E5] hover:bg-[#EEF2FF]'}`}
                        >
                          {assessmentTools[key].name}
                        </button>
                      ))}

                      {/* Assessment questions — multi-option per item */}
                      {activeModal === 'assessment' && (
                        <>
                          <div className="bg-[#EEF2FF] px-4 py-2.5 rounded-xl mb-2">
                            <p className="text-xs text-[#4F46E5] font-semibold leading-relaxed">{assessmentTools[selectedTool].formTitle}</p>
                          </div>
                          {assessmentTools[selectedTool].items.map((item, i) => (
                            <div key={i} className="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                              <p className="text-sm font-bold text-gray-800 mb-3">{item.label}</p>
                              <div className="flex flex-col space-y-2">
                                {item.options.map(opt => (
                                  <button key={opt.v + '_' + opt.l} onClick={() => handleAnswerSelect(i, opt.v)}
                                    className={`w-full text-left py-2.5 px-3 rounded-xl border-2 text-xs font-medium transition ${assessmentAnswers[i] === opt.v ? 'bg-[#8B5CF6] text-white border-[#8B5CF6]' : 'border-gray-200 text-gray-600 hover:bg-[#F5F3FF] hover:border-[#8B5CF6] hover:text-[#8B5CF6]'}`}
                                  >{opt.l}</button>
                                ))}
                              </div>
                            </div>
                          ))}
                        </>
                      )}

                      {/* Recommendations — grouped by category */}
                      {activeModal === 'recommendation' && assessmentTools[selectedTool].recommendations.map((group, ci) => (
                        <div key={ci} className="mb-3">
                          <p className="text-xs font-extrabold text-[#4F46E5] uppercase tracking-wide mb-2 px-1">{group.cat}</p>
                          <div className="space-y-2">
                            {group.items.map((r, ii) => (
                              <label key={ii}
                                className={`flex items-start space-x-3 p-3 rounded-xl border cursor-pointer transition ${selectedRecommendations.includes(r) ? 'bg-[#FFF7ED] border-[#F97316]' : 'bg-gray-50 border-gray-100 hover:bg-[#FFF7ED] hover:border-[#F97316]'}`}
                              >
                                <input
                                  type="checkbox"
                                  checked={selectedRecommendations.includes(r)}
                                  onChange={() => handleRecommendationToggle(r)}
                                  className="w-4 h-4 mt-0.5 text-[#F97316] rounded border-gray-300 focus:ring-[#F97316] shrink-0"
                                />
                                <span className="text-xs font-medium text-gray-700 leading-relaxed">{r}</span>
                              </label>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>

                    {activeModal === 'assessment' && (
                      <button onClick={submitAssessment} className="w-full bg-[#8B5CF6] hover:bg-[#7C3AED] text-white font-bold py-4 rounded-2xl shadow-lg mt-2 transition">
                        บันทึกผลประเมิน
                      </button>
                    )}
                    {activeModal === 'recommendation' && (
                      <button onClick={submitRecommendation} className="w-full bg-[#F97316] hover:bg-[#EA580C] text-white font-bold py-4 rounded-2xl shadow-lg mt-2 transition">
                        ยืนยันคำแนะนำ ({selectedRecommendations.length} ข้อ)
                      </button>
                    )}
                  </div>
                </div>
              )}
            </div>
          );

          // ============================================================
          // PAGE: SUMMARY
          // ============================================================
          const renderSummary = () => {
            const totalScore = Math.round((scores.tool + scores.assessment + scores.recommendation) / 3);

            const mockMistakes = [
              {
                topic  : 'การประเมินภาวะสุขภาพ',
                mistake: 'ไม่ได้ประเมินปัญหาด้านการนอนหลับเพิ่มเติม',
                correct: 'ผู้ป่วยให้ข้อมูลว่า "นอนไม่หลับ" ควรประเมินสภาพแวดล้อม หรือซักประวัติการปวดเข่าที่ทำให้ตื่นกลางดึกร่วมด้วย'
              },
              {
                topic  : 'การให้คำแนะนำการพยาบาล',
                mistake: 'ไม่ได้ให้คำแนะนำเรื่องการจัดการสภาพแวดล้อมยามวิกาล',
                correct: 'ควรแนะนำการเปิดไฟทางเดิน หรือเตรียมกระโถนข้างเตียง เพื่อลดความเสี่ยงหกล้มตอนกลางคืน'
              }
            ];

            return (
              <div className="flex flex-col h-full bg-[#4F46E5] w-full max-w-md mx-auto relative overflow-y-auto p-6 no-scrollbar">
                <div className="absolute top-10 left-[-2rem] w-32 h-32 bg-[#A7F3D0] rounded-full mix-blend-multiply opacity-50 z-0"></div>
                <div className="absolute bottom-20 right-[-2rem] w-48 h-48 bg-[#FBCFE8] rounded-[4rem] mix-blend-multiply opacity-50 transform rotate-45 z-0"></div>

                <div className="bg-white p-8 rounded-[2rem] shadow-2xl w-full flex flex-col items-center z-10 text-center mt-6">
                  <div className="w-20 h-20 bg-[#DCFCE7] rounded-full flex items-center justify-center mb-4">
                    <i className="fas fa-award text-[#10B981] text-4xl"></i>
                  </div>
                  <h2 className="text-3xl font-black text-gray-800 mb-1">ยอดเยี่ยมมาก!</h2>
                  <p className="text-sm font-medium text-gray-500 mb-1">สรุปผลการประเมินสุขภาพผู้สูงอายุจำลอง</p>
                  <p className="text-xs text-[#6366F1] font-bold mb-6">รหัสนักศึกษา: {studentId || 'ไม่ระบุ'}</p>

                  <div className="w-full bg-[#EEF2FF] rounded-2xl p-5 mb-8 border border-[#E0E7FF]">
                    <p className="text-xs text-[#6366F1] font-bold uppercase tracking-wider mb-2">คะแนนรวมของคุณ</p>
                    <div className="text-6xl font-black text-[#4F46E5]">{totalScore}<span className="text-xl text-[#A5B4FC] font-bold">/100</span></div>
                  </div>

                  <div className="w-full space-y-5 mb-10 text-left px-2">
                    <div className="flex justify-between items-center text-sm border-b border-gray-100 pb-3">
                      <span className="text-gray-600 font-bold flex items-center"><i className="fas fa-clipboard-list mr-3 text-[#4F46E5] text-lg"></i> 1. การเลือกเครื่องมือ</span>
                      <span className="font-black text-gray-800 text-lg">{scores.tool}%</span>
                    </div>
                    <div className="flex justify-between items-center text-sm border-b border-gray-100 pb-3">
                      <span className="text-gray-600 font-bold flex items-center"><i className="fas fa-heartbeat mr-3 text-[#8B5CF6] text-lg"></i> 2. การประเมินภาวะสุขภาพ</span>
                      <span className="font-black text-gray-800 text-lg">{scores.assessment}%</span>
                    </div>
                    <div className="flex justify-between items-center text-sm pb-2">
                      <span className="text-gray-600 font-bold flex items-center"><i className="fas fa-hand-holding-heart mr-3 text-[#F97316] text-lg"></i> 3. การให้คำแนะนำ</span>
                      <span className="font-black text-gray-800 text-lg">{scores.recommendation}%</span>
                    </div>
                  </div>

                  <button
                    onClick={() => { resetSession(); navigate('home'); }}
                    className="w-full bg-[#4F46E5] hover:bg-[#4338CA] text-white font-bold py-4 rounded-2xl shadow-lg transition"
                  >
                    กลับสู่หน้าหลัก
                  </button>
                </div>

                <div className="w-full mt-8 flex flex-col items-center pb-8 z-10">
                  <button
                    onClick={() => setShowReport(!showReport)}
                    className="text-white hover:text-[#FDE68A] text-sm font-bold flex items-center border-2 border-white/40 px-6 py-3 rounded-full hover:bg-white/10 transition backdrop-blur-sm"
                  >
                    <i className="fas fa-heartbeat mr-2"></i>
                    {showReport ? 'ซ่อนรายงาน (Hide Report)' : 'ดูรายงานข้อผิดพลาด (Show Report)'}
                  </button>

                  {showReport && (
                    <div className="w-full mt-6 space-y-4 animate-slideUp">
                      {mockMistakes.map((item, index) => (
                        <div key={index} className="bg-white/95 backdrop-blur-md rounded-[1.5rem] p-6 shadow-xl border-l-[6px] border-[#EF4444]">
                          <h4 className="text-sm font-black text-[#EF4444] mb-3 flex items-center">
                            <i className="fas fa-times mr-2"></i> {item.topic}
                          </h4>
                          <p className="text-sm font-bold text-gray-800 mb-1">สิ่งที่คุณตอบ:</p>
                          <p className="text-xs font-medium text-gray-600 mb-4 bg-[#FEF2F2] p-3 rounded-xl border border-[#FEE2E2]">{item.mistake}</p>
                          <p className="text-sm font-bold text-gray-800 mb-1">คำแนะนำ (Feedback):</p>
                          <p className="text-xs font-medium text-[#047857] bg-[#ECFDF5] p-3 rounded-xl border border-[#D1FAE5]">{item.correct}</p>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          };

          // ============================================================
          // RENDER
          // ============================================================
          return (
            <div className="h-full w-full bg-[#111827] font-sans text-gray-900 selection:bg-[#E0E7FF] overflow-hidden">
              {currentPage === 'welcome'    && renderWelcome()}
              {currentPage === 'home'       && renderHome()}
              {currentPage === 'simulation' && renderSimulation()}
              {currentPage === 'summary'    && renderSummary()}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
